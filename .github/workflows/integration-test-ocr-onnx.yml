name: Integration Tests (OCR)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/ocr-onnx@1.0.0)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      model:
        type: string
        required: false
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/ocr-onnx"

env:
  PKG_DIR: packages/ocr-onnx

jobs:
  run-integration-tests:
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    environment: release
    name: test-${{ matrix.platform }}-${{ matrix.arch }}

    permissions:
      contents: read
      packages: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: win32
            arch: x64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: bash
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          npm install
          npm install -g bare bare-make

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/prebuilds-staging
          merge-multiple: true

      - name: Move prebuilds from staging to workspace
        if: ${{ !inputs.prebuild_package }}
        run: |
          mkdir -p ${{ inputs.workdir || env.PKG_DIR }}/prebuilds
          cp -r ${{ runner.temp }}/prebuilds-staging/* ${{ inputs.workdir || env.PKG_DIR }}/prebuilds/ 2>/dev/null || true
          echo "Prebuilds moved from staging area"
        shell: bash

      - name: Download prebuilds from package
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          mkdir -p prebuilds
          npm pack ${{ inputs.prebuild_package }} --pack-destination /tmp
          tar -xzf /tmp/*.tgz -C /tmp
          cp -r /tmp/package/prebuilds/* prebuilds/

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Update c++ tools to install GLIBC++
        run: |
          sudo apt update
          sudo apt install -y g++-13

      # Required for all OCR integration tests (param-validation, lifecycle, image-formats,
      # full-ocr-suite, etc.). Provides detector + all recognizers under rec_dyn.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Download onnx model files
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          mkdir -p models/ocr/rec_dyn
          aws s3 cp s3://${{ secrets.MODEL_S3_BUCKET }}/qvac_models_compiled/ocr/rec_dyn/ models/ocr/rec_dyn/ --recursive

      - name: Run integration test
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: npm run test:integration
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}

      - name: Generate HTML performance report
        if: always()
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          echo "Checking for performance report..."
          ls -la test/results/ 2>/dev/null || echo "test/results/ directory not found"
          if [ -f test/results/performance-report.json ]; then
            echo "Found performance-report.json, generating HTML..."
            node ../../scripts/perf-report/aggregate.js \
              --dir test/results \
              --output-html test/results/performance-report.html \
              --output-json test/results/performance-summary.json \
              --output test/results/performance-report.md
          else
            echo "performance-report.json not found — skipping HTML generation"
          fi

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-ocr-${{ matrix.os }}-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            ${{ inputs.workdir || env.PKG_DIR }}/test/results/performance-report.json
            ${{ inputs.workdir || env.PKG_DIR }}/test/results/performance-report.html
            ${{ inputs.workdir || env.PKG_DIR }}/test/results/performance-summary.json
          retention-days: 90
          if-no-files-found: ignore
