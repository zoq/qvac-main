            BUNDLE_ID="${{ env.APP_BUNDLE_ID }}"
            # Android wdio config with crash detection (bail:0 = continue on test failures, crash = process.exit)
            # Increased timeout to 30 minutes (1800000ms) for long-running TTS tests
            WDIO_CONFIG='exports.config={runner:"local",hostname:"127.0.0.1",port:4723,path:"/wd/hub",specs:["*.spec.js","*.test.js"],maxInstances:1,bail:0,capabilities:[{platformName:"Android","appium:automationName":"UiAutomator2","appium:appPackage":"'${{ env.APP_BUNDLE_ID }}'","appium:appActivity":"'${{ env.APP_BUNDLE_ID }}'.MainActivity","appium:newCommandTimeout":300,"appium:autoGrantPermissions":true,"appium:autoAcceptAlerts":true,"appium:noReset":true,"appium:dontStopAppOnReset":true,"appium:forceAppLaunch":false}],logLevel:"debug",waitforTimeout:120000,connectionRetryTimeout:30000,connectionRetryCount:3,services:[],framework:"mocha",reporters:["spec"],mochaOpts:{ui:"bdd",timeout:1800000},before:async function(capabilities,specs,browser){const BUNDLE_ID="'${{ env.APP_BUNDLE_ID }}'";global.appCrashed=false;global.checkAppCrash=async(stage)=>{try{const state=await browser.queryAppState(BUNDLE_ID);console.log("["+stage+"] App state: "+state+" (4=foreground,3=background,1=not running)");if(state<3){console.error("\\n🛑 APP CRASHED at "+stage+"! State="+state);console.error("Check device logs for BareKit/native errors.\\n");global.appCrashed=true;process.exit(1);}return state;}catch(e){console.log("["+stage+"] queryAppState error: "+e.message);return-1;}};console.log("Checking initial app state...");await global.checkAppCrash("startup");console.log("Waiting for app to initialize...");await browser.pause(5000);await global.checkAppCrash("after-pause");const initText=await browser.$("android=new UiSelector().textContains(\"INITIALIZED\")");await initText.waitForDisplayed({timeout:60000});await global.checkAppCrash("after-init");console.log("App initialized, clicking Run Automated Tests...");const button=await browser.$("android=new UiSelector().textContains(\"Run Automated Tests\")");await button.waitForDisplayed({timeout:15000});await button.click();console.log("Button clicked!");await browser.pause(5000);await global.checkAppCrash("after-click");},afterTest:async function(test,context,{error}){if(global.appCrashed)return;await global.checkAppCrash("after-test:"+test.title);}};'
          else
            PLATFORM="iOS"
            AUTOMATION="XCUITest"
            # iOS 18+ requires macos_sequoia test host (supports iOS 15-26)
            HOST_LINE="ios_test_host: macos_sequoia"
            BUNDLE_ID="${{ env.APP_BUNDLE_ID }}"
            # iOS wdio config with crash detection (bail:0 = continue on test failures, crash = process.exit)
            # usePrebuiltWDA uses Device Farm's pre-built WebDriverAgent
            # Increased timeout to 30 minutes (1800000ms) for long-running TTS tests
            WDIO_CONFIG='exports.config={runner:"local",hostname:"127.0.0.1",port:4723,path:"/wd/hub",specs:["*.spec.js","*.test.js"],maxInstances:1,bail:0,capabilities:[{platformName:"iOS","appium:automationName":"XCUITest","appium:bundleId":"'${{ env.APP_BUNDLE_ID }}'","appium:newCommandTimeout":300,"appium:noReset":true,"appium:forceAppLaunch":false,"appium:usePrebuiltWDA":true,"appium:wdaLocalPort":8100,"appium:showIOSLog":true,"appium:realDeviceLogger":"/usr/local/lib/node_modules/appium/node_modules/deviceconsole/deviceconsole"}],logLevel:"debug",waitforTimeout:120000,connectionRetryTimeout:30000,connectionRetryCount:3,services:[],framework:"mocha",reporters:["spec"],mochaOpts:{ui:"bdd",timeout:1800000},before:async function(capabilities,specs,browser){const BUNDLE_ID="'${{ env.APP_BUNDLE_ID }}'";global.appCrashed=false;global.checkAppCrash=async(stage)=>{try{const state=await browser.queryAppState(BUNDLE_ID);console.log("["+stage+"] App state: "+state+" (4=foreground,3=background,1=not running)");if(state<3){console.error("\\n🛑 APP CRASHED at "+stage+"! State="+state);console.error("Check device logs for BareKit/native errors.\\n");global.appCrashed=true;process.exit(1);}return state;}catch(e){console.log("["+stage+"] queryAppState error: "+e.message);return-1;}};console.log("Checking initial app state...");await global.checkAppCrash("startup");console.log("Waiting for app to initialize...");await browser.pause(5000);await global.checkAppCrash("after-pause");const initText=await browser.$("-ios predicate string:label CONTAINS \"INITIALIZED\"");await initText.waitForDisplayed({timeout:60000});await global.checkAppCrash("after-init");console.log("App initialized, clicking Run Automated Tests...");const button=await browser.$("-ios predicate string:label CONTAINS \"Run Automated Tests\"");await button.waitForDisplayed({timeout:15000});await button.click();console.log("Button clicked!");await browser.pause(5000);await global.checkAppCrash("after-click");},afterTest:async function(test,context,{error}){if(global.appCrashed)return;await global.checkAppCrash("after-test:"+test.title);}};'
          fi

          # Base64 encode the wdio config to safely embed in YAML
          # Note: macOS base64 doesn't support -w flag (no line wrapping by default)
          WDIO_CONFIG_B64=$(echo "$WDIO_CONFIG" | base64 | tr -d '\n')

          # Create test spec YAML using printf to avoid variable expansion issues
          {
            printf 'version: 0.1\n'
            if [ -n "$HOST_LINE" ]; then
              printf '%s\n' "$HOST_LINE"
            fi
            printf '\n'
            printf 'phases:\n'
            printf '  install:\n'
            printf '    commands:\n'
            printf '      - echo "Setting up Node.js environment..."\n'
            printf '      - export NVM_DIR=$HOME/.nvm\n'
            printf '      - . $NVM_DIR/nvm.sh 2>/dev/null || true\n'
            printf '      - nvm install 18 2>/dev/null || true\n'
            printf '      - nvm use 18 2>/dev/null || true\n'
            printf '      - node --version || echo "Using system node"\n'
            printf '\n'
            printf '  pre_test:\n'
            printf '    commands:\n'
            printf '      - echo "Setting up test environment..."\n'
            printf '      - cd $DEVICEFARM_TEST_PACKAGE_PATH\n'
            printf '      - ls -la\n'
            printf '      - echo "Installing dependencies (clean install)..."\n'
            printf '      - rm -rf node_modules package-lock.json 2>/dev/null || true\n'
            printf '      - npm install --legacy-peer-deps 2>&1\n'
            printf '      - echo "Verifying wdio installation..."\n'
            printf '      - ls -la node_modules/.bin/ | grep wdio || echo "wdio not found in .bin"\n'
            printf '      - node node_modules/@wdio/cli/bin/wdio.js --version || echo "wdio version check failed"\n'
            printf '      - echo "Creating wdio config for Device Farm..."\n'
            printf '      - echo "%s" | base64 -d > tests/wdio.config.devicefarm.js\n' "$WDIO_CONFIG_B64"
