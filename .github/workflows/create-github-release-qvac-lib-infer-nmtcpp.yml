name: Create GitHub Release (NMTCPP)

on:
  workflow_call:
    inputs:
      published_version:
        description: "Version published in prebuild workflow"
        required: false
        type: string
      prev_sha:
        description: "Previous commit SHA for version comparison"
        required: false
        type: string
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-nmtcpp"

permissions:
  contents: write

jobs:
  publish-release:
    if: inputs.published_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Detect version bump
        id: version
        uses: ./.github/actions/detect-version-bump
        with:
          current_version: ${{ inputs.published_version }}
          prev_sha: ${{ inputs.prev_sha }}
          workdir: ${{ inputs.workdir }}

      - name: Verify Release Notes
        if: steps.version.outputs.bumped == 'true'
        working-directory: ${{ inputs.workdir }}
        run: |
          set -euo pipefail
          notes_path="release-notes/v${{ steps.version.outputs.current }}.md"
          if [ ! -s "${notes_path}" ]; then
            echo "Missing or empty release notes: ${notes_path}"
            exit 1
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.bumped == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # 2.6.1
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: QVAC NMT Addon v${{ steps.version.outputs.current }}
          body_path: ${{ inputs.workdir }}/release-notes/v${{ steps.version.outputs.current }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
