name: Integration Tests (Whispercpp)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/transcription-whispercpp@1.0.0)"
        required: true
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true
      run_rtf_benchmarks:
        description: "Run RTF performance benchmarks"
        required: false
        type: boolean
        default: true
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/qvac-lib-infer-whispercpp"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        type: boolean
        required: false
        default: true
      run_rtf_benchmarks:
        description: "Run RTF performance benchmarks"
        type: boolean
        required: false
        default: true
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        type: string
        required: false
      workdir:
        description: "Relative path to package directory in monorepo"
        required: false
        default: "packages/qvac-lib-infer-whispercpp"
        type: string

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-integration-tests

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"}]
          - os: ai-run-linux-gpu
            platform: linux
            arch: x64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"},{"modelFile":"ggml-tiny.bin","useGPU":true,"backendHint":"cuda"}]
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"}]
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"},{"modelFile":"ggml-tiny.bin","useGPU":true,"backendHint":"coreml"}]
          - os: macos-15-large
            platform: darwin
            arch: x64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"},{"modelFile":"ggml-tiny.bin","useGPU":true,"backendHint":"coreml"}]
          - os: windows-2022
            platform: win32
            arch: x64
            benchmark_matrix_json: >-
              [{"modelFile":"ggml-tiny.bin","useGPU":false,"backendHint":"cpu"},{"modelFile":"ggml-tiny.bin","useGPU":true,"backendHint":"directml"}]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: powershell
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir }}
        run: |
          npm install
          npm install -g bare@1.26.0 bare-make

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/prebuilds-staging
          merge-multiple: true

      - name: Move prebuilds from staging to workspace
        if: ${{ !inputs.prebuild_package }}
        run: |
          mkdir -p ${{ inputs.workdir }}/prebuilds
          cp -r ${{ runner.temp }}/prebuilds-staging/* ${{ inputs.workdir }}/prebuilds/ 2>/dev/null || true
          echo "Prebuilds moved from staging area"
        shell: bash

      - name: Download prebuilds from package (Unix)
        if: ${{ inputs.prebuild_package && matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          mkdir -p prebuilds
          npm pack ${{ inputs.prebuild_package }} --pack-destination /tmp
          tar -xzf /tmp/*.tgz -C /tmp
          cp -r /tmp/package/prebuilds/* prebuilds/
          find prebuilds -type f -name 'tetherto__*' | while read f; do
            mv "$f" "${f/tetherto__/qvac__}"
          done

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path prebuilds | Out-Null
          npm pack ${{ inputs.prebuild_package }} --pack-destination $env:TEMP
          $tgz = Get-ChildItem "$env:TEMP\*.tgz" | Select-Object -First 1
          tar -xzf $tgz.FullName -C $env:TEMP
          Copy-Item -Path "$env:TEMP\package\prebuilds\*" -Destination prebuilds -Recurse -Force
          Get-ChildItem -Path prebuilds -Recurse -File -Filter 'tetherto__*' | ForEach-Object {
            $newName = $_.Name -replace 'tetherto__', 'qvac__'
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Install gh cli for ai-run-linux-gpu
        if: matrix.os == 'ai-run-linux-gpu'
        shell: bash
        run: |
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
            && sudo mkdir -p -m 755 /etc/apt/keyrings \
                  && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                  && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && sudo apt update \
            && sudo apt install gh -y
          gh --version
        continue-on-error: true

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers
          # Add whisper.cpp dependencies for integration tests
          sudo apt-get install -y libopenblas-dev liblapack-dev libfftw3-dev

      - name: macOS - install whisper dependencies
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          brew install --quiet openblas lapack fftw

      - name: Windows - install Vulkan runtime
        if: matrix.platform == 'win32'
        uses: tetherto/qvac/.github/actions/setup-vulkan-sdk@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Run integration test (Unix)
        if: ${{ matrix.platform != 'win32' && inputs.run_integration_tests != false }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' && inputs.run_integration_tests != false }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run Vulkan GPU smoke test
        if: matrix.os == 'ai-run-linux-gpu'
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run test:stand-alone:gpu
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          
      - name: Run RTF benchmark (Unix)
        if: ${{ always() && matrix.platform != 'win32' && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          QVAC_WHISPER_BENCHMARK_DEVICE: ${{ matrix.os }}
          QVAC_WHISPER_BENCHMARK_RUNNER: ${{ matrix.os }}
          QVAC_WHISPER_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}

      - name: Run RTF benchmark (Windows)
        if: ${{ always() && matrix.platform == 'win32' && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          QVAC_WHISPER_BENCHMARK_DEVICE: ${{ matrix.os }}
          QVAC_WHISPER_BENCHMARK_RUNNER: ${{ matrix.os }}
          QVAC_WHISPER_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}

      - name: Upload RTF results
        if: ${{ always() && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: rtf-results-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ inputs.workdir }}/benchmarks/results/rtf-benchmark-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Add RTF summary
        if: ${{ always() && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          echo "### RTF - ${{ matrix.platform }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            const fs = require('fs')
            const path = require('path')
            const resultsDir = path.resolve('benchmarks/results')
            if (!fs.existsSync(resultsDir)) process.exit(0)
            const files = fs.readdirSync(resultsDir)
              .filter((file) => file.startsWith('rtf-benchmark-') && file.endsWith('.json'))
              .sort()
            if (files.length === 0) process.exit(0)
            const lines = [
              '| Model | GPU | Backend | Device | Mean RTF | P50 | P95 |',
              '|-------|-----|---------|--------|----------|-----|-----|'
            ]
            for (const file of files) {
              const report = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'))
              const model = report.model && report.model.name ? report.model.name.replace(/\.bin$/, '') : 'unknown'
              const summary = report.summary || {}
              const rtf = summary.rtf || {}
              lines.push(
                '| ' + model +
                ' | ' + ((report.requested && report.requested.useGPU) ? 'yes' : 'no') +
                ' | ' + ((report.labels && report.labels.backend) || (report.requested && report.requested.backendHint) || 'n/a') +
                ' | ' + ((report.labels && (report.labels.device || report.labels.runner)) || 'n/a') +
                ' | ' + (rtf.mean !== undefined ? Number(rtf.mean).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p50 !== undefined ? Number(rtf.p50).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p95 !== undefined ? Number(rtf.p95).toFixed(4) : 'n/a') +
                ' |'
              )
            }
            console.log(lines.join('\n'))
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Print run state (Unix)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          ls -la prebuilds || true
          tree prebuilds || true
        continue-on-error: true

      - name: Print run state (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          Get-ChildItem prebuilds -ErrorAction SilentlyContinue
          tree prebuilds /F 2>$null
        continue-on-error: true
