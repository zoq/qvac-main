name: General CI/CD (Qvac-lib-error-base)
# This workflow is used to call the reusable workflows in the qvac-devops repository
# https://github.com/tetherto/qvac-devops/blob/production-workflows-tag/.github/workflows/public-reusable.yml

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-error-base/**"
  pull_request:
    branches:
      - release-*
    paths:
      - "packages/qvac-lib-error-base/**"
  workflow_dispatch:
    inputs:
      custom_input_1:
        required: false
        type: string
      custom_input_2:
        required: false
        type: string
      custom_input_3:
        required: false
        type: string

jobs:
  release-pr-guard:
    name: Release PR Guard
    if: github.event_name == 'pull_request' && startsWith(github.base_ref, 'release-')
    uses: tetherto/qvac-devops/.github/workflows/release-pr-guard.yml@monorepo_update
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      package-slug: qvac-lib-error-base
      package-json-path: packages/qvac-lib-error-base/package.json
      changelog-path: packages/qvac-lib-error-base/CHANGELOG.md

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]] || [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="$ref_name"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  publish-main-gpr-dev:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish to GitHub Packages (dev)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@monorepo_update
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-error-base
          name-suffix: "-mono"

  publish-release-npm:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_release == 'true'
    uses: tetherto/qvac-devops/.github/workflows/public-reusable-npm.yml@monorepo_update
    secrets: inherit
    with:
      workdir: packages/qvac-lib-error-base

  publish-feature-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_feature == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish to GitHub Packages (feature)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@monorepo_update
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-error-base
          name-suffix: "-mono"

  publish-tmp-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_tmp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish to GitHub Packages (tmp)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@monorepo_update
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-error-base
          name-suffix: "-mono"
