# Gate merges to docs-production by verifying all docs-related CI workflows are green.
# Runs on PRs targeting docs-production (i.e. main -> docs-production).
# See docs/docs-workflow.md for the full deploy strategy.
name: Docs CI Doctor

on:
  pull_request:
    branches:
      - docs-production
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  actions: read

concurrency:
  group: docs-ci-doctor-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  doctor:
    name: Verify Docs Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Run CI doctor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/docs-ci-doctor.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
