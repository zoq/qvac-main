name: On PR Trigger (VAD)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, release-*]
    paths:
      - "packages/qvac-lib-infer-onnx-vad/**"

  workflow_dispatch:
    inputs:
      repository:
        description: "Repo to build (owner/name). Defaults to this repo."
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA). Defaults to current ref."
        required: false
        type: string
      run_verify:
        description: "Treat this run like a 'verify' run (prebuild + integration)."
        required: false
        type: boolean
        default: true
      workdir:
        description: "Package working directory in monorepo."
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-vad"

  workflow_call:
    inputs:
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      run_verify:
        required: false
        type: boolean
        default: true
      workdir:
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-vad"

env:
  # Keep for steps that still like env, but do NOT reference env.* inside job-level `uses:`
  PKG_DIR: packages/qvac-lib-infer-onnx-vad

jobs:
  release-pr-guard:
    name: Release PR Guard
    if: github.event_name == 'pull_request_target' && startsWith(github.event.pull_request.base.ref, 'release-')
    uses: tetherto/qvac-devops/.github/workflows/release-pr-guard.yml@monorepo_update
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      package-slug: qvac-lib-infer-onnx-vad
      package-json-path: packages/qvac-lib-infer-onnx-vad/package.json
      changelog-path: packages/qvac-lib-infer-onnx-vad/CHANGELOG.md

  context:
    name: Resolve Context
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      base_sha: ${{ steps.ctx.outputs.base_sha }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      run_verify: ${{ steps.ctx.outputs.run_verify }}
      workdir: ${{ steps.ctx.outputs.workdir }}
    steps:
      - id: ctx
        shell: bash
        run: |
          set -euo pipefail

          # Resolve workdir from inputs if present; otherwise default.
          # Note: pull_request_target has no inputs context, so we fall back to the known package path.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call" ]]; then
            workdir="${{ inputs.workdir || 'packages/qvac-lib-infer-onnx-vad' }}"
          else
            workdir="packages/qvac-lib-infer-onnx-vad"
          fi

          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            repo="${{ github.event.pull_request.head.repo.full_name }}"
            ref="${{ github.event.pull_request.head.ref }}"
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            run_verify="${{ contains(github.event.pull_request.labels.*.name, 'verify') }}"
          else
            repo="${{ inputs.repository || github.repository }}"
            ref="${{ inputs.ref || github.ref_name }}"
            base_sha="${{ github.sha }}"
            head_sha="${{ github.sha }}"
            run_verify="${{ inputs.run_verify }}"
          fi

          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "run_verify=$run_verify" >> "$GITHUB_OUTPUT"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"

          echo "Resolved:"
          echo "  repo=$repo"
          echo "  ref=$ref"
          echo "  base_sha=$base_sha"
          echo "  head_sha=$head_sha"
          echo "  run_verify=$run_verify"
          echo "  workdir=$workdir"

  sanity-checks:
    needs: context
    runs-on: ubuntu-latest
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@monorepo_update
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.context.outputs.run_verify == 'true' }}
          workdir: ${{ needs.context.outputs.workdir }}
          npm-token: ${{ secrets.NPM_TOKEN }}

  cpp-lint:
    needs: [context, sanity-checks]
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@monorepo_update
    secrets: inherit
    with:
      sha: ${{ needs.context.outputs.base_sha }}
      pr_head_sha: ${{ needs.context.outputs.head_sha }}
      workdir: ${{ needs.context.outputs.workdir }}

  prebuild:
    needs: [context, cpp-lint]
    permissions:
      contents: write
      packages: write
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-onnx-vad.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  run-integration-tests:
    needs: [context, prebuild]
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/integration-test-qvac-lib-infer-onnx-vad.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  merge-guard:
    needs: [run-integration-tests, sanity-checks, prebuild]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@monorepo_update
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
      # integration-tests-status: ${{ needs.run-integration-tests.result == 'success' }} # keep disabled if still noisy
    secrets: inherit
