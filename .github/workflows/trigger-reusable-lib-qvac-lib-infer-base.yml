name: General CI/CD (Qvac-lib-infer-base)
# This workflow is used to call the reusable workflows in the qvac-devops repository
# https://github.com/tetherto/qvac-devops/blob/production-workflows-tag/.github/workflows/public-reusable.yml

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-base/**"
  workflow_dispatch:
    inputs:
      custom_input_1:
        required: false
        type: string
      custom_input_2:
        required: false
        type: string
      custom_input_3:
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-merge-guard:
    name: Release Merge Guard
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: qvac-lib-infer-base
          package-json-path: packages/qvac-lib-infer-base/package.json
          changelog-path: packages/qvac-lib-infer-base/CHANGELOG.md

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  publish-main-gpr-dev:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_main == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (dev)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-infer-base
          name-suffix: "-mono"

  publish-release-npm:
    needs: [publish-logic, release-merge-guard]
    permissions:
      contents: write
      packages: write
      id-token: write
    if: |
      always() &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped')
    uses: tetherto/qvac-devops/.github/workflows/public-reusable-npm.yml@v1.1.7
    secrets: inherit
    with:
      workdir: packages/qvac-lib-infer-base
      repo_name: infer-base
      caller_event_name: ${{ github.event_name }}

  # Create GitHub release only for actual releases (after NPM publish)
  publish-release:
    needs: [publish-release-npm]
    if:  needs.publish-release-npm.result == 'success' && needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "infer-base"
      release_name: "QVAC Infer Base Lib"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/qvac-lib-infer-base"

  publish-feature-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_feature == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (feature)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-infer-base
          name-suffix: "-mono"

  publish-tmp-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_tmp == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (tmp)
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/qvac-lib-infer-base
          name-suffix: "-mono"
