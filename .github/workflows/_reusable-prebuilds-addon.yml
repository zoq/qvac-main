name: Reusable Prebuilds Addon

on:
  workflow_dispatch:
    inputs:
      package_slug:
        description: Package slug identifier
        required: true
        type: choice
        options:
          - qvac-lib-infer-llamacpp-llm
          - qvac-lib-infer-llamacpp-embed
          - qvac-lib-infer-whispercpp
          - qvac-lib-infer-onnx-tts
          - qvac-lib-infer-parakeet
          - qvac-lib-infer-nmtcpp
          - qvac-lib-infer-onnx
          - lib-infer-diffusion
          - ocr-onnx
      workdir:
        description: Package working directory
        required: true
        type: string
      artifact_prefix:
        description: Artifact prefix for upload
        required: false
        default: addon
        type: string
      repo_name:
        description: Repository name suffix for npm publish tagging
        required: false
        default: ""
        type: string
      vcpkg_cache_backend:
        description: filesystem or s3
        required: false
        default: filesystem
        type: choice
        options:
          - filesystem
          - s3
      vcpkg_s3_path:
        description: Optional S3 path prefix for vcpkg cache
        required: false
        default: ""
        type: string
      extra_generate_flags:
        description: Extra bare-make generate flags
        required: false
        default: ""
        type: string
      needs_vulkan:
        description: Install Vulkan SDK/tooling
        required: false
        default: true
        type: boolean
      needs_rust_targets:
        description: Install Rust targets
        required: false
        default: false
        type: boolean
      needs_submodules:
        description: Initialize submodules
        required: false
        default: false
        type: boolean
      extra_linux_packages:
        description: Extra apt packages
        required: false
        default: ""
        type: string
      ccache_scope:
        description: none, arm64-only, all-ubuntu
        required: false
        default: arm64-only
        type: choice
        options:
          - none
          - arm64-only
          - all-ubuntu
      publish_target:
        description: npm, gpr, both, or empty for branch-based routing
        required: false
        default: gpr
        type: string
      tag:
        description: Publish tag
        required: false
        default: dev
        type: string
      repository:
        description: Repository to checkout
        required: false
        default: tetherto/qvac
        type: string
      ref:
        description: Git ref to checkout
        required: false
        default: ""
        type: string
      npm_package_name:
        description: Optional package.json name before npm publish
        required: false
        default: ""
        type: string
      gpr_package_name:
        description: Optional package.json name before GPR publish
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      package_slug:
        required: false
        type: string
        default: addon
      workdir:
        required: true
        type: string
      artifact_prefix:
        required: false
        type: string
        default: addon
      repo_name:
        required: false
        type: string
        default: ""
      vcpkg_cache_backend:
        required: false
        type: string
        default: filesystem
      vcpkg_s3_path:
        required: false
        type: string
        default: ""
      extra_generate_flags:
        required: false
        type: string
        default: ""
      needs_vulkan:
        required: false
        type: boolean
        default: true
      needs_rust_targets:
        required: false
        type: boolean
        default: false
      needs_submodules:
        required: false
        type: boolean
        default: false
      extra_linux_packages:
        required: false
        type: string
        default: ""
      ccache_scope:
        required: false
        type: string
        default: arm64-only
      publish_target:
        required: false
        type: string
        default: gpr
      tag:
        required: false
        type: string
        default: dev
      repository:
        required: false
        type: string
        default: tetherto/qvac
      ref:
        required: false
        type: string
        default: ""
      npm_package_name:
        required: false
        type: string
        default: ""
      gpr_package_name:
        required: false
        type: string
        default: ""
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      MODEL_S3_BUCKET:
        required: false
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true
    outputs:
      published_version:
        description: The version that was published
        value: ${{ jobs.publish-npm.outputs.published_version || jobs.publish-gpr.outputs.published_version }}

permissions:
  contents: read

env:
  WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir }}

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ inputs.package_slug }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Configure npm auth
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          //npm.pkg.github.com/:_authToken=${{ secrets.PAT_TOKEN }}
          NPMRC

      - name: Configure git auth for private GitHub deps
        shell: bash
        env:
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "ssh://git@github.com/"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "ssh://git@github.com/"
          fi

      - name: Install global dependencies
        shell: bash
        run: npm install -g bare bare-make bare-runtime

      - name: Setup addon toolchain
        uses: ./.github/actions/setup-addon-toolchain
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          ccache-scope: ${{ inputs.ccache_scope }}
          needs-vulkan: ${{ inputs.needs_vulkan }}
          needs-rust-targets: ${{ inputs.needs_rust_targets }}
          needs-submodules: ${{ inputs.needs_submodules }}
          extra-linux-packages: ${{ inputs.extra_linux_packages }}

      - name: Install npm dependencies
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - name: Setup vcpkg cache
        uses: ./.github/actions/setup-vcpkg-cache
        with:
          workdir: ${{ env.WORKDIR }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          backend: ${{ inputs.vcpkg_cache_backend }}
          s3-bucket-path: ${{ inputs.vcpkg_s3_path }}
          cache-key-prefix: ${{ inputs.package_slug }}

      - name: Run bare-make generate
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }} ${{ inputs.extra_generate_flags }}

      - name: Run bare-make build
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: bare-make build

      - name: Run bare-make install
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: bare-make install

      - name: Strip and verify outputs
        uses: ./.github/actions/strip-and-verify
        with:
          workdir: ${{ env.WORKDIR }}
          platform: ${{ matrix.platform }}
          verify: "true"

      - name: Upload platform artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.WORKDIR }}/prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds

  publish-gpr:
    needs: [prebuild, merge]
    if: ${{ inputs.publish_target == 'gpr' || inputs.publish_target == 'both' }}
    continue-on-error: true
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.WORKDIR }}/prebuilds

      - name: Set GPR package name
        if: ${{ inputs.gpr_package_name != '' }}
        shell: bash
        run: node -e "const fs=require('fs');const f='${{ env.WORKDIR }}/package.json';const p=JSON.parse(fs.readFileSync(f,'utf8'));p.name='${{ inputs.gpr_package_name }}';fs.writeFileSync(f,JSON.stringify(p,null,2));"

      - name: Publish to GitHub Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || github.event.inputs.tag || 'dev' }}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

  publish-npm:
    needs: [prebuild, merge]
    if: ${{ inputs.publish_target == 'npm' || inputs.publish_target == 'both' }}
    continue-on-error: false
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.WORKDIR }}/prebuilds

      - name: Set npm package name
        if: ${{ inputs.npm_package_name != '' }}
        shell: bash
        run: node -e "const fs=require('fs');const f='${{ env.WORKDIR }}/package.json';const p=JSON.parse(fs.readFileSync(f,'utf8'));p.name='${{ inputs.npm_package_name }}';fs.writeFileSync(f,JSON.stringify(p,null,2));"

      - name: Publish to npm
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm@v1.1.7
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          workdir: ${{ env.WORKDIR }}
          repo_name: ${{ inputs.repo_name }}
          git-token: ${{ secrets.GITHUB_TOKEN }}
          create-tag: "false"
