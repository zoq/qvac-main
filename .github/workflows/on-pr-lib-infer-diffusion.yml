name: On PR Trigger (Stable Diffusion)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/lib-infer-diffusion/**"
      - ".github/workflows/*diffusion*.yml"
  workflow_dispatch:

  workflow_call:

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  PKG_DIR: packages/lib-infer-diffusion

jobs:
  sanity-checks:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.6
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ contains(github.event.pull_request.labels.*.name, 'verify') }}
          workdir: packages/lib-infer-diffusion

  cpp-tests:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    needs: sanity-checks
    uses: ./.github/workflows/cpp-tests-diffusion.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      workdir: packages/lib-infer-diffusion
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  cpp-lint:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.6
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/lib-infer-diffusion

  ts-checks:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Configure npm auth
        working-directory: packages/lib-infer-diffusion
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          NPMRC

      - name: Install dependencies
        working-directory: packages/lib-infer-diffusion
        run: npm install

      - name: Type declaration check
        working-directory: packages/lib-infer-diffusion
        run: npm run test:dts

  prebuild:
    needs: sanity-checks
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}
      publish_target: "gpr"
      tag: pr-${{ github.event.pull_request.number }}

  run-integration-tests:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    needs: prebuild
    uses: ./.github/workflows/integration-test-lib-infer-diffusion.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    if: contains( github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    needs: prebuild
    uses: ./.github/workflows/integration-mobile-test-lib-infer-diffusion.yml
    secrets:
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LLM_ANDROID_DEVICE_POOL_ARN: ${{ secrets.LLM_ANDROID_DEVICE_POOL_ARN }}
      LLM_AWS_DEVICE_FARM_PROJECT_ARN: ${{ secrets.LLM_AWS_DEVICE_FARM_PROJECT_ARN }}
      LLM_IOS_DEVICE_POOL_ARN: ${{ secrets.LLM_IOS_DEVICE_POOL_ARN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs:
      [
        run-integration-tests,
        run-mobile-integration-tests,
        sanity-checks,
        prebuild,
        cpp-tests,
        cpp-lint,
        ts-checks,
      ]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.6
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success'}}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
