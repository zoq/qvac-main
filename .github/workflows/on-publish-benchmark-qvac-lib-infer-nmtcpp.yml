name: Benchmark on Publish (NMTCPP)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version to benchmark (leave empty to use package.json version)'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Addon version to benchmark'
        required: false
        type: string

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.read-models.outputs.pairs }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get addon version
        id: get-version
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "📦 Benchmarking addon version: $version"

      - name: Read released models from file
        id: read-models
        working-directory: ${{ env.PKG_DIR }}
        run: |
          # Read .github/released-models.txt and filter out comments and empty lines
          pairs=$(grep -v '^#' .github/released-models.txt | grep -v '^[[:space:]]*$' | tr '\n' ',' | sed 's/,$//')
          echo "pairs=$pairs" >> $GITHUB_OUTPUT
          echo "🎯 Released model pairs: $pairs"

  benchmark:
    needs: prepare
    uses: ./.github/workflows/benchmark-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      pairs: ${{ needs.prepare.outputs.pairs }}
      translators: 'qvac'
      dataset_flores_devtest: true
      dataset_conversational_phrases: true
      metric_chrfpp: true
      metric_comet: true
      use_pivot: false
      is_quantized_model: false
      hyperparams: 'fast'

  summary:
    needs: [prepare, benchmark]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Display benchmark summary
        run: |
          echo "✅ Automated benchmark completed"
          echo ""
          echo "📦 Addon Version: ${{ needs.prepare.outputs.version }}"
          echo "🎯 Model Pairs: ${{ needs.prepare.outputs.pairs }}"
          echo "📊 Dataset: flores-devtest"
          echo "📈 Metrics: BLEU, chrF++"
          echo ""
          echo "### 📍 S3 Model Paths"
          IFS=',' read -ra PAIRS <<< "${{ needs.prepare.outputs.pairs }}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)
            echo "- **$pair**: \`s3://tether-ai-dev/qvac_models_compiled/ggml/marian/q0f16/ggml-opus-$pair/\`"
          done
          echo ""
          echo "🔗 View results in the benchmark workflow artifacts"

