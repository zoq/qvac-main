name: Benchmark on Publish (NMTCPP)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version to benchmark (leave empty to use package.json version)'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Addon version to benchmark'
        required: false
        type: string

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      opus_pairs: ${{ steps.read-opus.outputs.pairs }}
      bergamot_pairs: ${{ steps.read-bergamot.outputs.pairs }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Get addon version
        id: get-version
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "📦 Benchmarking addon version: $version"

      - name: Read released OPUS models
        id: read-opus
        working-directory: ${{ env.PKG_DIR }}
        run: |
          pairs=$(grep -v '^#' .github/released-models-opus.txt | grep -v '^[[:space:]]*$' | tr -d '\r' | tr '\n' ',' | sed 's/,$//')
          echo "pairs=$pairs" >> $GITHUB_OUTPUT
          echo "🎯 Released OPUS model pairs: $pairs"

      - name: Read released Bergamot models
        id: read-bergamot
        working-directory: ${{ env.PKG_DIR }}
        run: |
          pairs=$(grep -v '^#' .github/released-models-bergamot.txt | grep -v '^[[:space:]]*$' | tr -d '\r' | tr '\n' ',' | sed 's/,$//')
          echo "pairs=$pairs" >> $GITHUB_OUTPUT
          echo "🎯 Released Bergamot model pairs: $pairs"

  benchmark-opus:
    needs: prepare
    uses: ./.github/workflows/benchmark-qvac-lib-infer-nmtcpp.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pairs: ${{ needs.prepare.outputs.opus_pairs }}
      translators: 'qvac'
      dataset_flores_devtest: true
      dataset_conversational_phrases: true
      metric_chrfpp: true
      metric_comet: true
      use_pivot: false
      is_quantized_model: false
      use_batch: false
      hyperparams: 'fast'

  benchmark-bergamot:
    needs: prepare
    uses: ./.github/workflows/benchmark-qvac-lib-infer-nmtcpp.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pairs: ${{ needs.prepare.outputs.bergamot_pairs }}
      translators: 'qvac_bergamot'
      dataset_flores_devtest: true
      dataset_conversational_phrases: true
      metric_chrfpp: true
      metric_comet: true
      use_pivot: false
      is_quantized_model: false
      use_batch: false
      hyperparams: 'fast'

  summary:
    needs: [prepare, benchmark-opus, benchmark-bergamot]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Display benchmark summary
        run: |
          echo "✅ Automated benchmark completed for all supported models"
          echo ""
          echo "📦 Addon Version: ${{ needs.prepare.outputs.version }}"
          echo "📊 Datasets: flores-devtest, conversational-phrases"
          echo "📈 Metrics: chrF++, COMET"
          echo ""
          echo "### 🔧 OPUS/GGML Models (qvac)"
          echo "🎯 Pairs: ${{ needs.prepare.outputs.opus_pairs }}"
          echo ""
          echo "📍 S3 Model Paths:"
          IFS=',' read -ra PAIRS <<< "${{ needs.prepare.outputs.opus_pairs }}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)
            echo "- **$pair**: \`s3://\${MODEL_S3_BUCKET}/qvac_models_compiled/ggml/marian/q0f16/ggml-opus-$pair/\`"
          done
          echo ""
          echo "### 🔧 Bergamot Models (qvac_bergamot)"
          echo "🎯 Pairs: ${{ needs.prepare.outputs.bergamot_pairs }}"
          echo ""
          echo "📍 Model Source: Firefox Remote Settings CDN"
          echo "   URL: https://firefox.settings.services.mozilla.com/v1/buckets/main/collections/translations-models/records"
          IFS=',' read -ra PAIRS <<< "${{ needs.prepare.outputs.bergamot_pairs }}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)
            src_lang="${pair%-*}"
            trg_lang="${pair#*-}"
            echo "- **$pair**: Firefox CDN (fromLang=${src_lang}, toLang=${trg_lang})"
          done
          echo ""
          echo "🔗 View results in the benchmark workflow artifacts"