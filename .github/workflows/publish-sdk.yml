name: Build and Publish QVAC SDK (sdk)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/sdk/**"
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
    branches:
      - release-*
      - feature-*
      - tmp-*
      - main
    paths:
      - "packages/sdk/**"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for publishing (optional override for GPR)"
        required: false
        default: "dev"

env:
  WORKDIR: packages/sdk

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: sdk
          package-json-path: packages/sdk/package.json
          changelog-path: packages/sdk/CHANGELOG.md

  build:
    needs: [authorize]
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      READ_NPM_TOKEN: ${{ secrets.PAT_TOKEN }}
      WRITE_NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      READ_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Fetch PR head commits
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Configure scoped registry for @tetherto and @qvac packages
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GIT_PAT}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
          fi

          # Configure bunfig.toml for reading packages (in same dir as package.json)
          cat > bunfig.toml << EOF
          [install]
          registry = "https://registry.npmjs.org/"

          [install.scopes]
          "@tetherto" = { token = "${{ env.READ_NPM_TOKEN }}", url = "https://npm.pkg.github.com" }
          "@qvac" = { token = "${NPM_TOKEN}", url = "https://registry.npmjs.org" }
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ env.WORKDIR }}

      - name: Modify package name for branch-based builds
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          # Only modify package name for main, fix-*, feature-* branches
          case "$BRANCH_NAME" in
            release-*)
              echo "Release branch - keeping original package name"
              exit 0
              ;;
            main)
              SUFFIX="mono"
              ;;
            fix-*|feature-*)
              SUFFIX=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
              ;;
            *)
              echo "Branch $BRANCH_NAME not configured for modified package name"
              exit 0
              ;;
          esac

          echo "Modifying package for branch: $BRANCH_NAME"

          # Change namespace from @qvac to @tetherto and add suffix
          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          NEW_NAME="@tetherto/sdk-${SUFFIX}"

          echo "Package name: $ORIGINAL_NAME → $NEW_NAME"

          # Update package.json
          jq ".name = \"${NEW_NAME}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          MODIFIED_NAME=$(node -p "require('./package.json').name")
          echo "✓ Modified package.json: $MODIFIED_NAME"

          # Update @qvac/cli references in withMobileBundle.ts to @tetherto/cli-mono
          MOBILE_BUNDLE_FILE="expo/plugins/withMobileBundle.ts"
          if [ -f "$MOBILE_BUNDLE_FILE" ]; then
            echo "Updating @qvac/cli references in $MOBILE_BUNDLE_FILE to @tetherto/cli-mono"
            sed -i.bak "s|\"@qvac\"|\"@tetherto\"|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|\"cli\"|\"cli-mono\"|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|@qvac/cli|@tetherto/cli-mono|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|npx qvac|npx tetherto|g" "$MOBILE_BUNDLE_FILE"
            rm "${MOBILE_BUNDLE_FILE}.bak"
            echo "✓ Updated $MOBILE_BUNDLE_FILE"
          fi

          # Update references in expo-rpc-client.ts
          EXPO_RPC_CLIENT_FILE="client/rpc/expo-rpc-client.ts"
          if [ -f "$EXPO_RPC_CLIENT_FILE" ]; then
            echo "Updating @qvac/sdk references in $EXPO_RPC_CLIENT_FILE to $NEW_NAME"
            sed -i.bak "s|@qvac/sdk|${NEW_NAME}|g" "$EXPO_RPC_CLIENT_FILE"
            rm "${EXPO_RPC_CLIENT_FILE}.bak"
            echo "✓ Updated $EXPO_RPC_CLIENT_FILE"
          fi

      - name: Build (includes lint, typecheck, compile)
        run: bun run build
        working-directory: ${{ env.WORKDIR }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: dist
          path: ${{ env.WORKDIR }}/dist/
          retention-days: 1
      
      - name: Determine version and tag
        id: version
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BASE_VERSION=$(node -p "require('./package.json').version")

          if [ "$BRANCH_NAME" = "main" ]; then
            VERSION="$BASE_VERSION"
            TAG="latest"
            echo "Publishing main branch as @latest"
          else
            # Clean branch name for npm (replace invalid chars with -)
            CLEAN_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9.-]/-/g')
            VERSION="${BASE_VERSION}-${CLEAN_BRANCH}.$(date +%s).${GITHUB_SHA:0:7}"
            TAG="$CLEAN_BRANCH"
            echo "Publishing branch '$BRANCH_NAME' as @$TAG"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      branch: ${{ steps.version.outputs.branch }}


  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  publish-gpr:
    name: Publish to GitHub Packages (GPR)
    needs: [build, publish-logic]
    if: ${{ needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Modify package name for branch-based test publishing
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          # Extract suffix from branch patterns
          case "$BRANCH_NAME" in
            dev)
              SUFFIX="dev"
              ;;
            fix-*|feature-*)
              SUFFIX=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
              ;;
            *)
              echo "Branch $BRANCH_NAME not configured for modified package name"
              exit 0
              ;;
          esac

          echo "Modifying package name for branch: $BRANCH_NAME → suffix: $SUFFIX"

          # Modify package.json
          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          NEW_NAME="${ORIGINAL_NAME}-${SUFFIX}"

          jq ".name = \"${NEW_NAME}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          MODIFIED_NAME=$(node -p "require('./package.json').name")
          echo "Package name: $ORIGINAL_NAME → $MODIFIED_NAME"

      - name: Publish to GitHub Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.8
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || github.event.inputs.tag || needs.publish-logic.outputs.gpr_tag || 'dev'}}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

  publish-npm:
    name: Publish to NPM
    needs: [build, publish-logic, release-merge-guard]
    if: >-
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm-oidc@v1.1.8
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          git-token: ${{ secrets.GITHUB_TOKEN }}
          repo_name: sdk
          workdir: ${{ env.WORKDIR }}

  # Create GitHub release only for actual releases (after NPM publish)
  publish-release:
    needs: [publish-npm]
    if:  needs.publish-npm.result == 'success' && needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "sdk"
      release_name: "QVAC SDK"
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/sdk"