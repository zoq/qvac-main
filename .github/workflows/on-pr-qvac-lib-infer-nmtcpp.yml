name: On PR Trigger (NMTCPP)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
    paths:
      - "packages/qvac-lib-infer-nmtcpp/**"
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

jobs:
  release-pr-guard:
    name: Release PR Guard
    if: github.event_name == 'pull_request_target' && startsWith(github.event.pull_request.base.ref, 'release-')
    uses: tetherto/qvac-devops/.github/workflows/release-pr-guard.yml@monorepo_update
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      package-slug: qvac-lib-infer-nmtcpp
      package-json-path: packages/qvac-lib-infer-nmtcpp/package.json
      changelog-path: packages/qvac-lib-infer-nmtcpp/CHANGELOG.md

  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            pkg:
              - "packages/qvac-lib-infer-nmtcpp/**"

  sanity-checks:
    needs: changes
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fetch PR head and target branch
        id: fetch_pr
        if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}
          git fetch origin ${{ github.event.pull_request.head.sha }}:refs/pr/head

      - name: Check PR Status with Target Branch
        continue-on-error: true
        id: target_branch_checks
        if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
        run: |
          TARGET_SHA=${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}
          if ! git merge-base --is-ancestor "$TARGET_SHA" "$PR_HEAD_SHA"; then
            echo "::error title=PR is not up to date::This PR is not up to date with target branch"
          fi

      - name: Check for disallowed dependencies
        id: check_dependencies
        continue-on-error: true
        working-directory: ${{ env.PKG_DIR }}
        run: |
          deps=$(jq -r '.dependencies, .devDependencies // {} | to_entries[] | .value' package.json)
          if echo "$deps" | grep -Eq '^(git\+https:\/\/github.com|[0-9]+\.[0-9]+\.[0-9]+-(dev|tmp)[^"]*)$'; then
            echo "::error title=Disallowed dependency detected::Do not use git URLs or dev/tmp versions in dependencies"
          fi

      - name: Run tests
        id: run_tests
        continue-on-error: true
        uses: tetherto/qvac-devops/.github/actions/run-lint-and-unit-tests@monorepo_update
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          workdir: ${{ env.PKG_DIR }}

      - name: Check for errors
        run: |
          count=0
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "::error::Step - Lint or unit tests failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.check_dependencies.outcome }}" = "failure" ]; then
            echo "::error::Step - Check for disallowed dependencies failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.target_branch_checks.outcome }}" = "failure" ]; then
            echo "::error::Step - Check PR Status with Target Branch failed"
            count=$((count + 1))
          fi
          if [ "${{ steps.fetch_pr.outcome }}" = "failure" ]; then
            echo "::error::Step - Fetch PR head and target branch failed"
            count=$((count + 1))
          fi
          if [ $count -gt 0 ]; then
            echo "::error::There were $count failed checks"
            exit 1
          fi

  ts-checks:
    needs: [changes, sanity-checks]
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PKG_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure npm auth
        run: |
          qvac_registry="https://registry.npmjs.org/"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=${qvac_registry}
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          NPMRC

      - name: Install dependencies
        run: npm install

      - name: Type declaration check
        run: npm run test:dts

  cpp-lint:
    needs: [changes, sanity-checks]
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@monorepo_update
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      workdir: packages/qvac-lib-infer-nmtcpp

  cpp-tests:
    needs: [changes, sanity-checks]
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-cpp-tests-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      ref: ${{ github.event.pull_request.head.ref }}
      repository: ${{ github.event.pull_request.head.repo.full_name }}

  prebuild:
    needs: [changes, sanity-checks]
    if: |
      always() &&
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'verify')
      )
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}
      tag: "dev"
      publish_target: "gpr"

  run-integration-tests:
    needs: [changes, sanity-checks, prebuild]
    if: |
      always() &&
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'verify')
      )
    uses: ./.github/workflows/integration-test-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    needs: [changes, sanity-checks, prebuild]
    if: |
      always() &&
      (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'verify')
      )
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs:
      [
        changes,
        sanity-checks,
        ts-checks,
        cpp-lint,
        cpp-tests,
        prebuild,
        run-integration-tests,
        run-mobile-integration-tests,
      ]
    if: always() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@monorepo_update
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' && needs.cpp-tests.result == 'success' && needs.ts-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
      integration-tests-status: ${{ needs.run-integration-tests.result == 'success' }}
    secrets: inherit
