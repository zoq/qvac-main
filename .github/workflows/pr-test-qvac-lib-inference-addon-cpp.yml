name: Test pipeline for PRs (Inference-addon-cpp)

permissions:
  contents: read

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "packages/qvac-lib-inference-addon-cpp/**"
  workflow_dispatch:

env:
  PKG_DIR: packages/qvac-lib-inference-addon-cpp
  VCPKG_CACHE_DIR: ${{ github.workspace }}/packages/qvac-lib-inference-addon-cpp/vcpkg/cache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/packages/qvac-lib-inference-addon-cpp/vcpkg/cache,readwrite"

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  run-unit-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: yamlfmt
        uses: tetherto/qvac-devops/.github/actions/yamlfmt@v1.1.8
        with:
          workdir: ${{ env.PKG_DIR }}
        
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - if: ${{ matrix.os == 'ubuntu-22.04' && matrix.arch == 'arm64' }}
        name: Install tooling for cross compilation - ubuntu arm64
        run: |
          sudo apt update
          sudo apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross lld

      - if: ${{ matrix.os == 'windows-2022' }}
        name: setup cmake windows
        run: |
          cd ..
          Invoke-WebRequest https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-windows-x86_64.zip -OutFile cmake-3.31.6-windows-x86_64.zip
          Expand-Archive cmake-3.31.6-windows-x86_64.zip -DestinationPath $pwd
          $env:CMAKE_BIN = ("$(pwd)" -replace '\\', '/') + '/cmake-3.31.6-windows-x86_64/bin'
          echo $env:CMAKE_BIN > temp
          cat $env:GITHUB_PATH >> temp
          mv temp $env:GITHUB_PATH -Force

      - if: ${{ matrix.os == 'macos-14' }}
        name: setup cmake macos
        run: |
          cd ..
          wget https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-macos-universal.tar.gz
          tar -xvzf cmake-3.31.6-macos-universal.tar.gz
          echo $(pwd)/cmake-3.31.6-macos-universal/bin > temp
          cat $GITHUB_PATH >> temp
          mv temp $GITHUB_PATH

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Longpaths on windows
        run: git config --system core.longpaths true

      - name: Configure git
        run: |
          git config --global --add url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "git@github.com:"

      - if: ${{ matrix.os == 'macos-14' }}
        name: Install vcpkg in macos
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure vcpkg in windows
        run: echo ("VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure cmake generator in windows
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'x64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'x86' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=Win32" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'arm64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=ARM64" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'android' }}
        name: Configure runner for cross compilation - android
        run: |
          echo "ANDROID_TOOLCHAIN_ROOT=$(echo $ANDROID_NDK_HOME)/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "ANDROID_NATIVE_API_LEVEL=34" >> $GITHUB_ENV

      - name: Create vcpkg cache location
        run: mkdir -p "${{ env.PKG_DIR }}/vcpkg/cache"

      - name: Get vcpkg cache
        id: cache-vcpkg
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('packages/qvac-lib-inference-addon-cpp/vcpkg.json', 'packages/qvac-lib-inference-addon-cpp/vcpkg-configuration.json', 'packages/qvac-lib-inference-addon-cpp/vcpkg/ports/**') }}
          path: ${{ env.PKG_DIR }}/vcpkg/cache

      - name: Generate buildsystem
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --preset default -D BUILD_TESTING=ON -S . -B build

      - name: Build
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --build build

      - name: Run unit tests
        working-directory: ${{ env.PKG_DIR }}/build
        run: ctest --rerun-failed --output-on-failure --timeout 35

      - name: Debug build
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --preset default -D BUILD_TESTING=ON -D CMAKE_BUILD_TYPE=Debug -S . -B build && cmake --build build
