name: Reusable On-Merge Addon

on:
  workflow_call:
    inputs:
      package_slug:
        description: Package identifier for release-merge-guard and prebuilds
        required: true
        type: string
      workdir:
        description: Package working directory
        required: true
        type: string
      artifact_prefix:
        description: Artifact prefix for prebuild uploads
        required: false
        type: string
        default: addon
      gpr_package_name:
        description: Package name for GPR publish (e.g. @tetherto/llm-llamacpp)
        required: false
        type: string
        default: ""
      npm_package_name:
        description: Package name for npm publish (e.g. @qvac/llm-llamacpp)
        required: false
        type: string
        default: ""
      repo_name:
        description: Short repo name for npm publish and GitHub release (e.g. llamacpp-llm)
        required: true
        type: string
      release_name:
        description: Human-readable release name (e.g. QVAC LLM Addon)
        required: true
        type: string
      package_json_path:
        description: Path to package.json for release-merge-guard
        required: true
        type: string
      changelog_path:
        description: Path to CHANGELOG.md for release-merge-guard
        required: true
        type: string
      pre_gpr_publish_script:
        description: Optional bash script to run before GPR publish (e.g. rename prebuild files)
        required: false
        type: string
        default: ""
      tag:
        description: Tag override for publishing
        required: false
        type: string
        default: ""
      extra_generate_flags:
        description: Extra bare-make generate flags forwarded to prebuilds
        required: false
        type: string
        default: ""
      needs_vulkan:
        required: false
        type: boolean
        default: true
      needs_rust_targets:
        required: false
        type: boolean
        default: false
      needs_submodules:
        required: false
        type: boolean
        default: false
      extra_linux_packages:
        required: false
        type: string
        default: ""
      extra_brew_packages:
        required: false
        type: string
        default: ""
      ccache_scope:
        required: false
        type: string
        default: arm64-only
      linux_arm64_runner:
        required: false
        type: string
        default: ubuntu-22.04-arm
      macos_x64_runner:
        required: false
        type: string
        default: macos-15-intel

permissions:
  contents: read

jobs:
  publish-logic:
    runs-on: ubuntu-latest
    environment: release
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: ${{ inputs.package_slug }}
          package-json-path: ${{ inputs.package_json_path }}
          changelog-path: ${{ inputs.changelog_path }}

  build:
    needs: publish-logic
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_release == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_reusable-prebuilds-addon.yml
    secrets: inherit
    with:
      package_slug: ${{ inputs.package_slug }}
      workdir: ${{ inputs.workdir }}
      artifact_prefix: ${{ inputs.artifact_prefix }}
      extra_generate_flags: ${{ inputs.extra_generate_flags }}
      needs_vulkan: ${{ inputs.needs_vulkan }}
      needs_rust_targets: ${{ inputs.needs_rust_targets }}
      needs_submodules: ${{ inputs.needs_submodules }}
      extra_linux_packages: ${{ inputs.extra_linux_packages }}
      extra_brew_packages: ${{ inputs.extra_brew_packages }}
      ccache_scope: ${{ inputs.ccache_scope }}
      linux_arm64_runner: ${{ inputs.linux_arm64_runner }}
      macos_x64_runner: ${{ inputs.macos_x64_runner }}

  publish-gpr:
    needs: [build, publish-logic]
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    permissions:
      contents: read
      packages: write
    env:
      WORKDIR: ${{ inputs.workdir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ inputs.workdir }}/prebuilds

      - name: Set GPR package name
        if: ${{ inputs.gpr_package_name != '' }}
        shell: bash
        env:
          PKG_JSON_PATH: ${{ inputs.workdir }}/package.json
          WANT_NAME: ${{ inputs.gpr_package_name }}
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const f=process.env.PKG_JSON_PATH;const p=JSON.parse(fs.readFileSync(f,'utf8'));const want=process.env.WANT_NAME;if(p.name!==want){p.name=want;fs.writeFileSync(f,JSON.stringify(p,null,2));console.log('Set name to',p.name);}else{console.log('Already',p.name);}"

      - name: Run pre-GPR publish script
        if: ${{ inputs.pre_gpr_publish_script != '' }}
        shell: bash
        working-directory: ${{ inputs.workdir }}
        run: ${{ inputs.pre_gpr_publish_script }}

      - name: Publish to GitHub Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag != '' && inputs.tag || needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ inputs.workdir }}
          name-suffix: "-mono"

      - name: Capture published version
        id: capture_version
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: ${{ inputs.workdir }}
        run: |
          set -euo pipefail
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com/ >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: [build, publish-logic, release-merge-guard]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    permissions:
      contents: write
      packages: write
    env:
      WORKDIR: ${{ inputs.workdir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ inputs.workdir }}/prebuilds

      - name: Set npm package name
        if: ${{ inputs.npm_package_name != '' }}
        shell: bash
        env:
          PKG_JSON_PATH: ${{ inputs.workdir }}/package.json
          WANT_NAME: ${{ inputs.npm_package_name }}
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const f=process.env.PKG_JSON_PATH;const p=JSON.parse(fs.readFileSync(f,'utf8'));const want=process.env.WANT_NAME;if(p.name!==want){p.name=want;fs.writeFileSync(f,JSON.stringify(p,null,2));console.log('Set name to',p.name);}else{console.log('Already',p.name);}"

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm@v1.1.7
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          workdir: ${{ inputs.workdir }}
          repo_name: ${{ inputs.repo_name }}
          git-token: ${{ secrets.GITHUB_TOKEN }}
          create-tag: "false"

      - name: Capture published version
        id: capture_version
        working-directory: ${{ inputs.workdir }}
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    needs: [publish-npm]
    if: >-
      !cancelled() &&
      needs.publish-npm.result == 'success' &&
      needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: ${{ inputs.repo_name }}
      release_name: ${{ inputs.release_name }}
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: ${{ inputs.workdir }}
