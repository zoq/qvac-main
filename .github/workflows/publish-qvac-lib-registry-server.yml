name: Publish (Qvac-lib-registry-server)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    paths:
      - "packages/qvac-lib-registry-server/shared/**"
      - "packages/qvac-lib-registry-server/client/**"
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-registry-server/shared/**"
      - "packages/qvac-lib-registry-server/client/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PKG_DIR: packages/qvac-lib-registry-server
  NAME_SUFFIX: "-mono"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  release-merge-guard-schema:
    name: Release Merge Guard (Schema)
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref_name, 'release-qvac-registry-schema')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: qvac-registry-schema
          package-json-path: packages/qvac-lib-registry-server/shared/package.json
          changelog-path: packages/qvac-lib-registry-server/shared/CHANGELOG.md

  release-merge-guard-client:
    name: Release Merge Guard (Client)
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref_name, 'release-qvac-registry-client')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: qvac-registry-client
          package-json-path: packages/qvac-lib-registry-server/client/package.json
          changelog-path: packages/qvac-lib-registry-server/client/CHANGELOG.md

  detect-changes:
    needs: [authorize]
    runs-on: ubuntu-latest
    environment: release
    if: needs.authorize.outputs.allowed == 'true'
    outputs:
      schema_changed: ${{ steps.filter.outputs.schema }}
      client_changed: ${{ steps.filter.outputs.client }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Fetch PR head commits
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin ${{ github.event.pull_request.head.sha }}

      - name: Detect file changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          PKG_DIR="${PKG_DIR}"
          EVENT="${GITHUB_EVENT_NAME}"

          if [[ "${EVENT}" == "pull_request" || "${EVENT}" == "pull_request_target" ]]; then
            # PR diff: base..head
            BEFORE_SHA="${{ github.event.pull_request.base.sha }}"
            AFTER_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push/workflow_dispatch diff: before..sha
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"

            # workflow_dispatch has no "before". Also guard against the all-zero SHA.
            if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE_SHA="$(git rev-parse "${AFTER_SHA}^" 2>/dev/null || true)"
            fi

            # If we still couldn't resolve BEFORE_SHA (rare), treat as changed to allow manual runs.
            if [[ -z "${BEFORE_SHA}" ]]; then
              echo "schema=true" >> "$GITHUB_OUTPUT"
              echo "client=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- "${PKG_DIR}/shared/" | grep -q .; then
            echo "schema=true" >> "$GITHUB_OUTPUT"
          else
            echo "schema=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- "${PKG_DIR}/client/" | grep -q .; then
            echo "client=true" >> "$GITHUB_OUTPUT"
          else
            echo "client=false" >> "$GITHUB_OUTPUT"
          fi

  publish-logic:
    needs: [authorize]
    runs-on: ubuntu-latest
    if: needs.authorize.outputs.allowed == 'true'
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  publish-schema-gpr:
    needs: [authorize, detect-changes, publish-logic]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.schema_changed == 'true' &&
      (needs.publish-logic.outputs.publish_feature == 'true' ||
       needs.publish-logic.outputs.publish_main == 'true' ||
       needs.publish-logic.outputs.publish_tmp == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure npm for GitHub Package Registry
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Publish to GitHub Package Registry
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          workdir: ${{ env.PKG_DIR }}/shared
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          name-suffix: ${{ env.NAME_SUFFIX }}

  publish-schema-npm:
    needs: [authorize, detect-changes, publish-logic, release-merge-guard-schema]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.schema_changed == 'true' &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard-schema.result == 'success' || needs.release-merge-guard-schema.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure npm for GitHub Package Registry
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm@v1.1.7
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          workdir: ${{ env.PKG_DIR }}/shared
          repo_name: "registry-server"
          git-token: ${{ secrets.GITHUB_TOKEN }}

  publish-schema:
    name: Publish Schema (meta)
    needs: [authorize, publish-schema-gpr, publish-schema-npm]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      (needs.publish-schema-gpr.result == 'success' || needs.publish-schema-gpr.result == 'skipped') &&
      (needs.publish-schema-npm.result == 'success' || needs.publish-schema-npm.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - run: echo "Schema publish completed or skipped."

  publish-schema-release:
    needs: [publish-schema-npm]
    if: needs.publish-schema-npm.result == 'success' && needs.publish-schema-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "registry-server"
      release_name: "QVAC Registry Server"
      published_version: ${{ needs.publish-schema-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/qvac-lib-registry-server/shared"

  lint-and-test:
    needs: [authorize, detect-changes]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.client_changed == 'true'
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout base repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout PR head
        if: github.event_name == 'pull_request_target'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin ${{ github.event.pull_request.head.sha }}:refs/remotes/origin/pr-head
          git checkout --detach ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Configure npm for package registries
        shell: bash
        working-directory: ${{ env.PKG_DIR }}/client
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install client dependencies
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install

      - name: Install bare globally
        shell: bash
        run: npm install -g bare

      - name: Lint
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm run lint

      - name: Unit tests (node)
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm run test:unit

      - name: Unit tests (bare)
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm run test:unit:bare

      - name: Validate typings
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm run typecheck

  publish-client-gpr:
    needs: [authorize, detect-changes, publish-logic, lint-and-test]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.client_changed == 'true' &&
      (needs.publish-logic.outputs.publish_feature == 'true' ||
       needs.publish-logic.outputs.publish_main == 'true' ||
       needs.publish-logic.outputs.publish_tmp == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure npm for package registries
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish to GitHub Package Registry
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          workdir: ${{ env.PKG_DIR }}/client
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          name-suffix: ${{ env.NAME_SUFFIX }}

  publish-client-npm:
    needs: [authorize, detect-changes, publish-logic, lint-and-test, release-merge-guard-client]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.client_changed == 'true' &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard-client.result == 'success' || needs.release-merge-guard-client.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure npm for package registries
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm@v1.1.7
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          workdir: ${{ env.PKG_DIR }}/client
          repo_name: "registry-client"
          git-token: ${{ secrets.GITHUB_TOKEN }}

  publish-client-release:
    needs: [publish-client-npm]
    if: needs.publish-client-npm.result == 'success' && needs.publish-client-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "registry-client"
      release_name: "QVAC Registry Client"
      published_version: ${{ needs.publish-client-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/qvac-lib-registry-server/client"