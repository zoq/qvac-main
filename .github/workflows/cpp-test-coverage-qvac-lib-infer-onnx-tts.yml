name: CPP Tests (TTS)

on:
  push:
    branches: [main, "release-*"]
    paths:
      - "packages/qvac-lib-infer-onnx-tts/**"

  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true

    inputs:
      ref:
        description: "Git ref/sha to checkout"
        required: false
        type: string
      repository:
        description: "owner/repo to checkout"
        required: false
        type: string
      workdir:
        description: "Package working directory in monorepo"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-tts"

  workflow_dispatch:
    inputs:
      workdir:
        description: "Package working directory in monorepo"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-tts"
      ref:
        description: "Optional ref/sha override"
        required: false
        type: string

env:
  BUILD_TYPE: Debug
  ENABLE_COVERAGE: ON

permissions:
  contents: read

jobs:
  cpp-tests:
    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-cpp-tests

    permissions:
      contents: read
      packages: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            coverage: true

    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/cache,readwrite"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}

    steps:
      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.event.inputs.ref || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - name: Verify llvm-profdata and llvm-cov installation
        if: matrix.platform == 'linux'
        run: |
          ls -l /usr/bin/llvm-profdata* || echo "llvm-profdata not found"
          ls -l /usr/bin/llvm-cov* || echo "llvm-cov not found"
          which llvm-profdata || echo "llvm-profdata not in PATH"
          which llvm-profdata-19 || echo "llvm-profdata-19 not in PATH"
          dpkg -l | grep llvm || echo "No LLVM packages found"

      - name: Setup LLVM coverage tools symlinks
        if: matrix.platform == 'linux'
        run: |
          sudo ln -sf /usr/bin/llvm-profdata-19 /usr/local/bin/llvm-profdata
          sudo ln -sf /usr/bin/llvm-cov-19 /usr/local/bin/llvm-cov
          which llvm-cov
          llvm-profdata --version

      - name: Configure scoped registry for @tetherto and @qvac packages
        working-directory: ${{ env.WORKDIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          cat > .npmrc <<NPMRC
          always-auth=true
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install
          npm install -g bare bare-make

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Generate and build unit tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:build

      - name: Ensure TTS models for integration tests
        working-directory: ${{ env.WORKDIR }}
        run: npm run models:ensure

      - name: Run C++ Unit Tests
        id: cpp_tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:run
        continue-on-error: true

      - name: Check if test results exist
        id: check-test-results
        working-directory: ${{ env.WORKDIR }}
        run: |
          if [ -f build/addon/test/unit/cpp-test-results.xml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # 2.23.0
        if: always() && steps.check-test-results.outputs.exists == 'true'
        with:
          files: ${{ env.WORKDIR }}/build/addon/test/unit/cpp-test-results.xml
          comment_mode: off
          check_name: "C++ Test Results (${{ matrix.platform }}-${{ matrix.arch }})"

      - name: Generate Coverage Report
        if: ${{ matrix.coverage }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/addon/test/unit/coverage-summary.txt | awk '{print $10}')
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "Line Coverage: ${COVERAGE}" > coverage-badge.txt

      - name: Archive Coverage Results
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: coverage-report-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/addon/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/addon/test/unit/cpp-test-results.xml
          retention-days: 30

      - name: Coverage Summary
        if: ${{ matrix.coverage }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "## 🎯 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ matrix.platform }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/addon/test/unit/coverage-summary.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat build/addon/test/unit/coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

  coverage-report:
    needs: cpp-tests
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Download all coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: coverage-reports

      - name: Combine Coverage Reports
        run: |
          echo "## 📊 C++ Comprehensive Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built on:** Professional test foundation" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** 100+ comprehensive test cases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in coverage-reports/*/coverage-summary.txt; do
            if [ -f "$report" ]; then
              platform=$(basename $(dirname "$report"))
              echo "### $platform" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat "$report" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
