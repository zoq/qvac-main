name: On PR Trigger (LLM)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-llamacpp-llm/**"
      - ".github/workflows/*llamacpp-llm*.yml"
  workflow_dispatch:
  
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/qvac-lib-infer-llamacpp-llm

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  fabric-version-lockstep:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout current ref
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Verify qvac-fabric lockstep versions
        run: bash .github/scripts/check-fabric-lockstep.sh

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, fabric-version-lockstep]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/qvac-lib-infer-llamacpp-llm

  cpp-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks]
    uses: ./.github/workflows/cpp-tests-llm.yml
    secrets: inherit
    with:
      workdir: packages/qvac-lib-infer-llamacpp-llm
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  cpp-lint:
    if: needs.authorize.outputs.allowed == 'true'
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.7
    needs: authorize
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/qvac-lib-infer-llamacpp-llm

  ts-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Configure npm auth
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          NPMRC

      - name: Install dependencies
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: npm install

      - name: Type declaration check
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: npm run test:dts

  prebuild:
    needs: [authorize, sanity-checks]
    if: needs.authorize.outputs.allowed == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-llamacpp-llm.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-integration-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-test-qvac-lib-infer-llamacpp-llm.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-llamacpp-llm.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs:
      [
        authorize,
        fabric-version-lockstep,
        run-integration-tests,
        run-mobile-integration-tests,
        sanity-checks,
        prebuild,
        cpp-tests,
        cpp-lint,
        ts-checks,
      ]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' && needs.fabric-version-lockstep.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success'}}
