name: On PR Trigger (LLM)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-llamacpp-llm/**"
      - ".github/workflows/*llamacpp-llm*.yml"
  workflow_dispatch:
  
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  PKG_DIR: packages/qvac-lib-infer-llamacpp-llm

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/qvac-lib-infer-llamacpp-llm

  cpp-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks]
    uses: ./.github/workflows/_reusable-cpp-tests-addon.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      workdir: packages/qvac-lib-infer-llamacpp-llm
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  cpp-lint:
    if: needs.authorize.outputs.allowed == 'true'
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.7
    needs: authorize
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/qvac-lib-infer-llamacpp-llm

  ts-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Configure npm auth
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          NPMRC

      - name: Install dependencies
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: npm install

      - name: Type declaration check
        working-directory: packages/qvac-lib-infer-llamacpp-llm
        run: npm run test:dts

  # TEMP: purge stale S3 vcpkg cache so packages rebuild with corrected
  #       vcpkg clone path. Remove once cache is refreshed.
  purge-vcpkg-cache:
    needs: [authorize, sanity-checks]
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Purge stale vcpkg S3 cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          echo "Listing objects under s3://${MODEL_S3_BUCKET}/vcpkg-cache/ ..."
          aws s3 ls "s3://${MODEL_S3_BUCKET}/vcpkg-cache/" --recursive || true
          echo "Removing all objects under s3://${MODEL_S3_BUCKET}/vcpkg-cache/ ..."
          aws s3 rm "s3://${MODEL_S3_BUCKET}/vcpkg-cache/" --recursive
          echo "Done — vcpkg will rebuild from source."

  prebuild:
    needs: [authorize, sanity-checks, purge-vcpkg-cache]
    if: needs.authorize.outputs.allowed == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/_reusable-prebuilds-addon.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      package_slug: qvac-lib-infer-llamacpp-llm
      workdir: packages/qvac-lib-infer-llamacpp-llm
      artifact_prefix: llama-cpp
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}
      publish_target: "gpr"
      tag: pr-${{ github.event.pull_request.number }}

  run-integration-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-test-qvac-lib-infer-llamacpp-llm.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-llamacpp-llm.yml
    secrets:
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      LLM_ANDROID_DEVICE_POOL_ARN: ${{ secrets.LLM_ANDROID_DEVICE_POOL_ARN }}
      LLM_AWS_DEVICE_FARM_PROJECT_ARN: ${{ secrets.LLM_AWS_DEVICE_FARM_PROJECT_ARN }}
      LLM_IOS_DEVICE_POOL_ARN: ${{ secrets.LLM_IOS_DEVICE_POOL_ARN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs:
      [
        authorize,
        run-integration-tests,
        run-mobile-integration-tests,
        sanity-checks,
        prebuild,
        cpp-tests,
        cpp-lint,
        ts-checks,
      ]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success'}}
