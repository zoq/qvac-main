name: On Merge Trigger (Whispercpp)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-whispercpp/**"
      - ".github/workflows/*whispercpp*.yml"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: "dev"
        type: choice
        options:
          - latest
          - dev

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: qvac-lib-infer-whispercpp
          package-json-path: packages/qvac-lib-infer-whispercpp/package.json
          changelog-path: packages/qvac-lib-infer-whispercpp/CHANGELOG.md

  build:
    needs: publish-logic
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_release == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-whispercpp.yml
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      workdir: "packages/qvac-lib-infer-whispercpp"

  publish-gpr:
    needs: [build, publish-logic]
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    continue-on-error: true
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      WORKDIR: packages/qvac-lib-infer-whispercpp
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.WORKDIR }}/prebuilds

      - name: Rename prebuild files from qvac_ to tetherto_ prefix
        shell: bash
        run: |
          set -euo pipefail
          cd "${WORKDIR}"

          find prebuilds -depth -name 'qvac_*' | while read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newbase=$(echo "$base" | sed 's/^qvac_/tetherto_/')
            mv "$file" "$dir/$newbase"
          done

          if [ -f binding.js ]; then
            sed -i 's/qvac_/tetherto_/g' binding.js
          fi

      - name: Publish to GitHub Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag) || needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

      - name: Capture published version
        id: capture_version
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_NAME_GPR=$(echo "$PACKAGE_NAME" | sed 's/@qvac/@tetherto/')

          if npm view "${PACKAGE_NAME_GPR}@${VERSION}" version --registry=https://npm.pkg.github.com/ >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: [build, publish-logic, release-merge-guard]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped')
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      WORKDIR: packages/qvac-lib-infer-whispercpp
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.WORKDIR }}/prebuilds

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-npm@v1.1.7
        with:
          secret-token: ${{ secrets.NPM_TOKEN }}
          tag: "latest"
          workdir: ${{ env.WORKDIR }}
          repo_name: "whispercpp"
          git-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture published version
        id: capture_version
        working-directory: ${{ env.WORKDIR }}
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    needs: [publish-npm]
    if: |
      !cancelled() &&
      needs.publish-npm.result == 'success' &&
      needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "whispercpp"
      release_name: "QVAC Transcription Whisper Addon"
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/qvac-lib-infer-whispercpp"

  post-build-gate:
    name: Post-Build Gate
    runs-on: ubuntu-latest
    needs: [publish-gpr, publish-npm]
    if: "!cancelled()"
    outputs:
      should_run_tests: ${{ steps.gate.outputs.should_run_tests }}
    steps:
      - id: gate
        shell: bash
        run: |
          set -euo pipefail
          should="false"

          if [ "${{ needs.publish-gpr.result }}" = "success" ] || \
             [ "${{ needs.publish-npm.result }}" = "success" ]; then
            should="true"
          fi

          echo "should_run_tests=$should" >> "$GITHUB_OUTPUT"

  integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-qvac-lib-infer-whispercpp.yml
    needs: post-build-gate
    if: needs.post-build-gate.outputs.should_run_tests == 'true'
    permissions:
      contents: read
      packages: read
      id-token: write
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      workdir: "packages/qvac-lib-infer-whispercpp"

  mobile-integration-tests:
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-whispercpp.yml
    needs: post-build-gate
    if: needs.post-build-gate.outputs.should_run_tests == 'true'
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}

  benchmark:
    name: Trigger Benchmark (Whispercpp)
    runs-on: ubuntu-latest
    environment: release
    needs: post-build-gate
    if: "!cancelled() && needs.post-build-gate.outputs.should_run_tests == 'true'"
    steps:
      - name: Trigger benchmark workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run benchmark-qvac-lib-infer-whispercpp.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }} \
            -f dataset_type=librispeech \
            -f language=english \
            -f model_size=tiny \
            -f streaming_mode=false \
            -f workdir=packages/qvac-lib-infer-whispercpp
