name: PR Validation (Qvac-sdk)

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    paths:
      - "packages/qvac-sdk/**"
    branches:
      - main
      - release-*

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qvac-sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate PR title and description
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          echo "🔍 Validating PR..."
          echo "Title: $PR_TITLE"
          echo ""

          # Run validator
          node scripts/validator.cjs --type=pr --title="$PR_TITLE" --body="$PR_BODY"
