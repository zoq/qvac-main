name: Benchmark (Embed)

on:
  workflow_dispatch:
    inputs:
      gguf_model:
        description: 'GGUF Model to benchmark (HuggingFace format: "owner/repo:quantization")'
        required: true
        default: "ChristianAzinn/gte-large-gguf:F16"
        type: string
      num_samples:
        description: 'Number of samples per dataset (default: 100)'
        required: false
        default: "100"
        type: string
      datasets:
        description: 'Datasets to benchmark (comma-separated or "all"). Available: SciFact, NFCorpus, ArguAna, SCIDOCS, TRECCOVID, FiQA2018'
        required: false
        default: "all"
        type: string
      ctx_size:
        description: 'Context window size (default: 512) - Max tokens per input'
        required: false
        default: "512"
        type: string
      batch_size:
        description: 'Tokens available for processing multiple prompts together'
        required: false
        default: "2048"
        type: string
      gpu_layers:
        description: 'Number of GPU layers to offload (0-999) - Higher = more GPU usage, faster inference'
        required: false
        default: "99"
        type: string
      compare_with_transformers:
        description: 'Run comparative evaluation against SentenceTransformers'
        required: false
        default: true
        type: boolean
      transformers_model:
        description: 'SentenceTransformers model for comparison (should match GGUF model architecture)'
        required: false
        default: "thenlper/gte-large"
        type: string
      device:
        description: 'Device type for inference'
        required: false
        default: "gpu"
        type: choice
        options:
          - gpu
          - cpu
      verbose:
        description: 'Enable verbose logging for detailed output'
        required: false
        default: true
        type: boolean
      addon_version:
        description: 'Published @qvac/embed-llamacpp version (e.g., "0.1.0"). Leave empty to build from source.'
        required: false
        default: ""
        type: string
      hf_token:
        description: 'HuggingFace token for downloading gated models'
        required: false
        default: ""
        type: string
      workdir:
        description: 'Working directory for the addon in the monorepo'
        required: false
        default: "packages/qvac-lib-infer-llamacpp-embed"
        type: string

  workflow_call:
    inputs:
      gguf_model:
        description: 'GGUF Model to benchmark'
        required: true
        type: string
      num_samples:
        required: false
        default: "100"
        type: string
      datasets:
        required: false
        default: "all"
        type: string
      ctx_size:
        required: false
        default: "512"
        type: string
      batch_size:
        required: false
        default: "2048"
        type: string
      gpu_layers:
        required: false
        default: "99"
        type: string
      compare_with_transformers:
        required: false
        default: true
        type: boolean
      transformers_model:
        required: false
        default: "thenlper/gte-large"
        type: string
      device:
        required: false
        default: "gpu"
        type: string
      verbose:
        required: false
        default: true
        type: boolean
      addon_version:
        description: 'Published @qvac/embed-llamacpp version to use instead of building from source'
        required: false
        default: ""
        type: string
      hf_token:
        description: 'HuggingFace token for downloading gated models'
        required: false
        default: ""
        type: string
      workdir:
        description: 'Working directory for the addon in the monorepo'
        required: false
        default: "packages/qvac-lib-infer-llamacpp-embed"
        type: string

jobs:
  benchmark:
    runs-on: ai-run-linux-gpu
    timeout-minutes: 180
    name: "Benchmark ${{ inputs.gguf_model }}"

    env:
      WORKDIR: ${{ inputs.workdir || 'packages/qvac-lib-infer-llamacpp-embed' }}
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/${{ inputs.workdir || 'packages/qvac-lib-infer-llamacpp-embed' }}/vcpkg/cache,readwrite"

    steps:
      - name: Echo workflow inputs
        shell: bash
        env:
          GGUF_MODEL: ${{ inputs.gguf_model }}
          NUM_SAMPLES: ${{ inputs.num_samples }}
          DATASETS: ${{ inputs.datasets }}
          DEVICE: ${{ inputs.device }}
          CTX_SIZE: ${{ inputs.ctx_size }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          GPU_LAYERS: ${{ inputs.gpu_layers }}
          ADDON_VERSION: ${{ inputs.addon_version }}
          COMPARE: ${{ inputs.compare_with_transformers }}
          TRANSFORMERS_MODEL: ${{ inputs.transformers_model }}
          VERBOSE: ${{ inputs.verbose }}
          WORKDIR: ${{ inputs.workdir || 'packages/qvac-lib-infer-llamacpp-embed' }}
        run: |
          echo "=== Benchmark Configuration ==="
          echo "GGUF Model: $GGUF_MODEL"
          echo "Samples: $NUM_SAMPLES"
          echo "Datasets: $DATASETS"
          echo "Device: $DEVICE"
          echo ""
          echo "=== Model Parameters ==="
          echo "Context Size: $CTX_SIZE"
          echo "Batch Size: $BATCH_SIZE tokens"
          echo "GPU Layers: $GPU_LAYERS"
          echo ""
          echo "=== Comparison Mode ==="
          echo "Compare with SentenceTransformers: $COMPARE"
          if [[ "$COMPARE" == "true" ]]; then
            echo "Transformers Model: $TRANSFORMERS_MODEL"
          fi
          echo ""
          echo "=== Logging ==="
          echo "Verbose: $VERBOSE"
          echo ""
          echo "=== Addon Version ==="
          if [[ -n "$ADDON_VERSION" ]]; then
            echo "Using published package: @qvac/embed-llamacpp@$ADDON_VERSION"
          else
            echo "Building from source (latest code)"
          fi
          echo ""
          echo "=== Monorepo Workdir ==="
          echo "WORKDIR: $WORKDIR"

      - name: Check GPU availability
        run: |
          echo "=== GPU Information ==="
          if command -v nvidia-smi &> /dev/null; then
            nvidia-smi
          else
            echo "nvidia-smi not found - GPU may not be available"
          fi
          echo ""
          echo "=== System Information ==="
          uname -a
          cat /proc/cpuinfo | grep "model name" | head -1
          free -h

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'benchmarks/client/requirements.txt'

      - name: Configure scoped registry for @tetherto and @qvac packages
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
          WORKDIR: ${{ env.WORKDIR }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu

          {
            echo "registry=https://registry.npmjs.org/"
            echo "@qvac:registry=https://registry.npmjs.org/"
            echo "@tetherto:registry=https://npm.pkg.github.com/"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "//npm.pkg.github.com/:_authToken=${GIT_PAT}"
          } > .npmrc

          # Also write .npmrc into the package workdir (monorepo-safe)
          if [ -d "$WORKDIR" ]; then
            cp .npmrc "$WORKDIR/.npmrc"
          fi

          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install bare runtime
        run: npm install -g bare

      - name: Get vcpkg cache (monorepo)
        if: inputs.addon_version == ''
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKDIR }}/vcpkg/cache
          key: linux-x64-${{ hashFiles(format('{0}/vcpkg.json', env.WORKDIR), format('{0}/vcpkg-configuration.json', env.WORKDIR), format('{0}/vcpkg/ports/**', env.WORKDIR), 'vcpkg.json', 'vcpkg-configuration.json', 'vcpkg/ports/**') }}
          restore-keys: |
            linux-x64-

      - name: Build addon from source (monorepo workdir)
        if: inputs.addon_version == ''
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "=== Building addon from source in WORKDIR ==="
          echo "WORKDIR: $PWD"

          # Ensure vcpkg cache folder exists (monorepo-local)
          mkdir -p vcpkg/cache

          # Maximize build space
          echo "Cleaning up disk space..."
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/ghc /usr/share/dotnet /usr/local/lib/android || true
          df -h

          # Install LLVM 19
          echo "Installing LLVM 19..."
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo chmod 644 /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

          # Install bare-make
          npm install -g bare-make

          # Configure vcpkg
          echo "VCPKG_INSTALLATION_ROOT=$VCPKG_INSTALLATION_ROOT"
          if [ -n "${VCPKG_INSTALLATION_ROOT:-}" ] && [ -d "$VCPKG_INSTALLATION_ROOT" ]; then
            echo "Using pre-installed vcpkg at $VCPKG_INSTALLATION_ROOT"
            export VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT
          else
            echo "vcpkg not found, bootstrapping..."
            sudo apt-get update
            sudo apt-get install -y curl zip unzip tar pkg-config
            git clone https://github.com/Microsoft/vcpkg.git /tmp/vcpkg
            /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
            export VCPKG_ROOT=/tmp/vcpkg
          fi
          echo "VCPKG_ROOT=$VCPKG_ROOT"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV

          # Install system packages
          echo "Installing system dependencies..."
          sudo apt-get update
          sudo apt-get install -y libxi-dev libxtst-dev libxrandr-dev xz-utils

          # Install Vulkan SDK
          echo "Installing Vulkan SDK (latest)..."
          wget -q -O /tmp/vulkansdk.tar.xz https://sdk.lunarg.com/sdk/download/latest/linux/vulkan_sdk.tar.xz
          cd ~
          mkdir -p vulkan && cd vulkan
          tar xf /tmp/vulkansdk.tar.xz --strip-components=1
          export VULKAN_SDK=~/vulkan/x86_64
          export PATH=$VULKAN_SDK/bin:$PATH
          export LD_LIBRARY_PATH=$VULKAN_SDK/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
          export VK_ADD_LAYER_PATH=$VULKAN_SDK/share/vulkan/explicit_layer.d
          export PKG_CONFIG_PATH=$VULKAN_SDK/share/pkgconfig:$VULKAN_SDK/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "VK_ADD_LAYER_PATH=$VK_ADD_LAYER_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

          # Back to WORKDIR, install deps + build
          cd "$GITHUB_WORKSPACE/$WORKDIR"
          npm install

          echo "Running bare-make generate..."
          bare-make generate --platform linux --arch x64

          echo "Running bare-make build..."
          bare-make build

          echo "Running bare-make install..."
          bare-make install

          echo "=== Build complete ==="

      - name: Setup benchmark server environment
        working-directory: benchmarks/server
        run: |
          echo "Installing server dependencies..."
          cp ../../.npmrc .npmrc
          npm install

      - name: Setup Python virtual environment
        working-directory: benchmarks/client
        run: |
          echo "Creating Python virtual environment..."
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          # Install polars with runtime compatibility for Linux x86_64
          echo "Installing polars with runtime compatibility..."
          pip uninstall -y polars polars-runtime-32 polars-lts-cpu 2>/dev/null || true
          pip install "polars[rtcompat]"

      - name: Run benchmarks
        shell: bash
        env:
          GGUF_MODEL: ${{ inputs.gguf_model }}
          NUM_SAMPLES: ${{ inputs.num_samples }}
          DATASETS: ${{ inputs.datasets }}
          DEVICE: ${{ inputs.device }}
          CTX_SIZE: ${{ inputs.ctx_size }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          GPU_LAYERS: ${{ inputs.gpu_layers }}
          ADDON_VERSION: ${{ inputs.addon_version }}
          COMPARE: ${{ inputs.compare_with_transformers }}
          TRANSFORMERS_MODEL: ${{ inputs.transformers_model }}
          VERBOSE: ${{ inputs.verbose }}
          HF_TOKEN: ${{ inputs.hf_token || secrets.HF_TOKEN }}
          POLARS_SKIP_CPU_CHECK: "1"
          WORKDIR: ${{ env.WORKDIR }}
        run: |
          echo "=== Starting Benchmark Execution ==="
          echo "Monorepo addon WORKDIR: $WORKDIR"

          # Mask HF token in logs
          if [[ -n "${HF_TOKEN:-}" ]]; then
            echo "::add-mask::$HF_TOKEN"
          fi

          # Build arguments array safely (avoids eval command injection)
          ARGS=(
            --gguf-model "$GGUF_MODEL"
            --samples "$NUM_SAMPLES"
            --datasets "$DATASETS"
            --device "$DEVICE"
            --ctx-size "$CTX_SIZE"
            --batch-size "$BATCH_SIZE"
            --gpu-layers "$GPU_LAYERS"
          )

          # Add optional arguments
          if [[ -n "${ADDON_VERSION:-}" ]]; then
            ARGS+=(--addon-version "$ADDON_VERSION")
          fi

          if [[ -n "${HF_TOKEN:-}" ]]; then
            ARGS+=(--hf-token "$HF_TOKEN")
          fi

          if [[ "$COMPARE" == "true" ]]; then
            ARGS+=(--compare --transformers-model "$TRANSFORMERS_MODEL")
          fi

          if [[ "$VERBOSE" == "true" ]]; then
            ARGS+=(--verbose)
          fi

          echo "Running: ./benchmarks/run-benchmarks.sh ${ARGS[@]}"
          ./benchmarks/run-benchmarks.sh "${ARGS[@]}"

      - name: Display results summary
        if: always()
        shell: bash
        env:
          GGUF_MODEL: ${{ inputs.gguf_model }}
          NUM_SAMPLES: ${{ inputs.num_samples }}
          DATASETS: ${{ inputs.datasets }}
          DEVICE: ${{ inputs.device }}
          CTX_SIZE: ${{ inputs.ctx_size }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          GPU_LAYERS: ${{ inputs.gpu_layers }}
          ADDON_VERSION: ${{ inputs.addon_version }}
          COMPARE: ${{ inputs.compare_with_transformers }}
          TRANSFORMERS_MODEL: ${{ inputs.transformers_model }}
          VERBOSE: ${{ inputs.verbose }}
        run: |
          echo "=== Benchmark Results Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** \`$GGUF_MODEL\`" >> $GITHUB_STEP_SUMMARY
          echo "**Samples:** $NUM_SAMPLES" >> $GITHUB_STEP_SUMMARY
          echo "**Datasets:** $DATASETS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Context Size | $CTX_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Size | $BATCH_SIZE tokens |" >> $GITHUB_STEP_SUMMARY
          echo "| GPU Layers | $GPU_LAYERS |" >> $GITHUB_STEP_SUMMARY
          echo "| Device | $DEVICE |" >> $GITHUB_STEP_SUMMARY
          echo "| Verbose Logging | $VERBOSE |" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$ADDON_VERSION" ]]; then
            echo "| Addon Version | @qvac/embed-llamacpp@$ADDON_VERSION |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Addon Version | Built from source |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$COMPARE" == "true" ]]; then
            echo "### Comparison Mode" >> $GITHUB_STEP_SUMMARY
            echo "Compared against: \`$TRANSFORMERS_MODEL\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "benchmarks/results" ]; then
            echo "### Results Files" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            find benchmarks/results -type f -name "*.md" -mtime -1 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No result files found" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

            LATEST_MD=$(find benchmarks/results -type f -name "*.md" -mtime -1 2>/dev/null | head -1)
            if [[ -n "$LATEST_MD" ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Latest Result" >> $GITHUB_STEP_SUMMARY
              cat "$LATEST_MD" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            benchmarks/results/
            benchmarks/client/logs/
          retention-days: 90

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-logs-${{ github.run_number }}
          path: |
            benchmarks/server/server.log
            logs/
          retention-days: 90
