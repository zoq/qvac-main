name: Delete NPM Versions (Embed)

on:
  pull_request:
    types: [closed]
    paths:
      - "packages/qvac-lib-infer-llamacpp-embed/**"

  workflow_dispatch:
    inputs:
      version:
        description: "Specific version to target for deletion"
        required: false
        type: string
      pr-number:
        description: "PR number to target for deletion"
        required: false
        type: string
      pattern:
        description: "Pattern to target for deletion"
        required: false
        type: string
      packages:
        description: "Packages to target for deletion, space separated"
        required: false
        type: string
        default: "qvac-lib-infer-llamacpp-embed"
      dry-run:
        description: "Is dry run? If true, lists versions without deleting."
        type: boolean
        default: true

run-name: >-
  Delete NPM Versions
  v=${{ inputs.version }}
  pr=${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr-number }}
  dry=${{ github.event_name == 'pull_request' && true || inputs.dry-run }}

permissions:
  contents: read

jobs:
  on-pr-close:
    uses: ./.github/workflows/_reusable-on-pr-close-addon.yml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      pr-number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr-number }}
      pattern: ${{ inputs.pattern }}
      packages: ${{ inputs.packages || 'qvac-lib-infer-llamacpp-embed' }}
      # PR-close runs default to dry-run=true for safety; manual runs respect the UI toggle (true/false)
      dry-run: ${{ github.event_name == 'pull_request' && true || inputs.dry-run }}
