            fi

            sleep 5
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Schedule Device Farm Test Run
        id: schedule_run
        run: |
          # Set run name based on trigger
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUN_NAME="Manual-${{ github.run_number }}-${{ matrix.platform }}"
          else
            RUN_NAME="PR-${{ github.event.pull_request.number || github.run_number }}-${{ matrix.platform }}"
          fi

          PROJECT_ARN="${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_NMTCPP }}"
          APP_ARN="${{ steps.upload_app.outputs.app_upload_arn }}"
          TEST_CONFIG="type=APPIUM_NODE,testPackageArn=${{ steps.upload_test_package.outputs.test_package_upload_arn }},testSpecArn=${{ steps.upload_test_spec.outputs.test_spec_arn }}"

          schedule_run_with_pool() {
            local pool_arn="$1"
            local name="$2"
            aws devicefarm schedule-run \
              --project-arn "$PROJECT_ARN" \
              --device-pool-arn "$pool_arn" \
              --app-arn "$APP_ARN" \
              --name "$name" \
              --test "$TEST_CONFIG" \
              --execution-configuration jobTimeoutMinutes=120 \
              --query 'run.arn' --output text
          }

          schedule_run_with_filter() {
            local name="$1"
            local filter="$2"
            aws devicefarm schedule-run \
              --project-arn "$PROJECT_ARN" \
              --device-selection-configuration "$filter" \
              --app-arn "$APP_ARN" \
              --name "$name" \
              --test "$TEST_CONFIG" \
              --execution-configuration jobTimeoutMinutes=120 \
              --query 'run.arn' --output text
          }

          if [ "${{ matrix.platform }}" == "Android" ]; then
            echo "🚀 Scheduling parallel Android runs (Samsung Galaxy S25 Ultra + Google Pixel 9)..."

            echo "Querying available Samsung S25 Ultra devices..."
            aws devicefarm list-devices --region us-west-2 \
              --filters '[{"attribute":"MANUFACTURER","operator":"EQUALS","values":["Samsung"]},{"attribute":"MODEL","operator":"CONTAINS","values":["S25 Ultra"]},{"attribute":"PLATFORM","operator":"EQUALS","values":["ANDROID"]}]' \
              --query 'devices[].{name:name,model:model,os:os,availability:availability}' --output table || true

            echo "Querying available Pixel 9 devices..."
            aws devicefarm list-devices --region us-west-2 \
              --filters '[{"attribute":"MANUFACTURER","operator":"EQUALS","values":["Google"]},{"attribute":"MODEL","operator":"CONTAINS","values":["Pixel 9"]},{"attribute":"PLATFORM","operator":"EQUALS","values":["ANDROID"]}]' \
              --query 'devices[].{name:name,model:model,os:os,availability:availability}' --output table || true

            SAMSUNG_FILTER='{"filters":[{"attribute":"MANUFACTURER","operator":"EQUALS","values":["Samsung"]},{"attribute":"MODEL","operator":"CONTAINS","values":["S25 Ultra"]},{"attribute":"PLATFORM","operator":"EQUALS","values":["ANDROID"]}],"maxDevices":1}'
            RUN_ARN_1=$(schedule_run_with_filter "$RUN_NAME-Samsung" "$SAMSUNG_FILTER")
            echo "✅ Samsung run scheduled: $RUN_ARN_1"

            PIXEL_FILTER='{"filters":[{"attribute":"MANUFACTURER","operator":"EQUALS","values":["Google"]},{"attribute":"MODEL","operator":"CONTAINS","values":["Pixel 9"]},{"attribute":"PLATFORM","operator":"EQUALS","values":["ANDROID"]}],"maxDevices":1}'
            RUN_ARN_2=$(schedule_run_with_filter "$RUN_NAME-Pixel" "$PIXEL_FILTER")
            echo "✅ Pixel run scheduled: $RUN_ARN_2"

            echo "run_arn_1=$RUN_ARN_1" >> $GITHUB_OUTPUT
            echo "run_arn_2=$RUN_ARN_2" >> $GITHUB_OUTPUT
            echo "run_count=2" >> $GITHUB_OUTPUT
          else
            POOL_ARN="${{ secrets.IOS_DEVICE_POOL_ARN_NMTCPP }}"
            echo "🚀 Scheduling iOS run..."
            RUN_ARN_1=$(schedule_run_with_pool "$POOL_ARN" "$RUN_NAME")
            echo "✅ iOS run scheduled: $RUN_ARN_1"
            echo "run_arn_1=$RUN_ARN_1" >> $GITHUB_OUTPUT
            echo "run_count=1" >> $GITHUB_OUTPUT
          fi

          echo "All runs scheduled."

      - name: Monitor Test Run
        id: monitor_run
        run: |
          RUN_ARN_1="${{ steps.schedule_run.outputs.run_arn_1 }}"
          RUN_ARN_2="${{ steps.schedule_run.outputs.run_arn_2 }}"
          RUN_COUNT="${{ steps.schedule_run.outputs.run_count }}"

          echo "📊 Monitoring $RUN_COUNT Device Farm run(s)..."
          echo "  Run 1: $RUN_ARN_1"
          if [ "$RUN_COUNT" = "2" ]; then
            echo "  Run 2: $RUN_ARN_2"
          fi
          echo ""

          MAX_WAIT_TIME=7200  # 120 minutes
          ELAPSED=0
          DONE_1=false
          DONE_2=false

          while true; do
            if [[ "$DONE_1" != "true" ]]; then
              STATUS_1=$(aws devicefarm get-run --arn "$RUN_ARN_1" --query 'run.status' --output text)
              RESULT_1=$(aws devicefarm get-run --arn "$RUN_ARN_1" --query 'run.result' --output text)
              if [[ "$STATUS_1" == "COMPLETED" ]]; then DONE_1=true; fi
            fi

            if [[ "$RUN_COUNT" == "2" && "$DONE_2" != "true" ]]; then
              STATUS_2=$(aws devicefarm get-run --arn "$RUN_ARN_2" --query 'run.status' --output text)
              RESULT_2=$(aws devicefarm get-run --arn "$RUN_ARN_2" --query 'run.result' --output text)
              if [[ "$STATUS_2" == "COMPLETED" ]]; then DONE_2=true; fi
            fi

            if [ "$RUN_COUNT" = "2" ]; then
              echo "⏳ Run 1: $STATUS_1 ($RESULT_1) | Run 2: $STATUS_2 ($RESULT_2) - ${ELAPSED}s"
            else
              echo "⏳ Run status: $STATUS_1 ($RESULT_1) - ${ELAPSED}s"
            fi

            ALL_DONE=true
            if [[ "$DONE_1" != "true" ]]; then ALL_DONE=false; fi
            if [[ "$RUN_COUNT" == "2" && "$DONE_2" != "true" ]]; then ALL_DONE=false; fi
            if [[ "$ALL_DONE" == "true" ]]; then
              echo ""
              echo "✅ All runs completed!"
              break
            fi

            if [ $ELAPSED -ge $MAX_WAIT_TIME ]; then
              echo ""
              echo "❌ Timeout: exceeded ${MAX_WAIT_TIME}s"
              exit 1
            fi

            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          # Collect all run ARNs
          RUN_ARNS=("$RUN_ARN_1")
          if [ "$RUN_COUNT" = "2" ]; then
            RUN_ARNS+=("$RUN_ARN_2")
          fi

          # Aggregate results across all runs
          DEVICE_COUNT=0
          USER_TEST_COUNT=0
          USER_PASSED=0
          USER_FAILED=0
          FAILED_TEST_DETAILS=()
          ALL_RESULTS_PASSED=true
          TOTAL_TOTAL=0
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 FINAL TEST RESULTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          RUN_INDEX=0
          for RUN_ARN in "${RUN_ARNS[@]}"; do
            RUN_INDEX=$((RUN_INDEX + 1))
            RUN_DETAILS=$(aws devicefarm get-run --arn "$RUN_ARN" --output json)
            RESULT=$(echo $RUN_DETAILS | jq -r '.run.result')
            RUN_NAME_LABEL=$(echo $RUN_DETAILS | jq -r '.run.name')
            COUNTERS=$(echo $RUN_DETAILS | jq -r '.run.counters')

            if [[ "$RESULT" != "PASSED" && "$RESULT" != "SKIPPED" ]]; then ALL_RESULTS_PASSED=false; fi

            TOTAL_TOTAL=$((TOTAL_TOTAL + $(echo $COUNTERS | jq -r '.total // 0')))
            TOTAL_PASSED=$((TOTAL_PASSED + $(echo $COUNTERS | jq -r '.passed // 0')))
            TOTAL_FAILED=$((TOTAL_FAILED + $(echo $COUNTERS | jq -r '.failed // 0')))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + $(echo $COUNTERS | jq -r '.skipped // 0')))

            PROJECT_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:\([^/]*\)\/.*/\1/p')
            RUN_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:[^/]*\/\(.*\)/\1/p')

            if [ "$RUN_COUNT" = "2" ]; then
              echo "--- Run $RUN_INDEX: $RUN_NAME_LABEL (Result: $RESULT) ---"
            else
              echo "Result: $RESULT"
            fi

            JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --output json)
            for JOB_ARN in $(echo "$JOBS" | jq -r '.jobs[].arn'); do
              DEVICE_COUNT=$((DEVICE_COUNT + 1))
              JOB_DETAILS=$(aws devicefarm get-job --arn "$JOB_ARN" --output json)
              DEVICE_NAME=$(echo "$JOB_DETAILS" | jq -r '.job.device.name // "Unknown Device"')
              JOB_RESULT=$(echo "$JOB_DETAILS" | jq -r '.job.result // "UNKNOWN"')
              JOB_ID=$(echo "$JOB_ARN" | sed -n 's/.*:job:[^/]*\/[^/]*\/\(.*\)/\1/p')
              CONSOLE_LINK="https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}/jobs/${JOB_ID}"

              if [ "$JOB_RESULT" = "PASSED" ]; then
                echo "   ✅ $DEVICE_NAME: PASSED"
                USER_PASSED=$((USER_PASSED + 1))
              else
                echo "   ❌ $DEVICE_NAME: $JOB_RESULT"
                USER_FAILED=$((USER_FAILED + 1))
                FAILED_TEST_DETAILS+=("❌ $DEVICE_NAME: $JOB_RESULT")
                FAILED_TEST_DETAILS+=("   📎 View logs: $CONSOLE_LINK")
              fi
              USER_TEST_COUNT=$((USER_TEST_COUNT + 1))
            done

            echo "   🔗 Run link: https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}"
            echo ""
          done

          # Summary
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Devices tested: $DEVICE_COUNT"
          echo "  ✅ Passed: $USER_PASSED"
          echo "  ❌ Failed: $USER_FAILED"
          echo ""

          if [ ${#FAILED_TEST_DETAILS[@]} -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ FAILED TESTS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for failed_info in "${FAILED_TEST_DETAILS[@]}"; do
              echo "$failed_info"
            done
            echo ""
          fi

          echo "Device Farm totals: $TOTAL_TOTAL | Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED | Skipped: $TOTAL_SKIPPED"
          echo ""

          # Save outputs — pass if at least one device passed and none failed
          if [ $USER_FAILED -gt 0 ]; then
            echo "test_result=FAILED" >> $GITHUB_OUTPUT
          elif [ $USER_PASSED -gt 0 ]; then
            echo "test_result=PASSED" >> $GITHUB_OUTPUT
          else
            echo "test_result=FAILED" >> $GITHUB_OUTPUT
          fi
          echo "test_total=$TOTAL_TOTAL" >> $GITHUB_OUTPUT
          echo "test_passed=$TOTAL_PASSED" >> $GITHUB_OUTPUT
          echo "test_failed=$TOTAL_FAILED" >> $GITHUB_OUTPUT
          echo "test_skipped=$TOTAL_SKIPPED" >> $GITHUB_OUTPUT
          echo "user_test_count=$USER_TEST_COUNT" >> $GITHUB_OUTPUT
          echo "user_test_passed=$USER_PASSED" >> $GITHUB_OUTPUT
          echo "user_test_failed=$USER_FAILED" >> $GITHUB_OUTPUT

          if [ $USER_FAILED -gt 0 ]; then
            echo ""
            echo "❌ Device Farm tests failed"
            echo "   Devices: $USER_PASSED passed, $USER_FAILED failed (out of $USER_TEST_COUNT)"
            echo "   Totals: $TOTAL_TOTAL | Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED | Skipped: $TOTAL_SKIPPED"
            exit 1
          elif [ $USER_PASSED -eq 0 ] && [[ "$ALL_RESULTS_PASSED" != "true" ]]; then
            echo ""
            echo "❌ No devices ran tests (all runs skipped or errored)"
            exit 1
          fi

          echo ""
          echo "✅ Device Farm tests passed!"
          echo "   Devices: $USER_PASSED passed (out of $USER_TEST_COUNT)"
          if [ "$TOTAL_SKIPPED" -gt 0 ]; then
            echo "   ⚠️  $TOTAL_SKIPPED test(s) skipped (device unavailable)"
          fi
          echo "   Totals: $TOTAL_TOTAL | Passed: $TOTAL_PASSED | Failed: $TOTAL_FAILED | Skipped: $TOTAL_SKIPPED"

      - name: Download Device Farm Logs
        if: always() && steps.schedule_run.outputs.run_arn_1
        run: |
          RUN_ARN_1="${{ steps.schedule_run.outputs.run_arn_1 }}"
          RUN_ARN_2="${{ steps.schedule_run.outputs.run_arn_2 }}"
          RUN_COUNT="${{ steps.schedule_run.outputs.run_count }}"
          LOG_DIR="devicefarm-logs/${{ matrix.platform }}"
          PLATFORM="${{ matrix.platform }}"
          mkdir -p "$LOG_DIR"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📥 DOWNLOADING DEVICE FARM LOGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Logs are downloaded so anyone with repo access can view them"
          echo "without needing AWS Device Farm credentials."
          if [ "$PLATFORM" = "Android" ]; then
            echo "ℹ️  Skipping video artifacts on Android to reduce artifact size."
          fi
          echo ""

          RUN_ARNS=("$RUN_ARN_1")
          if [ "$RUN_COUNT" = "2" ] && [ -n "$RUN_ARN_2" ]; then
            RUN_ARNS+=("$RUN_ARN_2")
          fi

          for RUN_ARN in "${RUN_ARNS[@]}"; do
            RUN_DETAILS=$(aws devicefarm get-run --arn "$RUN_ARN" --output json 2>/dev/null || echo '{}')
            RUN_LABEL=$(echo "$RUN_DETAILS" | jq -r '.run.name // "unknown"')
            echo ""
            echo "========================================"
            echo "📦 Run: $RUN_LABEL"
            echo "========================================"

            JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --output json 2>/dev/null || echo '{"jobs":[]}')

            for JOB_ARN in $(echo "$JOBS" | jq -r '.jobs[].arn'); do
              DEVICE_NAME=$(echo "$JOBS" | jq -r --arg arn "$JOB_ARN" '.jobs[] | select(.arn == $arn) | .device.name // "unknown"')
              JOB_RESULT=$(echo "$JOBS" | jq -r --arg arn "$JOB_ARN" '.jobs[] | select(.arn == $arn) | .result // "UNKNOWN"')
              SAFE_NAME=$(echo "$DEVICE_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')

              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📱 $DEVICE_NAME ($JOB_RESULT)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              SUITES=$(aws devicefarm list-suites --arn "$JOB_ARN" --output json 2>/dev/null || echo '{"suites":[]}')

              for SUITE_ARN in $(echo "$SUITES" | jq -r '.suites[].arn'); do
                SUITE_NAME=$(echo "$SUITES" | jq -r --arg arn "$SUITE_ARN" '.suites[] | select(.arn == $arn) | .name // "unknown"')
                SAFE_SUITE=$(echo "$SUITE_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')

                ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type FILE --output json 2>/dev/null || echo '{"artifacts":[]}')

                echo "$ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                  ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                  ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                  ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                  [ -z "$ART_URL" ] && continue

                  if [ "$PLATFORM" = "Android" ]; then
                    if echo "$ART_NAME" | grep -qiE "^video$" || echo "$ART_EXT" | grep -qiE "^mp4$"; then
                      echo "  Skipped (video): $SUITE_NAME / $ART_NAME"
                      continue
                    fi
                  fi

                  SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                  DEST="$LOG_DIR/${SAFE_NAME}_${SAFE_SUITE}_${SAFE_ART}.${ART_EXT}"

                  if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                    echo "  Downloaded: $SUITE_NAME / $ART_NAME"

                    if echo "$ART_NAME" | grep -qiE "test.spec|testspec"; then
                      echo ""
                      echo "::group::📋 [$DEVICE_NAME] $SUITE_NAME — $ART_NAME"
                      cat "$DEST" 2>/dev/null || true
                      echo "::endgroup::"
                    fi
                  fi
                done

                LOG_ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type LOG --output json 2>/dev/null || echo '{"artifacts":[]}')

                echo "$LOG_ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                  ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                  ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                  ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                  [ -z "$ART_URL" ] && continue

                  SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                  DEST="$LOG_DIR/${SAFE_NAME}_${SAFE_SUITE}_${SAFE_ART}.${ART_EXT}"

                  if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                    echo "  Downloaded: $SUITE_NAME / $ART_NAME (LOG)"
                  fi
                done
              done

              JOB_ARTIFACTS=$(aws devicefarm list-artifacts --arn "$JOB_ARN" --type FILE --output json 2>/dev/null || echo '{"artifacts":[]}')
              echo "$JOB_ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                [ -z "$ART_URL" ] && continue

                if [ "$PLATFORM" = "Android" ]; then
                  if echo "$ART_NAME" | grep -qiE "^video$" || echo "$ART_EXT" | grep -qiE "^mp4$"; then
                    echo "  Skipped (video): job-level / $ART_NAME"
                    continue
                  fi
                fi

                SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                DEST="$LOG_DIR/${SAFE_NAME}_job_${SAFE_ART}.${ART_EXT}"

                if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                  echo "  Downloaded (job-level): $ART_NAME"
                fi
              done
            done
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 All downloaded logs:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find "$LOG_DIR" -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no logs downloaded)"

      - name: Extract performance report from Device Farm logs
        if: always() && steps.schedule_run.outputs.run_arn_1
        id: extract_perf
        run: |
          LOG_DIR="devicefarm-logs/${{ matrix.platform }}"
          OUTPUT_DIR="perf-results-mobile/${{ matrix.platform }}"
          mkdir -p "$OUTPUT_DIR"

          if [ ! -d "$LOG_DIR" ] || [ -z "$(ls -A "$LOG_DIR" 2>/dev/null)" ]; then
            echo "No Device Farm logs downloaded — skipping perf extraction."
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 EXTRACTING PERF REPORT FROM DEVICE FARM LOGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Log source: $LOG_DIR"
          echo "Output:     $OUTPUT_DIR"

          # Pre-flight: show where markers were found, to aid debugging
          echo ""
          echo "Files containing PERF_REPORT markers:"
          for f in $(find "$LOG_DIR" -type f \( -name "*.txt" -o -name "*.log" \)); do
            N_START=$(grep -c "PERF_REPORT_START" "$f" 2>/dev/null || echo 0)
            N_CHUNK=$(grep -c "PERF_CHUNK" "$f" 2>/dev/null || echo 0)
            if [ "${N_START:-0}" != "0" ] || [ "${N_CHUNK:-0}" != "0" ]; then
              echo "  $f: START=$N_START, CHUNK=$N_CHUNK"
            fi
          done

          # The monorepo is checked out under ./monorepo (per the checkout
          # step above); scripts are NOT in the workspace root.
          SCRIPTS_DIR="monorepo/scripts/perf-report"
          if [ ! -f "$SCRIPTS_DIR/extract-from-log.js" ]; then
            echo "::warning::$SCRIPTS_DIR/extract-from-log.js not found; skipping"
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node "$SCRIPTS_DIR/extract-from-log.js" \
            "$LOG_DIR" \
            "$OUTPUT_DIR/performance-report.json" \
            --run-number "${{ github.run_number }}" || true

          if find "$OUTPUT_DIR" -name "performance-report.json" -type f | head -1 | grep -q .; then
            echo ""
            echo "✓ performance-report.json produced. Generating HTML/MD/summary..."
            node "$SCRIPTS_DIR/aggregate.js" \
              --dir "$OUTPUT_DIR" \
              --output-html "$OUTPUT_DIR/performance-report.html" \
              --output-json "$OUTPUT_DIR/performance-summary.json" \
              --output "$OUTPUT_DIR/performance-report.md" || true
            echo "extracted=true" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "⚠️  extract-from-log.js produced no performance-report.json."
            echo "   Raw Device Farm logs are still uploaded as the devicefarm-logs-${{ matrix.platform }} artifact."
            echo "extracted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write mobile perf report to GitHub Step Summary
        if: always() && steps.extract_perf.outputs.extracted == 'true'
        run: |
          OUTPUT_DIR="perf-results-mobile/${{ matrix.platform }}"
          SCRIPTS_DIR="monorepo/scripts/perf-report"
          RENDERER="$SCRIPTS_DIR/render-step-summary.js"

          if [ ! -f "$RENDERER" ]; then
            echo "::warning::$RENDERER not found; skipping Step Summary"
            exit 0
          fi

          # Render the same compact single-table layout the desktop
          # integration tests use (Test | EP | Total Time (ms) | Decode (ms)
          # | Tokens | TPS | chrF++), so mobile and desktop Step Summaries
          # share the same headers and reading experience.
          #
          # extract-from-log.js writes `<OUTPUT_DIR>/performance-report.json`
          # when the run has a single device (iOS) and
          # `<OUTPUT_DIR>/<Device_Name>/performance-report.json` when multiple
          # devices are present (Android matrix: Pixel + Samsung). Cover both.
          if [ -f "$OUTPUT_DIR/performance-report.json" ]; then
            node "$RENDERER" \
              "$OUTPUT_DIR/performance-report.json" \
              "$GITHUB_STEP_SUMMARY" \
              --title "Mobile Performance: nmtcpp (${{ matrix.platform }})"
            exit 0
          fi

          RENDERED=0
          for DEV_DIR in "$OUTPUT_DIR"/*/; do
            DEV_REPORT="$DEV_DIR/performance-report.json"
            [ -f "$DEV_REPORT" ] || continue
            DEV_NAME=$(basename "$DEV_DIR" | tr '_' ' ')
            node "$RENDERER" \
              "$DEV_REPORT" \
              "$GITHUB_STEP_SUMMARY" \
              --title "Mobile Performance: nmtcpp (${{ matrix.platform }} · ${DEV_NAME})"
            RENDERED=$((RENDERED + 1))
          done

          if [ "$RENDERED" = "0" ]; then
            echo "::warning::No performance-report.json found under $OUTPUT_DIR (neither root nor per-device); skipping Step Summary"
          fi

      - name: Upload mobile performance report
        if: always() && steps.schedule_run.outputs.run_arn_1
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: perf-report-nmtcpp-mobile-${{ matrix.platform }}-${{ github.run_number }}
          path: |
            perf-results-mobile/${{ matrix.platform }}/performance-report.json
            perf-results-mobile/${{ matrix.platform }}/performance-report.html
            perf-results-mobile/${{ matrix.platform }}/performance-report.md
            perf-results-mobile/${{ matrix.platform }}/performance-summary.json
          retention-days: 90
          if-no-files-found: ignore

      # Console-log extraction/upload added in #1714. Keeps console artifacts
      # (logcat for Android, bare_console.log + appium.log pulled from
      # Customer_Artifacts.zip for iOS) separate from the raw Device Farm
      # archive so they're smaller and easier to browse.
      - name: Extract Console Logs
        if: always() && steps.schedule_run.outputs.run_arn_1
        run: |
          LOG_DIR="devicefarm-logs/${{ matrix.platform }}"
          CONSOLE_DIR="console-logs/${{ matrix.platform }}"
          mkdir -p "$CONSOLE_DIR"
          for f in "$LOG_DIR"/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            if echo "$fname" | grep -qiE "Logcat\."; then
              cp "$f" "$CONSOLE_DIR/"
              echo "  Console log: $fname"
            fi
            if echo "$fname" | grep -qiE "Customer_Artifacts\.zip$"; then
              prefix=$(echo "$fname" | sed 's/_Customer_Artifacts\.zip$//')
              tmpdir=$(mktemp -d)
              if unzip -qo "$f" -d "$tmpdir" 2>/dev/null; then
                bare_log=$(find "$tmpdir" -name "bare_console.log" -type f 2>/dev/null | head -1)
                if [ -n "$bare_log" ]; then
                  cp "$bare_log" "$CONSOLE_DIR/${prefix}_bare_console.log"
                  echo "  Extracted: ${prefix}_bare_console.log"
                fi
                appium_log=$(find "$tmpdir" -name "appium.log" -type f 2>/dev/null | head -1)
                if [ -n "$appium_log" ]; then
                  cp "$appium_log" "$CONSOLE_DIR/${prefix}_appium.log"
                  echo "  Extracted: ${prefix}_appium.log"
                fi
              else
                echo "  WARNING: Failed to unzip $fname"
              fi
              rm -rf "$tmpdir"
            fi
          done
          echo ""
          echo "📋 Console logs extracted:"
          find "$CONSOLE_DIR" -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no console logs found)"

      - name: Upload Console Logs
        if: always() && steps.schedule_run.outputs.run_arn_1
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: console-logs-${{ matrix.platform }}
          path: console-logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Full Device Farm Logs
        if: always() && steps.schedule_run.outputs.run_arn_1
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: devicefarm-logs-${{ matrix.platform }}
          path: devicefarm-logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with results
        if: always() && github.event.pull_request.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runArn = '${{ steps.schedule_run.outputs.run_arn_1 }}' || 'N/A';
            const jobStatus = '${{ job.status }}';
            const testResult = '${{ steps.monitor_run.outputs.test_result }}' || 'UNKNOWN';
            const platform = '${{ matrix.platform }}';
            const prNumber = context.payload.pull_request.number;

            const total = '${{ steps.monitor_run.outputs.test_total }}' || '0';
            const passed = '${{ steps.monitor_run.outputs.test_passed }}' || '0';
            const failed = '${{ steps.monitor_run.outputs.test_failed }}' || '0';
            const skipped = '${{ steps.monitor_run.outputs.test_skipped }}' || '0';

            let emoji = jobStatus === 'success' ? '✅' : '❌';
            let statusText = jobStatus === 'success' ? 'PASSED' : 'FAILED';

            // Extract PROJECT_ID and RUN_ID from ARN
            // ARN format: arn:aws:devicefarm:us-west-2:ACCOUNT:run:PROJECT_ID/RUN_ID
            let deviceFarmLink = 'https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects';
            const arnMatch = runArn.match(/:run:([^/]+)\/(.+)$/);
            if (arnMatch) {
              const projectId = arnMatch[1];
              const runId = arnMatch[2];
              deviceFarmLink = `https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${projectId}/runs/${runId}`;
            }

            // Build test summary table
            const testSummary = `
            | Metric | Count |
            |--------|-------|
            | Total Tests | ${total} |
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |
            `;

            const comment = `
            ## ${emoji} E2E Mobile Test Results - ${platform}

            **Overall Status**: ${statusText}
            **Device Farm Result**: ${testResult}
            **Platform**: ${platform}
            **Addon**: ${{ env.ADDON_NAME }}
            **PR**: #${prNumber}
            **Commit**: ${context.sha.substring(0, 7)}

            ### Test Summary
            ${testSummary}

            ### Links
            - 🔗 **Device Farm Run**: [View on AWS Device Farm](${deviceFarmLink})
            - 🔗 **Workflow**: [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})
            - 📋 **Run ARN**: \`${runArn}\`

            ---
            *Automated E2E mobile testing powered by AWS Device Farm*
            *Tests located in: \`test/mobile/\`*
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
