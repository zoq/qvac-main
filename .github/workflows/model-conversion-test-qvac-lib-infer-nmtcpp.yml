name: Model Conversion Test (NMTCPP)

on:
  workflow_call:
    inputs:
      items:
        description: "Comma-separated list of items"
        required: false
        type: string
        default: "en-it, tatoeba-en-ja"
      quant_f32:
        description: "Enable f32 conversion"
        required: false
        type: boolean
        default: false
      quant_f16:
        description: "Enable f16 conversion"
        required: false
        type: boolean
        default: true
      quant_q4_0:
        description: "Enable q4_0 conversion"
        required: false
        type: boolean
        default: true
      upload_models:
        description: "Upload models artifacts"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      items:
        description: "Comma-separated list of items"
        required: true
        type: string
      quant_f32:
        description: "Enable f32 conversion"
        required: false
        type: boolean
        default: false
      quant_f16:
        description: "Enable f16 conversion"
        required: false
        type: boolean
        default: true
      quant_q4_0:
        description: "Enable q4_0 conversion"
        required: false
        type: boolean
        default: true
      upload_models:
        description: "Upload models artifacts"
        required: false
        type: boolean
        default: false

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

jobs:
  setup:
    runs-on: macos-14
    outputs:
      models: ${{ steps.prepare.outputs.models }}
      quants: ${{ steps.prepare_quants.outputs.quants }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v6
        with:
          python-version: 3
          cache: pip
          cache-dependency-path: ${{ env.PKG_DIR }}/scripts/conversion_scripts/requirements.txt

      - name: Prepare models output
        id: prepare
        shell: bash
        run: |
          RAW="${{ inputs.items || github.event.inputs.items }}"
          NORMALIZED="$(printf '%s' "$RAW" | tr '\n' ',' | sed -E 's/[[:space:]]+/,/g; s/,+/,/g; s/^,|,$//g')"
          IFS=',' read -r -a PARTS <<< "$NORMALIZED"
          JSON_ARRAY="["
          for item in "${PARTS[@]}"; do
            [ -z "$item" ] && continue
            esc=${item//\\/\\\\}
            esc=${esc//\"/\\\"}
            JSON_ARRAY="$JSON_ARRAY\"$esc\","
          done
          JSON_ARRAY="${JSON_ARRAY%,}]"
          echo "models=$JSON_ARRAY" >> "$GITHUB_OUTPUT"

      - name: Prepare quantizations output
        id: prepare_quants
        shell: bash
        run: |
          QUANTS="["
          if [[ "${{ inputs.quant_f32 || github.event.inputs.quant_f32 }}" == "true" ]]; then
            QUANTS="$QUANTS\"f32\","
          fi
          if [[ "${{ inputs.quant_f16 || github.event.inputs.quant_f16 }}" == "true" ]]; then
            QUANTS="$QUANTS\"f16\","
          fi
          if [[ "${{ inputs.quant_q4_0 || github.event.inputs.quant_q4_0 }}" == "true" ]]; then
            QUANTS="$QUANTS\"q4_0\","
          fi
          QUANTS="${QUANTS%,}]"
          echo "quants=$QUANTS" >> "$GITHUB_OUTPUT"

      - name: Validate quantizations selection
        shell: bash
        run: |
          if [[ "${{ steps.prepare_quants.outputs.quants }}" == "[]" ]]; then
            echo "Error: No quantization selected. Enable at least one of quant_f32, quant_f16, quant_q4_0."
            exit 1
          fi

  Build:
    needs: setup
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Configure scoped registry for @tetherto and @qvac packages
        working-directory: ${{ env.PKG_DIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GIT_PAT}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
            git config --global url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Configure git
        shell: bash
        run: |
          GIT_PAT="${{ secrets.PAT_TOKEN }}"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install vcpkg
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH
          cd $GITHUB_WORKSPACE

      - name: Install npm dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      - name: Install global dependencies
        run: npm install -g bare-make bare-runtime

      - name: Build
        working-directory: ${{ env.PKG_DIR }}
        run: |
          bare-make generate
          bare-make build
          bare-make install

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: qvac-addon-build
          path: |
            ${{ env.PKG_DIR }}/prebuilds/
            ${{ env.PKG_DIR }}/node_modules/
          retention-days: 1

  Model-conversion:
    needs: [setup, Build]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.setup.outputs.models) }}
        quant: ${{ fromJson(needs.setup.outputs.quants) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v6
        with:
          python-version: 3
          cache: pip
          cache-dependency-path: ${{ env.PKG_DIR }}/scripts/conversion_scripts/requirements.txt

      - name: Install bare-runtime
        run: npm install -g bare-runtime

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: qvac-addon-build
          path: ${{ env.PKG_DIR }}

      - name: Install Python dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: |
          pip install --upgrade pip
          pip install -r scripts/conversion_scripts/requirements.txt

      - name: Convert models to ggml (all selected quantizations)
        working-directory: ${{ env.PKG_DIR }}
        run: |
          set -euo pipefail
          DATE="$(date +%Y-%m-%d)"
          MODEL="${{ matrix.model }}"
          RAW_QUANT="${{ matrix.quant }}"
          # Resolve repo and output prefix for the model
          if [[ "$MODEL" == *tatoeba* ]]; then
            repo_id="Helsinki-NLP/opus-$MODEL"
            out_prefix="ggml-opus-$MODEL"
          else
            repo_id="Helsinki-NLP/opus-mt-$MODEL"
            out_prefix="ggml-opus-$MODEL"
          fi
          # Map quantization to output folder segment
          if [[ "$RAW_QUANT" == "f32" ]]; then
            QUANT="q0f32"
          elif [[ "$RAW_QUANT" == "f16" ]]; then
            QUANT="q016"
          elif [[ "$RAW_QUANT" == "q4_0" ]]; then
            QUANT="q4_0"
          else
            echo "Error: Invalid quantization '$RAW_QUANT'. Expected one of: f32, f16, q4_0."
            exit 1
          fi
          mkdir -p "models/$QUANT/$out_prefix/$DATE"
          echo "Converting $MODEL ($repo_id) -> $QUANT/$out_prefix/$DATE ..."
          python scripts/conversion_scripts/convert_opus_to_ggml.py \
            --model-dir "$repo_id" \
            --output "models/$QUANT/$out_prefix/$DATE/$out_prefix.bin" \
            --quant "$RAW_QUANT"
          echo "Finished conversions for $MODEL with quant $RAW_QUANT"

      - name: Run nmt-cli
        working-directory: ${{ env.PKG_DIR }}
        run: |
          set -euo pipefail
          DATE="$(date +%Y-%m-%d)"
          MODEL="${{ matrix.model }}"
          RAW_QUANT="${{ matrix.quant }}"
          if [[ "$MODEL" == tatoeba-* ]]; then
            PAIR="${MODEL#tatoeba-}"
          else
            PAIR="$MODEL"
          fi
          SRC="${PAIR%%-*}"
          DST="${PAIR#*-}"
          echo "Parsed languages — SRC: $SRC, DST: $DST (model $MODEL)"
          out_prefix="ggml-opus-$MODEL"
          if [[ "$RAW_QUANT" == "f32" ]]; then TEST_QUANT="q0f32";
          elif [[ "$RAW_QUANT" == "f16" ]]; then TEST_QUANT="q016";
          else TEST_QUANT="q4_0"; fi
          echo "Testing $MODEL with quantization: $RAW_QUANT ($TEST_QUANT)"
          echo "Hello world" | bare nmt-cli --model "models/$TEST_QUANT/$out_prefix/$DATE/$out_prefix.bin" "$SRC" "$DST"

      - name: Upload models artifact
        uses: actions/upload-artifact@v6
        if: ${{ inputs.upload_models || github.event.inputs.upload_models }}
        with:
          name: ggml-opus-${{ matrix.quant }}-${{ matrix.model }}
          path: ${{ env.PKG_DIR }}/models/
          if-no-files-found: error
          retention-days: 14

  merge:
    if: ${{ inputs.upload_models || github.event.inputs.upload_models }}
    needs: [setup, Model-conversion]
    runs-on: macos-14
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: merged_raw
          pattern: ggml-opus-*
          merge-multiple: true

      - name: Merge all model artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle/models
          shopt -s nullglob dotglob
          # If a top-level models/ exists (due to merged downloads), copy it first
          if [[ -d "merged_raw/models" ]]; then
            echo "Merging merged_raw/models into bundle/models/"
            rsync -a "merged_raw/models/" "bundle/models/"
          fi
          # Merge any nested models/ directories from downloaded artifacts
          while IFS= read -r -d '' dir; do
            # Skip if it's the top-level merged_raw/models already handled
            if [[ "$dir" != "merged_raw/models" ]]; then
              echo "Merging $dir into bundle/models/"
              rsync -a "$dir"/ "bundle/models/"
            fi
          done < <(find merged_raw -type d -name models -print0)
          # Fallback: if nothing ended up in bundle/models, copy everything
          if ! find bundle/models -mindepth 1 -print -quit | grep -q .; then
            echo "No 'models' directories found. Falling back to copying all contents under merged_raw/ into bundle/models/"
            rsync -a "merged_raw/" "bundle/models/"
          fi

      - name: Upload merged models artifact
        uses: actions/upload-artifact@v6
        with:
          name: ggml-opus-merged-models
          path: bundle/models
          if-no-files-found: error
          retention-days: 14
