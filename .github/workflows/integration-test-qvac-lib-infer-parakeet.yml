name: Run Integration Tests (Parakeet)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/transcription-parakeet@1.0.0)"
        required: true
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true
      run_rtf_benchmarks:
        description: "Run RTF performance benchmarks"
        required: false
        type: boolean
        default: true
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        required: false
        type: string

  workflow_call:
    inputs:
      ref:
        description: 'ref'
        type: string
      repository:
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        type: boolean
        required: false
        default: true
      run_rtf_benchmarks:
        description: "Run RTF performance benchmarks"
        type: boolean
        required: false
        default: true
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        type: string
        required: false

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}-integration-tests
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ai-run-ubuntu-22.04
            platform: linux
            arch: x64
            rtf_gpu_enabled: false
            rtf_gpu_backend: cpu
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"}]
          - os: ai-run-linux-gpu
            platform: linux
            arch: x64
            rtf_gpu_enabled: true
            rtf_gpu_backend: cuda
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"},{"modelType":"tdt","useGPU":true,"backendHint":"cuda"},{"modelType":"ctc","useGPU":true,"backendHint":"cuda"},{"modelType":"eou","useGPU":true,"backendHint":"cuda"},{"modelType":"sortformer","useGPU":true,"backendHint":"cuda"}]
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            rtf_gpu_enabled: false
            rtf_gpu_backend: cpu
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"}]
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            rtf_gpu_enabled: true
            rtf_gpu_backend: coreml
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"},{"modelType":"tdt","useGPU":true,"backendHint":"coreml"},{"modelType":"ctc","useGPU":true,"backendHint":"coreml"},{"modelType":"eou","useGPU":true,"backendHint":"coreml"},{"modelType":"sortformer","useGPU":true,"backendHint":"coreml"}]
          - os: macos-15-large
            platform: darwin
            arch: x64
            rtf_gpu_enabled: true
            rtf_gpu_backend: coreml
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"},{"modelType":"tdt","useGPU":true,"backendHint":"coreml"},{"modelType":"ctc","useGPU":true,"backendHint":"coreml"},{"modelType":"eou","useGPU":true,"backendHint":"coreml"},{"modelType":"sortformer","useGPU":true,"backendHint":"coreml"}]
          - os: windows-2022
            platform: win32
            arch: x64
            rtf_gpu_enabled: true
            rtf_gpu_backend: directml
            benchmark_matrix_json: >-
              [{"modelType":"tdt","useGPU":false,"backendHint":"cpu"},{"modelType":"ctc","useGPU":false,"backendHint":"cpu"},{"modelType":"eou","useGPU":false,"backendHint":"cpu"},{"modelType":"sortformer","useGPU":false,"backendHint":"cpu"},{"modelType":"tdt","useGPU":true,"backendHint":"directml"},{"modelType":"ctc","useGPU":true,"backendHint":"directml"},{"modelType":"eou","useGPU":true,"backendHint":"directml"},{"modelType":"sortformer","useGPU":true,"backendHint":"directml"}]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: bash
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure scoped registry for @tetherto and @qvac packages
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cd "${{ github.workspace }}/packages/qvac-lib-infer-parakeet"
          cat > .npmrc <<NPMRC
          always-auth=true
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          # Configure git for private repos
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install NPM dependencies
        working-directory: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet
        run: |
          npm install
          npm install -g bare bare-make

      - run: mkdir -p "${{ runner.temp }}/qvac-lib-infer-parakeet"
        shell: bash
      - run: mkdir -p "${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds"
        shell: bash

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/qvac-lib-infer-parakeet
          merge-multiple: true

      - if: ${{ !inputs.prebuild_package }}
        shell: bash
        run: cp -r "${{ runner.temp }}/qvac-lib-infer-parakeet"/* "${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds"

      - name: Download prebuilds from package
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ runner.temp }}/qvac-lib-infer-parakeet
        shell: bash
        run: |
          npm pack ${{ inputs.prebuild_package }}
          tar -xzf *.tgz
          cp -r ./package/prebuilds/* "${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds"

      - name: Rename prebuilds from tetherto_ to qvac_ prefix
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet
        shell: bash
        run: |
          find prebuilds -depth -name 'tetherto_*' | while read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newbase=$(echo "$base" | sed 's/^tetherto_/qvac_/')
            mv "$file" "$dir/$newbase"
          done

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Run integration test
        if: ${{ inputs.run_integration_tests != false }}
        shell: bash
        working-directory: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          INTEGRATION_TEST_TIMEOUT: ${{ matrix.platform == 'win32' && '1800' || '600' }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}

      - name: Run RTF benchmark matrix
        if: ${{ always() && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          QVAC_PARAKEET_BENCHMARK_DEVICE: ${{ matrix.os }}
          QVAC_PARAKEET_BENCHMARK_RUNNER: ${{ matrix.os }}
          QVAC_PARAKEET_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}

      - name: Upload RTF results
        if: ${{ always() && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: rtf-results-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet/benchmarks/results/rtf-benchmark-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Add RTF summary
        if: ${{ always() && inputs.run_rtf_benchmarks != false }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ github.workspace }}/packages/qvac-lib-infer-parakeet
        run: |
          echo "### RTF — ${{ matrix.platform }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const path = require('path');
            const resultsDir = path.resolve('benchmarks/results');
            if (!fs.existsSync(resultsDir)) process.exit(0);
            const files = fs.readdirSync(resultsDir)
              .filter(file => file.startsWith('rtf-benchmark-') && file.endsWith('.json'))
              .sort();
            if (files.length === 0) process.exit(0);
            const lines = [
              '| Model | GPU | Backend | Device | Mean RTF | P50 | P95 |',
              '|-------|-----|---------|--------|----------|-----|-----|'
            ];
            for (const file of files) {
              const report = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
              const summary = report.summary || {};
              const rtf = summary.rtf || {};
              lines.push(
                '| ' + (report.model?.type || 'unknown') +
                ' | ' + ((report.requested?.useGPU ? 'yes' : 'no')) +
                ' | ' + (report.labels?.backend || report.requested?.backendHint || report.labels?.requestedBackend || 'n/a') +
                ' | ' + (report.labels?.device || report.labels?.runner || 'n/a') +
                ' | ' + (rtf.mean !== undefined ? Number(rtf.mean).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p50 !== undefined ? Number(rtf.p50).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p95 !== undefined ? Number(rtf.p95).toFixed(4) : 'n/a') +
                ' |'
              );
            }
            console.log(lines.join('\n'));
          " >> $GITHUB_STEP_SUMMARY
