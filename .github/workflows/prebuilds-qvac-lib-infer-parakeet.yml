# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-parakeet.yml
name: "Prebuilds (Parakeet)"

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory for the package"
        type: string
        required: false
        default: "packages/qvac-lib-infer-parakeet"
  workflow_call:
    inputs:
      ref:
        description: 'ref'
        type: string
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory for the package"
        type: string
        required: false
        default: "packages/qvac-lib-infer-parakeet"

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    env:
      VCPKG_BINARY_SOURCES: "clear;x-aws,s3://${{ secrets.MODEL_S3_BUCKET }}/vcpkg-cache/parakeet/${{ matrix.platform }}-${{ matrix.arch }}/,readwrite"
      VCPKG_BUILD_TYPE: release
      S3_CACHE_PREFIX: "s3://${{ secrets.MODEL_S3_BUCKET }}/vcpkg-cache/parakeet/${{ matrix.platform }}-${{ matrix.arch }}/"
      WORKDIR: ${{ inputs.workdir || 'packages/qvac-lib-infer-parakeet' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1


      - if: ${{ matrix.platform == 'win32' }}
        name: Install AWS CLI on self-hosted Windows runner
        shell: powershell
        run: |
          if (Get-Command aws -ErrorAction SilentlyContinue) {
            Write-Host "AWS CLI already installed"
            aws --version
          } else {
            Write-Host "Installing AWS CLI v2..."
            Invoke-WebRequest -Uri https://awscli.amazonaws.com/AWSCLIV2.msi -OutFile $env:TEMP\AWSCLIV2.msi
            Start-Process msiexec.exe -Wait -ArgumentList '/I', "$env:TEMP\AWSCLIV2.msi", '/qn'
            $env:PATH = "C:\Program Files\Amazon\AWSCLIV2;$env:PATH"
            echo "C:\Program Files\Amazon\AWSCLIV2" >> $env:GITHUB_PATH
            aws --version
          }

      - if: ${{ matrix.platform == 'android' }}
        name: Select NDK
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'ubuntu') || matrix.os == 'ai-run-linux-gpu' }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - if: ${{ matrix.platform == 'win32' }}
        name: Configure windows runner
        run: |
          git config --system core.longpaths true
          $ccacheVersion = "4.10.2"
          $ccacheUrl = "https://github.com/ccache/ccache/releases/download/v$ccacheVersion/ccache-$ccacheVersion-windows-x86_64.zip"
          $ccacheZip = "$env:TEMP\ccache.zip"
          $ccacheDir = "C:\ccache"
          Invoke-WebRequest -Uri $ccacheUrl -OutFile $ccacheZip
          Expand-Archive -Path $ccacheZip -DestinationPath $ccacheDir -Force
          $ccacheBin = Get-ChildItem -Path $ccacheDir -Recurse -Filter "ccache.exe" | Select-Object -First 1
          $ccachePath = $ccacheBin.DirectoryName
          echo "$ccachePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - if: ${{ matrix.platform == 'win32' }}
        name: Configure ccache on Windows
        shell: bash
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' }}
        name: Get ccache cache (Windows)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: ccache-parakeet-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles(format('{0}/vcpkg.json', env.WORKDIR)) }}
          path: ~\AppData\Local\ccache
          restore-keys: |
            ccache-parakeet-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - if: ${{ matrix.platform == 'win32' }}
        name: Setup Python on self-hosted Windows runner
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure scoped registry for @tetherto and @qvac packages
        working-directory: ${{ env.WORKDIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          always-auth=true
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GIT_PAT}
          NPMRC

          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "ssh://git@github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "ssh://git@github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install global dependencies
        run: |
          npm install -g bare bare-make

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'arm64' }}
        name: Rename win sdk folder to disable it
        run: |
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Include\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\bin\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Lib\old-10.0.26100.0"

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install vcpkg in macos
        run: |
          cd ..
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' }}
        name: Install vcpkg in windows
        shell: powershell
        run: |
          if ($env:VCPKG_INSTALLATION_ROOT -and (Test-Path $env:VCPKG_INSTALLATION_ROOT)) {
            $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT -replace '\\', '/'
          } else {
            cd ..
            git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat -disableMetrics
            $vcpkgRoot = (Get-Location).Path -replace '\\', '/'
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          echo $vcpkgRoot >> $env:GITHUB_PATH

      - if: ${{ matrix.platform == 'win32' }}
        name: Configure cmake generator in windows
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'x64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'x86' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=Win32" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'arm64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=ARM64" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' }}
        name: Disable parallel configuration for Visual Studio generator
        run: echo "VCPKG_CMAKE_CONFIGURE_OPTIONS=--no-parallel-configure" >> $env:GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Disable parallel configuration for Apple toolchains
        run: echo "VCPKG_CMAKE_CONFIGURE_OPTIONS=--no-parallel-configure" >> $GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Update c++ tools
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo chmod 644 /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Install ccache on Linux
        run: sudo apt-get install -y ccache

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install ccache on macOS
        run: brew install ccache

      - if: ${{ matrix.platform != 'win32' }}
        name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - if: ${{ matrix.platform != 'win32' }}
        name: Get ccache cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: ccache-parakeet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}-${{ hashFiles(format('{0}/vcpkg.json', env.WORKDIR)) }}
          path: ~/.cache/ccache
          restore-keys: |
            ccache-parakeet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}-
            ccache-parakeet-${{ matrix.platform }}-${{ matrix.arch }}-

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Update apt sources
        run: sudo apt-get update

      - if: ${{ matrix.platform == 'linux' }}
        name: Install required packages linux
        run: sudo apt-get install -y libxi-dev libxtst-dev libxrandr-dev pkg-config libx11-dev libxrandr-dev libxcb1-dev libxkbcommon-dev

      - if: ${{ matrix.platform == 'android' }}
        name: Configure runner for cross compilation - android
        run: |
          echo "ANDROID_TOOLCHAIN_ROOT=$(echo $ANDROID_NDK_HOME)/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "ANDROID_NATIVE_API_LEVEL=34" >> $GITHUB_ENV

      - name: Install npm dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - name: Run bare-make generate
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }}

      - name: Run bare-make build
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          bare-make build

      - name: Run bare-make install
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          bare-make install

      - name: Strip debug symbols (skip windows and android)
        if: ${{ matrix.platform != 'win32' && matrix.platform != 'android' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: find prebuilds -name "*.bare" -exec strip {} \;

      - name: Strip debug symbols (android)
        if: ${{ matrix.platform == 'android' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: find prebuilds -name "*.bare" -exec "$ANDROID_TOOLCHAIN_ROOT/bin/llvm-strip" --strip-debug {} \;

      - name: Verify debug symbols are stripped (skip windows and android)
        if: ${{ matrix.platform != 'win32' && matrix.platform != 'android' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          echo "Checking for unstripped binaries..."
          UNSTRIPPED=$(find prebuilds -name "*.bare" -exec sh -c 'file "$1" | grep -q "not stripped" && echo "$1"' _ {} \;)
          if [ -n "$UNSTRIPPED" ]; then
            echo "ERROR: The following binaries still contain debug symbols:"
            echo "$UNSTRIPPED"
            exit 1
          fi
          echo "All binaries are properly stripped."

      - name: Verify debug symbols are stripped (android)
        if: ${{ matrix.platform == 'android' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          echo "Checking for debug sections in Android binaries..."
          TOOLCHAIN="${ANDROID_TOOLCHAIN_ROOT:-${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64}"
          READELF="${TOOLCHAIN}/bin/llvm-readelf"
          if [ ! -x "${READELF}" ]; then
            echo "ERROR: llvm-readelf not found at: ${READELF}"
            exit 1
          fi

          WITH_DEBUG_SECTIONS=$(
            find prebuilds -name "*.bare" -exec sh -c '
              "$0" -S "$1" 2>/dev/null | grep -Eq "\.debug_|\.zdebug_" && echo "$1"
            ' "${READELF}" {} \;
          )

          if [ -n "$WITH_DEBUG_SECTIONS" ]; then
            echo "ERROR: The following binaries still contain debug sections (.debug_* / .zdebug_*):"
            echo "$WITH_DEBUG_SECTIONS"
            exit 1
          fi

          echo "All Android binaries have debug sections removed."

      - name: Show ccache stats
        run: ccache -s

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: parakeet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.WORKDIR }}/prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds

