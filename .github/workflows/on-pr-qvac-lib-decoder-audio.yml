name: On PR Trigger (Decoder-audio)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, release-*, feature-*, tmp-*]
    paths:
      - "packages/qvac-lib-decoder-audio/**"
      - ".github/workflows/*decoder-audio*.yml"

  workflow_dispatch:
    inputs:
      repository:
        description: "Repo to build (owner/name). Defaults to this repo."
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA). Defaults to current ref."
        required: false
        type: string
      run_verify:
        description: "Treat this run like a 'verify' run (integration tests)."
        required: false
        type: boolean
        default: true
      workdir:
        description: "Package working directory in monorepo."
        required: false
        type: string
        default: "packages/qvac-lib-decoder-audio"

  workflow_call:
    inputs:
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      run_verify:
        required: false
        type: boolean
        default: true
      workdir:
        required: false
        type: string
        default: "packages/qvac-lib-decoder-audio"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  packages: read
  checks: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  context:
    needs: authorize
    if: needs.authorize.outputs.allowed == 'true'
    name: Resolve Context
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      base_sha: ${{ steps.ctx.outputs.base_sha }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      run_verify: ${{ steps.ctx.outputs.run_verify }}
      workdir: ${{ steps.ctx.outputs.workdir }}
    steps:
      - id: ctx
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          INPUT_WORKDIR: ${{ inputs.workdir }}
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_VERIFY: ${{ inputs.run_verify }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "workflow_call" ]]; then
            workdir="${INPUT_WORKDIR:-packages/qvac-lib-decoder-audio}"
            repo="${INPUT_REPO:-$REPO}"
            ref="${INPUT_REF:-$REF_NAME}"
            run_verify="$INPUT_VERIFY"
            base_sha="$SHA"
            head_sha="$SHA"
          else
            workdir="packages/qvac-lib-decoder-audio"
            repo="$HEAD_REPO"
            ref="$HEAD_REF"
            run_verify="true"
            base_sha="$BASE_SHA"
            head_sha="$HEAD_SHA"
          fi

          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "run_verify=$run_verify" >> "$GITHUB_OUTPUT"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"

          echo "Resolved:"
          echo "  repo=$repo"
          echo "  ref=$ref"
          echo "  base_sha=$base_sha"
          echo "  head_sha=$head_sha"
          echo "  run_verify=$run_verify"
          echo "  workdir=$workdir"

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, context]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.context.outputs.run_verify == 'true' }}
          workdir: ${{ needs.context.outputs.workdir }}

  run-integration-tests:
    needs: context
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/integration-test-qvac-lib-decoder-audio.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
    needs: context
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-decoder-audio.yml
    secrets:
      ANDROID_DEVICE_POOL_ARN_DECODER_AUDIO: ${{ secrets.ANDROID_DEVICE_POOL_ARN_DECODER_AUDIO }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_DEVICE_FARM_PROJECT_ARN_DECODER_AUDIO: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_DECODER_AUDIO }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      IOS_DEVICE_POOL_ARN_DECODER_AUDIO: ${{ secrets.IOS_DEVICE_POOL_ARN_DECODER_AUDIO }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  merge-guard:
    needs: [authorize, sanity-checks, run-integration-tests, run-mobile-integration-tests]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped' }}
      integration-tests-status: ${{ (needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped') && (needs.run-mobile-integration-tests.result == 'success' || needs.run-mobile-integration-tests.result == 'skipped') }}
