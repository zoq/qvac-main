name: Release Notes Check (OCR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release-*
    paths:
      - "packages/ocr-onnx/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Read PR package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version=$(jq -r '.version' packages/ocr-onnx/package.json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Detect version bump
        id: version
        uses: ./.github/actions/detect-version-bump
        with:
          current_version: ${{ steps.package-version.outputs.version }}
          prev_sha: ${{ github.event.pull_request.base.sha }}
          workdir: packages/ocr-onnx

      - name: Validate CHANGELOG on version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          set -euo pipefail

          VERSION="${{ steps.pr-package-version.outputs.version }}"
          CHANGELOG="${{ inputs.workdir || 'packages/ocr-onnx' }}/CHANGELOG.md"

          echo "Checking for version $VERSION in $CHANGELOG"

          # Ensure we are on the PR head (usually already true in Actions)
          git fetch origin "${{ github.head_ref }}" --depth=1
          git checkout FETCH_HEAD

          if [ ! -f "$CHANGELOG" ]; then
            echo "$CHANGELOG does not exist"
            exit 1
          fi

          if ! grep -q "$VERSION" "$CHANGELOG"; then
            echo "Version $VERSION not found in $CHANGELOG"
            exit 1
          fi

          echo "Version $VERSION found in $CHANGELOG"
