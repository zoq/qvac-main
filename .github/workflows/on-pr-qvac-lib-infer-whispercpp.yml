name: On PR Trigger (Whispercpp)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, release-*, feature-*, tmp-*]
    paths:
      - "packages/qvac-lib-infer-whispercpp/**"
      - ".github/workflows/*whispercpp*.yml"

  workflow_dispatch:
    inputs:
      repository:
        description: "Repo to build (owner/name). Defaults to this repo."
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA). Defaults to current ref."
        required: false
        type: string
      run_verify:
        description: "Treat this run like a 'verify' run (prebuild + integration)."
        required: false
        type: boolean
        default: true
      workdir:
        description: "Package working directory in monorepo."
        required: false
        type: string
        default: "packages/qvac-lib-infer-whispercpp"

  workflow_call:
    inputs:
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      run_verify:
        required: false
        type: boolean
        default: true
      workdir:
        required: false
        type: string
        default: "packages/qvac-lib-infer-whispercpp"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  checks: write

jobs:
  context:
    name: Resolve Context
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      base_sha: ${{ steps.ctx.outputs.base_sha }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      run_verify: ${{ steps.ctx.outputs.run_verify }}
      workdir: ${{ steps.ctx.outputs.workdir }}
    steps:
      - id: ctx
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HAS_VERIFY: ${{ contains(github.event.pull_request.labels.*.name, 'verify') }}
          INPUT_WORKDIR: ${{ inputs.workdir }}
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_VERIFY: ${{ inputs.run_verify }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "workflow_call" ]]; then
            workdir="${INPUT_WORKDIR:-packages/qvac-lib-infer-whispercpp}"
            repo="${INPUT_REPO:-$REPO}"
            ref="${INPUT_REF:-$REF_NAME}"
            run_verify="$INPUT_VERIFY"
            base_sha="$SHA"
            head_sha="$SHA"
          else
            workdir="packages/qvac-lib-infer-whispercpp"
            repo="$HEAD_REPO"
            ref="$HEAD_REF"
            run_verify="$HAS_VERIFY"
            base_sha="$BASE_SHA"
            head_sha="$HEAD_SHA"
          fi

          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "run_verify=$run_verify" >> "$GITHUB_OUTPUT"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"

          echo "Resolved:"
          echo "  repo=$repo"
          echo "  ref=$ref"
          echo "  base_sha=$base_sha"
          echo "  head_sha=$head_sha"
          echo "  run_verify=$run_verify"
          echo "  workdir=$workdir"

  sanity-checks:
    if: contains(github.event.pull_request.labels.*.name, 'verify') || github.event_name == 'workflow_dispatch'
    needs: context
    runs-on: ubuntu-latest
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.6
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.context.outputs.run_verify == 'true' }}
          workdir: ${{ needs.context.outputs.workdir }}

  cpp-lint:
    needs: context
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.6
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ needs.context.outputs.base_sha }}
      pr_head_sha: ${{ needs.context.outputs.head_sha }}
      workdir: ${{ needs.context.outputs.workdir }}

  cpp-tests-coverage:
    needs: context
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/cpp-test-coverage-qvac-lib-infer-whispercpp.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  prebuild:
    needs: context
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-whispercpp.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      tag: "dev"
      publish_target: 'gpr'

  run-integration-tests:
    needs: [context, prebuild]
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/integration-test-qvac-lib-infer-whispercpp.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  run-mobile-integration-tests:
    needs: [context, prebuild]
    if: needs.context.outputs.run_verify == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-whispercpp.yml
    secrets:
      ANDROID_DEVICE_POOL_ARN_WHISPERCPP: ${{ secrets.ANDROID_DEVICE_POOL_ARN_WHISPERCPP }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_DEVICE_FARM_PROJECT_ARN_WHISPERCPP: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_WHISPERCPP }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IOS_DEVICE_POOL_ARN_WHISPERCPP: ${{ secrets.IOS_DEVICE_POOL_ARN_WHISPERCPP }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  merge-guard:
    needs: [sanity-checks, cpp-lint, cpp-tests-coverage, prebuild, run-integration-tests, run-mobile-integration-tests]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.6
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' && (needs.cpp-lint.result == 'success' || needs.cpp-lint.result == 'skipped') && (needs.cpp-tests-coverage.result == 'success' || needs.cpp-tests-coverage.result == 'skipped') }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild.result == 'skipped' }}
      integration-tests-status: ${{ (needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped') && (needs.run-mobile-integration-tests.result == 'success' || needs.run-mobile-integration-tests.result == 'skipped') }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
 
