name: On Merge Trigger (Stable Diffusion)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/lib-infer-diffusion/**"
      - ".github/workflows/*diffusion*.yml"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: "dev"
        type: choice
        options:
          - latest
          - dev

  workflow_call:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  release-merge-guard:
    name: Release Merge Guard
    continue-on-error: true
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref_name, 'release-') &&
      github.event.before != '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: lib-infer-diffusion
          package-json-path: packages/lib-infer-diffusion/package.json
          changelog-path: packages/lib-infer-diffusion/CHANGELOG.md

  publish-main-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_main == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
      publish_target: "gpr"
      workdir: "packages/lib-infer-diffusion"

  publish-feature-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_feature == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
      publish_target: "gpr"
      workdir: "packages/lib-infer-diffusion"

  publish-tmp-gpr:
    needs: publish-logic
    if: needs.publish-logic.outputs.publish_tmp == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
      publish_target: "gpr"
      workdir: "packages/lib-infer-diffusion"

  publish-release-npm:
    needs: [publish-logic]
    if: needs.publish-logic.outputs.publish_release == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/prebuilds-lib-infer-diffusion.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
    with:
      tag: "latest"
      publish_target: "npm"
      workdir: "packages/lib-infer-diffusion"

  publish-release:
    needs: [publish-release-npm]
    if:  needs.publish-release-npm.result == 'success' && needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      repo_name: "diffusion"
      release_name: "QVAC Stable Diffusion Addon"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/lib-infer-diffusion"
