name: Release Notes Check (TTS)

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        type: string
      repository:
        description: 'Repository to checkout'
        type: string
      workdir:
        description: 'Working directory (optional)'
        required: false
        type: string
        default: 'packages/qvac-lib-infer-onnx-tts'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes-check:
    runs-on: ubuntu-latest
    env:
      WORKDIR: ${{ inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}

    steps:
      - name: Checkout PR head (into pr/)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.ref || github.event.pull_request.head.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          path: pr
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Read PR package version (monorepo workdir)
        id: pr-package-version
        shell: bash
        run: |
          set -euo pipefail
          pkg_json="pr/${WORKDIR}/package.json"
          if [ ! -f "$pkg_json" ]; then
            echo "package.json not found at: $pkg_json"
            ls -la "pr/${WORKDIR}" || true
            exit 1
          fi
          version=$(jq -r '.version' "$pkg_json")
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not read .version from $pkg_json"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "PR version: $version"

      - name: Checkout base (into base/)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          path: base
          fetch-depth: 0

      - name: Read base package version (monorepo workdir)
        id: base-package-version
        shell: bash
        run: |
          set -euo pipefail
          pkg_json="base/${WORKDIR}/package.json"
          if [ ! -f "$pkg_json" ]; then
            echo "package.json not found at: $pkg_json"
            ls -la "base/${WORKDIR}" || true
            exit 1
          fi
          version=$(jq -r '.version' "$pkg_json")
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not read .version from $pkg_json"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Base version: $version"

      - name: Detect version bump (workdir-aware)
        id: version
        shell: bash
        run: |
          set -euo pipefail
          pr="${{ steps.pr-package-version.outputs.version }}"
          base="${{ steps.base-package-version.outputs.version }}"

          if [ "$pr" != "$base" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "current=$pr" >> "$GITHUB_OUTPUT"
            echo "prev=$base" >> "$GITHUB_OUTPUT"
            echo "Version bumped: $base -> $pr"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "current=$pr" >> "$GITHUB_OUTPUT"
            echo "prev=$base" >> "$GITHUB_OUTPUT"
            echo "No version bump: $pr"
          fi

      - name: Validate Release Notes on version bump
        if: steps.version.outputs.bumped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const version = "${{ steps.pr-package-version.outputs.version }}";
            const workdir = "${{ inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}";
            const expected = `${workdir}/release-notes/v${version}.md`;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pullNumber, per_page: 100 }
            );

            const hasNotes = files.some(file => file.filename === expected);
            if (!hasNotes) {
              core.setFailed(`Missing release notes file in PR changes: ${expected}`);
            } else {
              core.info(`Release notes file found in PR changes: ${expected}`);
            }
