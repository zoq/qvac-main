# Generate API documentation from sdk and open a PR.
# Trigger manually with a version (e.g. 0.7.0) or via repository_dispatch from the SDK repo.
#
# Required: Set repository variable SDK_REPOSITORY (e.g. owner/qvac) so the workflow can clone the SDK.
# Optional: Set SDK_SUBPATH (e.g. packages/sdk) if the SDK is not at repo root; default below.

name: Generate API Documentation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate docs for (semver, e.g. 0.7.0)"
        required: true
        type: string
  repository_dispatch:
    types: [generate-api-docs]

env:
  SDK_SUBPATH: "packages/sdk"
  DOCS_DIR: "docs/website"

jobs:
  generate-api-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "❌ No version provided."
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

      - name: Clone SDK repository
        env:
          SDK_REPO: ${{ vars.SDK_REPOSITORY }}
        run: |
          if [ -z "$SDK_REPO" ]; then
            echo "❌ SDK_REPOSITORY is not set. Add repository variable SDK_REPOSITORY (e.g. owner/qvac)."
            exit 1
          fi
          git clone --depth 1 --branch "release-qvac-sdk-${{ steps.version.outputs.version }}" \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${SDK_REPO}.git" sdk-source \
            || git clone --depth 1 --branch "v${{ steps.version.outputs.version }}" \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${SDK_REPO}.git" sdk-source \
            || git clone --depth 1 --branch "main" \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${SDK_REPO}.git" sdk-source
          echo "✅ Cloned $SDK_REPO into sdk-source"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0

      - name: Install dependencies (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: bun install

      - name: Generate API documentation
        working-directory: ${{ env.DOCS_DIR }}
        run: |
          SUB="${{ env.SDK_SUBPATH }}"
          if [ -n "$SUB" ]; then
            export SDK_PATH="${{ github.workspace }}/sdk-source/$SUB"
          else
            export SDK_PATH="${{ github.workspace }}/sdk-source"
          fi
          if [ ! -f "$SDK_PATH/index.ts" ]; then
            echo "❌ SDK entry not found at $SDK_PATH/index.ts (check SDK_REPOSITORY and SDK_SUBPATH)"
            exit 1
          fi
          bun run docs:generate-api ${{ steps.version.outputs.version }}

      - name: Update versions list
        working-directory: ${{ env.DOCS_DIR }}
        run: bun run docs:update-versions

      - name: Stage generated API docs for PR
        run: |
          git add -f \
            "${{ env.DOCS_DIR }}/content/docs/(latest)/sdk/api" \
            "${{ env.DOCS_DIR }}/content/docs/v${{ steps.version.outputs.version }}/sdk/api" \
            "${{ env.DOCS_DIR }}/src/lib/versions.ts"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # 8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "doc[notask]: generate API docs for v${{ steps.version.outputs.version }}"
          branch: "docs/api-v${{ steps.version.outputs.version }}"
          title: "doc[notask]: generate API docs for v${{ steps.version.outputs.version }}"
          body: |
            ## Auto-generated API Documentation

            This PR adds API documentation for **v${{ steps.version.outputs.version }}**.

            - Generated MDX in `docs/website/content/docs/v${{ steps.version.outputs.version }}/sdk/api/`
            - Updated `(latest)/sdk/api/` and version switcher config

            Generated by the docs generation workflow.
          labels: documentation, auto-generated
