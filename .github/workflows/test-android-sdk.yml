name: QVAC Android Tests (Device Farm)
# Reusable workflow for running Android tests via AWS Device Farm
# Originally from qvac-test-suite

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory containing qvac-test.config.js"
        required: false
        type: string
        default: "."
      project-directory:
        description: "Root project directory (where package.json lives)"
        required: true
        type: string
      consumer-timeout:
        description: "Timeout in seconds for consumer connection (mobile needs longer)"
        required: false
        type: number
        default: 600
      filter:
        description: "Filter tests by category or testId prefix (comma-separated)"
        required: false
        type: string
      device-farm-timeout:
        description: "Maximum time in minutes to keep Device Farm session alive."
        required: false
        type: number
        default: 60
      device-farm-project-arn:
        description: "AWS Device Farm project ARN"
        required: true
        type: string
      device-pools:
        description: 'JSON array of device pools [{name, arn}]'
        required: true
        type: string
      test-version:
        description: "Git ref to checkout (branch, tag, or SHA). Defaults to trigger ref."
        required: false
        type: string
      cache-models:
        description: "Pre-cache models between runs (S3-backed, pushed to device via adb)"
        required: false
        type: boolean
        default: false
    secrets:
      PAT_TOKEN:
        required: true
      NPM_TOKEN:
        required: true
      MQTT_PROTOCOL:
        required: true
      MQTT_HOST:
        required: true
      MQTT_PORT:
        required: true
      MQTT_USERNAME:
        required: true
      MQTT_PASSWORD:
        required: true
      MQTT_CA_CERT:
        required: false
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ai-run-linux
    environment: release
    timeout-minutes: 60
    outputs:
      runId: ${{ steps.runid.outputs.runId }}
      s3-models-key: ${{ steps.s3-upload.outputs.s3-key }}
      cache-models: ${{ inputs.cache-models }}
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # 3.2.2

      - name: Generate runId
        id: runid
        shell: node {0}
        run: |
          const fs = require('fs');
          const repoName = process.env.GITHUB_REPOSITORY.split('/').pop();
          const refName = process.env.GITHUB_REF_NAME.replace(/\//g, '-');
          const sha = process.env.GITHUB_SHA.substring(0, 7);
          const timestamp = Math.floor(Date.now() / 1000);
          const runId = `mobile-${repoName}-${refName}-${sha}-${timestamp}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `runId=${runId}\n`, 'utf8');
          console.log(`Generated runId: ${runId}`);

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          if (!process.env.NPM_TOKEN) { console.log('NPM_TOKEN is empty'); process.exit(1); }
          if (!process.env.PAT_TOKEN) { console.log('PAT_TOKEN is empty'); process.exit(1); }

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');
          console.log(`.npmrc configured at ${target}`);

      - name: Setup MQTT CA certificate
        shell: node {0}
        env:
          CA_CERT: ${{ secrets.MQTT_CA_CERT }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          const caCert = (process.env.CA_CERT || '').trim();
          if (caCert) {
            const certsDir = path.join(os.tmpdir(), 'mqtt-certs');
            fs.mkdirSync(certsDir, { recursive: true });
            const caPath = path.join(certsDir, 'ca.crt');
            fs.writeFileSync(caPath, caCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CA_PATH=${caPath}\n`, 'utf8');
            console.log('CA certificate written');
          }

      - name: Install dependencies (project)
        working-directory: ${{ inputs.project-directory }}
        run: bun install

      - name: Build project
        working-directory: ${{ inputs.project-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (packageJson.scripts && packageJson.scripts.build) {
            console.log('Building project...');
            execSync('bun run build', { stdio: 'inherit' });
          } else {
            console.log('No build script found in package.json - skipping');
          }

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
            console.log('.npmrc copied to consumer directory');
          }

      - name: Install dependencies (consumer)
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links

      - name: Build consumer
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: bun run build

      # --- Model pre-caching (only when cache-models is enabled) ---

      - name: Configure SDK cache directory
        if: inputs.cache-models
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const cacheDir = path.resolve('${{ inputs.working-directory }}', '.qvac-cache');
          fs.mkdirSync(cacheDir, { recursive: true });
          const config = { cacheDirectory: cacheDir };
          const configPath = path.resolve('${{ inputs.working-directory }}', 'qvac.config.json');
          fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
          fs.appendFileSync(process.env.GITHUB_ENV, `QVAC_CONFIG_PATH=${configPath}\n`);
          console.log(`SDK cache dir: ${cacheDir}`);
          console.log(`Config written to: ${configPath}`);

      - name: Restore models cache
        id: models-cache
        if: inputs.cache-models
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          key: qvac-mobile-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}

      - name: Download models for cache
        if: inputs.cache-models && steps.models-cache.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: bun run scripts/download-mobile-models.ts

      - name: Save models cache
        if: inputs.cache-models && steps.models-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          key: qvac-mobile-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}

      - name: Configure AWS credentials (for S3 model cache)
        if: inputs.cache-models
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload models to S3
        id: s3-upload
        if: inputs.cache-models
        shell: bash
        run: |
          MODELS_HASH=$(sha256sum packages/sdk/models/registry/models.ts | cut -c1-16)
          S3_KEY="qvac-models/mobile-${MODELS_HASH}"
          BUCKET="${{ secrets.MODEL_S3_BUCKET }}"

          echo "s3-key=${S3_KEY}" >> $GITHUB_OUTPUT

          if aws s3 ls "s3://${BUCKET}/${S3_KEY}/models.tar.gz" 2>/dev/null; then
            echo "Models already in S3 (key: ${S3_KEY}), skipping upload"
          else
            echo "Packaging models for S3 upload..."
            tar czf /tmp/qvac-models.tar.gz -C "${{ inputs.working-directory }}/.qvac-cache" .
            TARBALL_SIZE=$(du -h /tmp/qvac-models.tar.gz | cut -f1)
            echo "Tarball size: ${TARBALL_SIZE}"

            echo "Uploading to s3://${BUCKET}/${S3_KEY}/models.tar.gz..."
            aws s3 cp /tmp/qvac-models.tar.gz "s3://${BUCKET}/${S3_KEY}/models.tar.gz"
            echo "S3 upload complete"
            rm -f /tmp/qvac-models.tar.gz
          fi

      # --- End model pre-caching ---

      - name: Build mobile consumer APK
        working-directory: ${{ inputs.working-directory }}
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/${{ inputs.working-directory }}/.npmrc
        run: |
          echo "Building Android consumer APK..."
          echo "   Run ID: ${{ steps.runid.outputs.runId }}"
          echo "   MQTT Host: $MQTT_HOST"

          npx qvac-test build:consumer:android \
            --runId "${{ steps.runid.outputs.runId }}" \
            --config .

          APK_PATH="build/consumers/android/consumer.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK built successfully"
            ls -lh "$APK_PATH"
          else
            echo "APK not found at $APK_PATH"
            find build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: mobile-consumer-apk
          path: ${{ inputs.working-directory }}/build/consumers/android/consumer.apk
          retention-days: 7

  device-farm:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(inputs.device-pools) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: ${{ inputs.working-directory }}/device-farm-test-spec.yml

      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: mobile-consumer-apk
          path: ./apk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload APK to Device Farm
        id: upload-app
        run: |
          echo "Uploading APK to Device Farm for ${{ matrix.device.name }}..."

          UPLOAD_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "consumer-${{ needs.build.outputs.runId }}-${{ matrix.device.name }}.apk" \
            --type "ANDROID_APP" \
            --output json)

          APP_UPLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.upload.url')
          APP_UPLOAD_ARN=$(echo $UPLOAD_RESPONSE | jq -r '.upload.arn')

          echo "app-arn=$APP_UPLOAD_ARN" >> $GITHUB_OUTPUT

          curl -T "./apk/consumer.apk" "$APP_UPLOAD_URL"

          echo "Waiting for APK to be processed..."
          for i in {1..30}; do
            STATUS=$(aws devicefarm get-upload --arn "$APP_UPLOAD_ARN" --query "upload.status" --output text)
            echo "Status (attempt $i/30): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "APK upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "APK upload failed"
              aws devicefarm get-upload --arn "$APP_UPLOAD_ARN"
              exit 1
            fi

            sleep 10
          done

      - name: Generate models cache pre-signed URL
        id: models-url
        if: needs.build.outputs.cache-models == 'true'
        run: |
          S3_KEY="${{ needs.build.outputs.s3-models-key }}"
          BUCKET="${{ secrets.MODEL_S3_BUCKET }}"
          URL=$(aws s3 presign "s3://${BUCKET}/${S3_KEY}/models.tar.gz" --expires-in 21600)
          echo "Pre-signed URL generated (valid 6h)"
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Create and upload dummy test package
        id: upload-test-pkg
        run: |
          mkdir -p /tmp/dummy-test-pkg
          echo '{"name":"qvac-test-stub","version":"1.0.0"}' > /tmp/dummy-test-pkg/package.json
          cp "${{ inputs.working-directory }}/device-farm-gen-junit.py" /tmp/dummy-test-pkg/

          # Include models cache URL if caching is enabled
          if [ -n "${{ steps.models-url.outputs.url }}" ]; then
            echo "${{ steps.models-url.outputs.url }}" > /tmp/dummy-test-pkg/models-url.txt
            echo "models-url.txt included in test package"
          fi

          (cd /tmp/dummy-test-pkg && zip -r /tmp/dummy-test-pkg.zip .)

          PKG_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "qvac-test-stub.zip" \
            --type "APPIUM_NODE_TEST_PACKAGE" \
            --output json)

          PKG_URL=$(echo $PKG_RESPONSE | jq -r '.upload.url')
          PKG_ARN=$(echo $PKG_RESPONSE | jq -r '.upload.arn')

          echo "pkg-arn=$PKG_ARN" >> $GITHUB_OUTPUT

          curl -T /tmp/dummy-test-pkg.zip "$PKG_URL"

          for i in {1..15}; do
            STATUS=$(aws devicefarm get-upload --arn "$PKG_ARN" --query "upload.status" --output text)
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test package upload successful"
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Test package upload failed"
              aws devicefarm get-upload --arn "$PKG_ARN"
              exit 1
            fi
            sleep 5
          done

      - name: Upload test spec to Device Farm
        id: upload-spec
        run: |
          SPEC_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "qvac-test-spec-${{ needs.build.outputs.runId }}.yml" \
            --type "APPIUM_NODE_TEST_SPEC" \
            --output json)

          SPEC_URL=$(echo $SPEC_RESPONSE | jq -r '.upload.url')
          SPEC_ARN=$(echo $SPEC_RESPONSE | jq -r '.upload.arn')

          echo "spec-arn=$SPEC_ARN" >> $GITHUB_OUTPUT

          TIMEOUT_SECONDS=$(( ${{ inputs.device-farm-timeout || 90 }} * 60 ))
          sed -i "s/DEVICEFARM_TIMEOUT:-5400/DEVICEFARM_TIMEOUT:-${TIMEOUT_SECONDS}/" "${{ inputs.working-directory }}/device-farm-test-spec.yml"
          curl -T "${{ inputs.working-directory }}/device-farm-test-spec.yml" "$SPEC_URL"

          echo "Waiting for test spec to be processed..."
          for i in {1..15}; do
            STATUS=$(aws devicefarm get-upload --arn "$SPEC_ARN" --query "upload.status" --output text)
            echo "Status (attempt $i/15): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test spec upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "Test spec upload failed"
              aws devicefarm get-upload --arn "$SPEC_ARN"
              exit 1
            fi

            sleep 5
          done

      - name: Schedule Device Farm run
        id: schedule
        run: |
          echo "Scheduling Device Farm run on ${{ matrix.device.name }}..."

          RUN_NAME="mobile-${{ matrix.device.name }}-${{ github.run_number }}-${{ github.run_attempt }}"

          RUN_ARN=$(aws devicefarm schedule-run \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --device-pool-arn "${{ matrix.device.arn }}" \
            --app-arn "${{ steps.upload-app.outputs.app-arn }}" \
            --name "$RUN_NAME" \
            --test type=APPIUM_NODE,testPackageArn=${{ steps.upload-test-pkg.outputs.pkg-arn }},testSpecArn=${{ steps.upload-spec.outputs.spec-arn }} \
            --execution-configuration jobTimeoutMinutes=${{ inputs.device-farm-timeout }} \
            --query 'run.arn' --output text)

          echo "run-arn=$RUN_ARN" >> $GITHUB_OUTPUT
          echo "Device Farm run scheduled: $RUN_ARN"

          PROJECT_ID=$(echo "${{ inputs.device-farm-project-arn }}" | sed -n 's/.*:project:\(.*\)/\1/p')
          RUN_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:[^/]*\/\(.*\)/\1/p')
          echo "Device Farm Console (${{ matrix.device.name }}): https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}"

      - name: Save run ARN
        id: save-arn
        run: |
          SAFE_NAME=$(echo "${{ matrix.device.name }}" | tr ' /\\:*?"<>|' '_')
          echo "${{ steps.schedule.outputs.run-arn }}" > "${SAFE_NAME}.txt"
          echo "safe-name=${SAFE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload run ARN
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: device-farm-arn-${{ needs.build.outputs.runId }}-${{ steps.save-arn.outputs.safe-name }}
          path: ${{ steps.save-arn.outputs.safe-name }}.txt
          retention-days: 1

  run-producer:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 90
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');

      - name: Setup MQTT CA certificate
        shell: node {0}
        env:
          CA_CERT: ${{ secrets.MQTT_CA_CERT }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          const caCert = (process.env.CA_CERT || '').trim();
          if (caCert) {
            const certsDir = path.join(os.tmpdir(), 'mqtt-certs');
            fs.mkdirSync(certsDir, { recursive: true });
            const caPath = path.join(certsDir, 'ca.crt');
            fs.writeFileSync(caPath, caCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CA_PATH=${caPath}\n`, 'utf8');
            console.log('CA certificate written');
          }

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
          }

      - name: Install dependencies (project)
        working-directory: ${{ inputs.project-directory }}
        run: bun install

      - name: Build project
        working-directory: ${{ inputs.project-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (packageJson.scripts && packageJson.scripts.build) {
            execSync('bun run build', { stdio: 'inherit' });
          }

      - name: Install dependencies (consumer)
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links

      - name: Build consumer
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: bun run build

      - name: Run producer
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "Starting producer..."
          echo "   Run ID: ${{ needs.build.outputs.runId }}"
          echo "   Consumer timeout: ${{ inputs.consumer-timeout }}s"
          echo "   Filter: ${{ inputs.filter || '(none)' }}"

          FILTER_ARG=""
          if [ -n "${{ inputs.filter }}" ]; then
            FILTER_ARG="--filter=${{ inputs.filter }}"
          fi

          npx qvac-test run:producer \
            --runId "${{ needs.build.outputs.runId }}" \
            --consumer-timeout "${{ inputs.consumer-timeout }}" \
            --config . \
            $FILTER_ARG

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: mobile-results-${{ github.run_number }}
          path: ${{ inputs.working-directory }}/reports/
          retention-days: 30

      - name: Upload baseline (main/develop only)
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: mobile-baseline
          path: ${{ inputs.working-directory }}/reports/results-*.json
          retention-days: 90
          overwrite: true

  cleanup-device-farm:
    needs: [build, run-producer, device-farm]
    if: always()
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Download run ARNs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: device-farm-arn-${{ needs.build.outputs.runId }}-*
          path: ./run-arns
          merge-multiple: true

      - name: Stop Device Farm runs
        run: |
          echo "Cleaning up Device Farm runs for runId: ${{ needs.build.outputs.runId }}"

          for arn_file in run-arns/*.txt; do
            if [ -f "$arn_file" ]; then
              RUN_ARN=$(cat "$arn_file")
              DEVICE_NAME=$(basename "$arn_file" .txt)

              STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --query 'run.status' --output text 2>/dev/null || echo "UNKNOWN")
              echo "Device $DEVICE_NAME: status=$STATUS"

              if [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "PENDING" ]; then
                echo "Stopping run: $RUN_ARN"
                aws devicefarm stop-run --arn "$RUN_ARN" || true
              else
                echo "Run already finished ($STATUS), skipping"
              fi
            fi
          done

  compare-results:
    needs: [build, run-producer]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: release
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
          }

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links --ignore-scripts

      - name: Download current results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: mobile-results-*
          path: ${{ inputs.working-directory }}/current-results/
          merge-multiple: true

      - name: Download baseline results
        id: download-baseline
        uses: dawidd6/action-download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        continue-on-error: true
        with:
          workflow: test-android-sdk.yml
          branch: ${{ github.event.pull_request.base.ref }}
          name: mobile-baseline
          path: ${{ inputs.working-directory }}/baseline-results/
          if_no_artifact_found: warn

      - name: Check baseline availability
        id: check-baseline
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const baselineDir = path.join('${{ inputs.working-directory }}', 'baseline-results');
          let hasBaseline = false;
          if (fs.existsSync(baselineDir)) {
            const files = fs.readdirSync(baselineDir).filter(f => f.endsWith('.json'));
            hasBaseline = files.length > 0;
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_baseline=${hasBaseline}\n`, 'utf8');
          console.log(`Baseline available: ${hasBaseline}`);

      - name: Compare results
        if: steps.check-baseline.outputs.has_baseline == 'true'
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          const currentFiles = fs.existsSync('current-results')
            ? fs.readdirSync('current-results').filter(f => f.endsWith('.json'))
            : [];
          const baselineFiles = fs.existsSync('baseline-results')
            ? fs.readdirSync('baseline-results').filter(f => f.endsWith('.json'))
            : [];

          if (currentFiles.length > 0 && baselineFiles.length > 0) {
            const current = path.join('current-results', currentFiles[0]);
            const baseline = path.join('baseline-results', baselineFiles[0]);
            console.log(`Comparing mobile: ${baseline} vs ${current}`);
            execSync(`npx qvac-test report:compare --baseline "${baseline}" --current "${current}" --output "comparison-mobile.json"`, { stdio: 'inherit' });
          } else {
            console.log('No files to compare');
          }

      - name: Format comparison
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          let comment = '# QVAC Mobile Test Results\n\n';
          const sha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);
          comment += `**Branch**: \`${{ github.head_ref }}\` | **Commit**: \`${sha}\` | **Base**: \`${{ github.event.pull_request.base.ref }}\`\n\n`;
          comment += `**Run ID**: \`${{ needs.build.outputs.runId }}\`\n\n`;

          if ("${{ steps.check-baseline.outputs.has_baseline }}" === "false") {
            comment += '**No baseline found** - showing current results only\n\n';
            comment += '| Platform | Passed | Failed | Total | Rate | Duration |\n';
            comment += '|----------|--------|--------|-------|------|----------|\n';

            if (fs.existsSync('current-results')) {
              const results = fs.readdirSync('current-results').filter(f => f.endsWith('.json'));
              for (const result of results) {
                try {
                  const json = JSON.parse(fs.readFileSync(path.join('current-results', result), 'utf8'));
                  const platform = json.system?.platform || 'mobile';
                  comment += `| ${platform} | ${json.summary.passed} | ${json.summary.failed} | ${json.summary.total} | ${json.summary.successRate}% | ${json.summary.duration}s |\n`;
                } catch (e) {
                  console.log(`Failed to parse ${result}: ${e.message}`);
                }
              }
            }
          } else {
            if (fs.existsSync('comparison-mobile.json')) {
              execSync('npx qvac-test report:format --input "comparison-mobile.json" --format markdown --output "comparison-mobile.md"', { stdio: 'inherit' });
              comment += '## Mobile (Android)\n';
              comment += fs.readFileSync('comparison-mobile.md', 'utf8') + '\n';
            }
          }

          comment += '\n### Artifacts\n\n';
          comment += `[View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

          fs.writeFileSync('comment.md', comment, 'utf8');

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          script: |
            const fs = require('fs');
            const commentPath = '${{ inputs.working-directory }}/comment.md';

            if (!fs.existsSync(commentPath)) {
              console.log('No comment file generated');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
