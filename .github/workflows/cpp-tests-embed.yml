name: CPP Tests (Embed)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/qvac-lib-infer-llamacpp-embed"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: "main"
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/qvac-lib-infer-llamacpp-embed"

jobs:
  run-cpp-tests:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-cpp-tests
    permissions:
      contents: read
      packages: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: windows
            arch: x64

    env:
      WORKDIR: ${{ inputs.workdir }}
      # Keep vcpkg cache under the package directory in a monorepo
      VCPKG_BINARY_SOURCES: ${{ format('clear;files,{0}/{1}/vcpkg/cache,readwrite', github.workspace, inputs.workdir) }}
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Echo workflow inputs
        shell: bash
        run: |
          echo "ref=${{ inputs.ref || github.ref }}"
          echo "repository=${{ inputs.repository || github.repository }}"
          echo "workdir=${{ env.WORKDIR }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure Windows runner
        shell: pwsh
        run: |
          git config --system core.longpaths true
          choco upgrade llvm -y

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure scoped registry for @tetherto and @qvac packages
        working-directory: ${{ env.WORKDIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          npm install
          npm install -g bare bare-make

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Install llvm-19 on Linux
        shell: bash
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Install Vulkan SDK on Linux
        shell: bash
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt update
          sudo apt install -y vulkan-sdk

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Install Vulkan SDK on Windows
        shell: powershell
        working-directory:  ${{ env.WORKDIR }}
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe -OutFile vulkan-sdk.exe
          ./vulkan-sdk.exe --root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install vcpkg on macOS
        shell: bash
        run: |
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git vcpkg_microsoft
          cd vcpkg_microsoft && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Configure vcpkg in linux
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure vcpkg in windows
        shell: pwsh
        run: echo ("VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure CMake generator on Windows
        shell: pwsh
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - name: Create vcpkg cache location (package-local)
        shell: bash
        run: mkdir -p "${{ env.WORKDIR }}/vcpkg/cache"

      - name: Get vcpkg cache (package-local)
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/${{ env.WORKDIR }}/vcpkg/cache
          key: >-
            cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-${{
              hashFiles(
                format('{0}/vcpkg.json', inputs.workdir),
                format('{0}/vcpkg-configuration.json', inputs.workdir),
                format('{0}/vcpkg/ports/**', inputs.workdir),
                'vcpkg.json',
                'vcpkg-configuration.json',
                'vcpkg/ports/**'
              )
            }}
          restore-keys: |
            cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-

      - name: Download test models (into package dir)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.WORKDIR }}/models/unit-test"
          echo "Downloading model from Hugging Face..."
          curl -L --fail --retry 3 --retry-all-errors --retry-delay 2 \
            -o "${{ env.WORKDIR }}/models/unit-test/test-model.gguf" \
            "https://huggingface.co/unsloth/embeddinggemma-300m-GGUF/resolve/main/embeddinggemma-300M-Q8_0.gguf"
          ls -lh "${{ env.WORKDIR }}/models/unit-test/"
          du -sh "${{ env.WORKDIR }}/models/unit-test/test-model.gguf"

      - name: Build C++ tests with coverage
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm run coverage:cpp:build

      - name: Build C++ tests
        if: ${{ matrix.os != 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm run test:cpp:build

      - name: Run C++ tests
        id: cpp-tests
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/.lsan-suppressions.txt
        run: |
          set -euo pipefail

          if [ ! -f "build/test/unit/addon-test" ]; then
            echo "ERROR: Test executable not found at ${PWD}/build/test/unit/addon-test"
            exit 1
          fi

          cd build/test/unit/
          ./addon-test --gtest_output=xml:cpp-test-results.xml

          if [ -f cpp-test-results.xml ]; then
            test_count=$(grep -c '<testcase' cpp-test-results.xml || echo "0")
            if [ "$test_count" -eq 0 ]; then
              echo "ERROR: No tests were executed! Test count: $test_count"
              exit 1
            fi
            echo "✓ Successfully executed $test_count test(s)"
          else
            echo "ERROR: Test results file not generated"
            exit 1
          fi

      - name: Generate Coverage Report
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/test/unit/coverage-summary.txt | awk '{print $10}' || echo "0.0")
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Archive Coverage Results
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-coverage-report-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}
          path: |
            ${{ env.WORKDIR }}/build/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/test/unit/cpp-test-results.xml
          retention-days: 30


      - name: Coverage Summary
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        shell: bash
        run: |
          echo "## 🎯 C++ Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt" ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat "${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
