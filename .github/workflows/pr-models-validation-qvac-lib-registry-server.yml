# PR Validation and Post-Merge Staging Sync
#
# On PR: validates models.prod.json and runs tests (with 'verify' label).
# On merge to main: syncs models to staging registry and runs smoke test.

name: PR Validation and Staging Sync (Registry-server)

on:
  pull_request_target:
    branches: [main, release-*, feature-*, tmp-*]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "packages/qvac-lib-registry-server/**"
  push:
    branches: [main]
    paths:
      - "packages/qvac-lib-registry-server/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  PKG_DIR: packages/qvac-lib-registry-server
  MODELS_FILE: packages/qvac-lib-registry-server/data/models.prod.json

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  detect-changes:
    needs: authorize
    runs-on: ubuntu-latest
    if: needs.authorize.outputs.allowed == 'true'
    outputs:
      models_changed: ${{ steps.filter.outputs.models }}
      models_only: ${{ steps.filter.outputs.models == 'true' && steps.filter.outputs.other == 'false' }}
      other_changed: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PKG_DIR: ${{ env.PKG_DIR }}
          MODELS_FILE: ${{ env.MODELS_FILE }}
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"

          # Pick SHAs based on event type (PR vs push vs manual)
          if [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "pull_request_target" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            # workflow_dispatch (and anything else): diff current commit against its parent
            HEAD_SHA="${{ github.sha }}"
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          # Safety rails: never allow empty SHAs
          if [[ -z "${HEAD_SHA:-}" ]]; then
            echo "::error::HEAD_SHA is empty (event=$EVENT_NAME)"
            exit 1
          fi
          if [[ -z "${BASE_SHA:-}" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$HEAD_SHA"
          fi

          echo "event=$EVENT_NAME"
          echo "base=$BASE_SHA"
          echo "head=$HEAD_SHA"

          PKG_DIR="${{ env.PKG_DIR }}"
          MODELS_FILE="${{ env.MODELS_FILE }}"

          echo "Changed files (scoped to $PKG_DIR):"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "$PKG_DIR/" || true)"
          echo "$CHANGED_FILES"

          # models_changed?
          if echo "$CHANGED_FILES" | grep -qxF "$MODELS_FILE"; then
            echo "models=true" >> "$GITHUB_OUTPUT"
          else
            echo "models=false" >> "$GITHUB_OUTPUT"
          fi

          # other_changed? (inside this package; excluding models file + markdown)
          OTHER_CHANGES="$(echo "$CHANGED_FILES" | grep -v -x -F "$MODELS_FILE" | grep -v -E '\.md$' || true)"
          if [[ -n "$OTHER_CHANGES" ]]; then
            echo "other=true" >> "$GITHUB_OUTPUT"
          else
            echo "other=false" >> "$GITHUB_OUTPUT"
          fi

  validate-json:
    needs: [authorize, detect-changes]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.models_changed == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PKG_DIR }}/package-lock.json

      - name: Configure npm for private packages
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm ci

      - name: Validate models.prod.json
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/validate-models-json.js --file=./data/models.prod.json

  test:
    needs: [authorize, detect-changes]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.other_changed == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ${{ env.PKG_DIR }}/package-lock.json
            ${{ env.PKG_DIR }}/client/package-lock.json
      
      - name: Configure npm for private packages
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm ci

      - name: Lint
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run lint

      - name: Run unit tests
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run test:unit

      - name: Run integration tests
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run test:integration

      - name: Lint and test client
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install && npm run lint && npm run test:unit

  sync-staging:
    needs: [detect-changes, validate-json, test]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.detect-changes.outputs.models_changed == 'true' &&
      needs.validate-json.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    env:
      QVAC_AUTOBASE_KEY: ${{ secrets.QVAC_AUTOBASE_KEY }}
      QVAC_REGISTRY_CORE_KEY: ${{ secrets.QVAC_REGISTRY_CORE_KEY }}
      QVAC_WRITER_PUBLIC_KEY: ${{ secrets.QVAC_WRITER_PUBLIC_KEY }}
      QVAC_WRITER_SECRET_KEY: ${{ secrets.QVAC_WRITER_SECRET_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Validate required secrets
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          missing=""
          [ -z "$QVAC_AUTOBASE_KEY" ] && missing="$missing QVAC_AUTOBASE_KEY"
          [ -z "$QVAC_REGISTRY_CORE_KEY" ] && missing="$missing QVAC_REGISTRY_CORE_KEY"
          [ -z "$QVAC_WRITER_PUBLIC_KEY" ] && missing="$missing QVAC_WRITER_PUBLIC_KEY"
          [ -z "$QVAC_WRITER_SECRET_KEY" ] && missing="$missing QVAC_WRITER_SECRET_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "✓ All required secrets are set"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PKG_DIR }}/package-lock.json

      - name: Configure npm for private packages
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm ci

      - name: Install client dependencies
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install

      - name: Sync to staging
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/sync-models.js --file=./data/models.prod.json
        timeout-minutes: 30

  smoke-test:
    needs: sync-staging
    runs-on: ubuntu-latest
    environment: release
    env:
      QVAC_REGISTRY_CORE_KEY: ${{ secrets.QVAC_REGISTRY_CORE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Validate required secrets
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -z "$QVAC_REGISTRY_CORE_KEY" ]; then
            echo "::error::Missing required secret: QVAC_REGISTRY_CORE_KEY"
            exit 1
          fi
          echo "✓ All required secrets are set"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.PKG_DIR }}/package-lock.json

      - name: Configure npm for private packages
        shell: bash
        working-directory: ${{ env.PKG_DIR }}/client
        run: |
          echo "@tetherto:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "@qvac:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install server dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm ci

      - name: Install client dependencies
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install

      - name: Smoke test registry
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/smoke-test-client.js --file=./data/models.prod.json
        timeout-minutes: 5
