name: On PR Trigger (Embed)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-llamacpp-embed/**"
      - ".github/workflows/*embed*.yml"
  workflow_dispatch:

  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  on-pr:
    permissions:
      contents: write
      pull-requests: write
      packages: write
    uses: ./.github/workflows/_reusable-on-pr-addon.yml
    secrets: inherit
    with:
      package_slug: qvac-lib-infer-llamacpp-embed
      workdir: packages/qvac-lib-infer-llamacpp-embed
      artifact_prefix: llama-cpp-embed
      publish_target: gpr
      tag: dev
      test_models: >-
        [
          "unsloth/embeddinggemma-300m-GGUF/embeddinggemma-300M-Q8_0.gguf=test-model.gguf"
        ]

  integration-tests:
    needs: on-pr
    uses: ./.github/workflows/integration-test-qvac-lib-infer-llamacpp-embed.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write
    needs: on-pr
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-llamacpp-embed.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs: [on-pr, integration-tests, run-mobile-integration-tests]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.on-pr.result == 'success' }}
      build-status: ${{ needs.on-pr.result == 'success' }}
