name: On PR Trigger (Embed)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-lib-infer-llamacpp-embed/**"
      - ".github/workflows/*embed*.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Run Sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/qvac-lib-infer-llamacpp-embed

  cpp-lint:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.7
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/qvac-lib-infer-llamacpp-embed

  cpp-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks]
    uses: ./.github/workflows/cpp-tests-embed.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  ts-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Configure npm auth
        working-directory: packages/qvac-lib-infer-llamacpp-embed
        run: |
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          NPMRC

      - name: Install dependencies
        working-directory: packages/qvac-lib-infer-llamacpp-embed
        run: npm install

      - name: Type declaration check
        working-directory: packages/qvac-lib-infer-llamacpp-embed
        run: npm run test:dts

  prebuild:
    permissions:
      contents: write
      packages: write
      pull-requests: write
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks]
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-llamacpp-embed.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}
      tag: "dev"
      publish_target: 'gpr'

  integration-tests:
    needs: [authorize, prebuild]
    if: needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/integration-test-qvac-lib-infer-llamacpp-embed.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize, prebuild]
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-llamacpp-embed.yml
    secrets:
      ANDROID_DEVICE_POOL_ARN_LLAMACPP_EMBED: ${{ secrets.ANDROID_DEVICE_POOL_ARN_LLAMACPP_EMBED }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_DEVICE_FARM_PROJECT_ARN_LLAMACPP_EMBED: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_LLAMACPP_EMBED }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      IOS_DEVICE_POOL_ARN_LLAMACPP_EMBED: ${{ secrets.IOS_DEVICE_POOL_ARN_LLAMACPP_EMBED }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
      TEST_APP_APPLE_PROVISIONING_PROFILE: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs: [authorize, sanity-checks, cpp-lint, cpp-tests, prebuild, integration-tests, run-mobile-integration-tests, ts-checks]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
