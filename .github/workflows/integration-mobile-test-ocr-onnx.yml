            cat > /tmp/wdio-config.js << 'WDIO_EOF'
          exports.config={runner:"local",hostname:"127.0.0.1",port:4723,path:"/wd/hub",specs:["*.spec.js","*.test.js"],maxInstances:1,bail:0,capabilities:[{platformName:"iOS","appium:automationName":"XCUITest","appium:bundleId":"__BUNDLE_ID__","appium:newCommandTimeout":300,"appium:noReset":true,"appium:forceAppLaunch":false,"appium:usePrebuiltWDA":true,"appium:wdaLocalPort":8100,"appium:showIOSLog":true,"appium:realDeviceLogger":"/usr/local/lib/node_modules/appium/node_modules/deviceconsole/deviceconsole"}],logLevel:"debug",waitforTimeout:120000,connectionRetryTimeout:30000,connectionRetryCount:3,services:[],framework:"mocha",reporters:["spec"],mochaOpts:{ui:"bdd",timeout:1800000,grep:"__MOCHA_GREP__"},before:async function(capabilities,specs,browser){const BUNDLE_ID="__BUNDLE_ID__";const TEST_FILTER="__TEST_FILTER__";global.appCrashed=false;global.checkAppCrash=async(stage)=>{try{const state=await browser.queryAppState(BUNDLE_ID);console.log("["+stage+"] App state: "+state+" (4=foreground,3=background,1=not running)");if(state<3){console.error("\n APP CRASHED at "+stage+"! State="+state);console.error("Check device logs for BareKit/native errors.\n");global.appCrashed=true;process.exit(1);}return state;}catch(e){console.log("["+stage+"] queryAppState error: "+e.message);return-1;}};console.log("Checking initial app state...");await global.checkAppCrash("startup");console.log("Waiting for app to initialize...");await browser.pause(5000);await global.checkAppCrash("after-pause");const initText=await browser.$("-ios predicate string:label CONTAINS \"INITIALIZED\"");await initText.waitForDisplayed({timeout:60000});await global.checkAppCrash("after-init");if(TEST_FILTER!=="__TEST_FILTER__"){try{const b64=Buffer.from(TEST_FILTER).toString("base64");await browser.pushFile("@"+BUNDLE_ID+":documents/testFilter.txt",b64);console.log("Pushed test filter: "+TEST_FILTER);}catch(e){console.log("pushFile failed: "+e.message);}}console.log("App initialized, clicking Run Automated Tests...");const button=await browser.$("-ios predicate string:label CONTAINS \"Run Automated Tests\"");await button.waitForDisplayed({timeout:15000});await button.click();console.log("Button clicked!");await browser.pause(5000);await global.checkAppCrash("after-click");},afterTest:async function(test,context,{error}){if(global.appCrashed)return;await global.checkAppCrash("after-test:"+test.title);},after:async function(){console.log("[perf-extract] Pulling perf-report.json from device...");var BID="__BUNDLE_ID__";var pullPaths=["@"+BID+":documents/perf-report.json","@"+BID+":library/perf-report.json"];for(var i=0;i<pullPaths.length;i++){try{var b64=await browser.pullFile(pullPaths[i]);var json=Buffer.from(b64,"base64").toString();try{require("fs").writeFileSync("perf-report-extract.json",json);console.log("[perf-extract] Written to perf-report-extract.json ("+json.length+" bytes)");}catch(we){console.log("[perf-extract] writeFile failed: "+we.message);}console.log("[perf-extract] Success from "+pullPaths[i]);break;}catch(e){console.log("[perf-extract] "+pullPaths[i]+": "+e.message);}}console.log("[bare-log] Waiting for log flush...");await browser.pause(3000);try{var _h=require("http");var lb64=await new Promise(function(ok,fail){var bd=JSON.stringify({path:"@"+BID+":documents/bare_console.log"});var rq=_h.request({hostname:"127.0.0.1",port:4723,path:"/wd/hub/session/"+browser.sessionId+"/appium/device/pull_file",method:"POST",headers:{"Content-Type":"application/json","Content-Length":Buffer.byteLength(bd)}},function(rs){var d="";rs.on("data",function(c){d+=c;});rs.on("end",function(){try{ok(JSON.parse(d).value);}catch(e){fail(e);}});});rq.on("error",fail);rq.write(bd);rq.end();});var logTxt=Buffer.from(lb64,"base64").toString();var logDir=process.env.DEVICEFARM_LOG_DIR||".";require("fs").writeFileSync(logDir+"/bare_console.log",logTxt);console.log("[bare-log] Written bare_console.log ("+logTxt.length+" bytes)");}catch(le){console.log("[bare-log] pull failed: "+le.message);}}};
          WDIO_EOF
            sed "s#__BUNDLE_ID__#${BID}#g" /tmp/wdio-config.js > /tmp/wdio-config-final.js
            mv /tmp/wdio-config-final.js /tmp/wdio-config.js
            echo "WDIO_CONFIG_FILE=/tmp/wdio-config.js" >> $GITHUB_OUTPUT
          fi

      - name: Create and Upload Test Spec
        id: upload_test_spec
        run: |
          echo "📝 Creating test spec for custom environment mode..."
          echo "Platform: ${{ matrix.platform }}"

          WDIO_CONFIG=$(cat /tmp/wdio-config.js)

          if [ "${{ matrix.platform }}" == "Android" ]; then
            PLATFORM="Android"
            AUTOMATION="UiAutomator2"
            HOST_LINE="android_test_host: amazon_linux_2"
          else
            PLATFORM="iOS"
            AUTOMATION="XCUITest"
            HOST_LINE="ios_test_host: macos_sequoia"
          fi

          # Read test groups and create per-group WDIO configs
          GROUPS_JSON="${GITHUB_WORKSPACE}/addon/${{ inputs.workdir || env.PKG_DIR }}/test/mobile/test-groups.json"
          PERF_PATTERN=$(jq -r '.perf | join("|")' "$GROUPS_JSON")
          REGULAR_PATTERN=$(jq -r '.regular | join("|")' "$GROUPS_JSON")
          echo "Perf test pattern: $PERF_PATTERN"
          echo "Regular test pattern: $REGULAR_PATTERN"

          # Mocha grep MUST be "." (match-all) — the grep patterns are function names
          # from test-groups.json, NOT WDIO spec test titles. A non-matching grep
          # causes WDIO to skip its spec tests and exit immediately without waiting
          # for the app to finish, producing incomplete perf reports.
          # Test-level filtering is done post-extraction via --filter in extract-from-log.js.
          WDIO_CONFIG_PERF_B64=$(echo "$WDIO_CONFIG" | sed "s#__MOCHA_GREP__#.#" | sed "s#__TEST_FILTER__#$PERF_PATTERN#" | base64 | tr -d '\n')
          WDIO_CONFIG_REGULAR_B64=$(echo "$WDIO_CONFIG" | sed "s#__MOCHA_GREP__#.#" | sed "s#__TEST_FILTER__#$REGULAR_PATTERN#" | base64 | tr -d '\n')

          # Function to generate a testspec YAML given a base64-encoded WDIO config
          generate_testspec() {
            local config_b64="$1"
            local output_file="$2"
            {
            printf 'version: 0.1\n'
            if [ -n "$HOST_LINE" ]; then
              printf '%s\n' "$HOST_LINE"
            fi
            printf '\n'
            printf 'phases:\n'
            printf '  install:\n'
            printf '    commands:\n'
            printf '      - echo "Setting up Node.js environment..."\n'
            printf '      - export NVM_DIR=$HOME/.nvm\n'
            printf '      - . $NVM_DIR/nvm.sh 2>/dev/null || true\n'
            printf '      - nvm install 18 2>/dev/null || true\n'
            printf '      - nvm use 18 2>/dev/null || true\n'
            printf '      - node --version || echo "Using system node"\n'
            printf '\n'
            printf '  pre_test:\n'
            printf '    commands:\n'
            printf '      - echo "Setting up test environment..."\n'
            printf '      - cd $DEVICEFARM_TEST_PACKAGE_PATH\n'
            printf '      - ls -la\n'
            printf '      - echo "Installing dependencies (clean install)..."\n'
            printf '      - rm -rf node_modules package-lock.json 2>/dev/null || true\n'
            printf '      - npm install --legacy-peer-deps 2>&1\n'
            printf '      - echo "Verifying wdio installation..."\n'
            printf '      - ls -la node_modules/.bin/ | grep wdio || echo "wdio not found in .bin"\n'
            printf '      - node node_modules/@wdio/cli/bin/wdio.js --version || echo "wdio version check failed"\n'
            printf '      - echo "Creating wdio config for Device Farm..."\n'
            printf '      - echo "%s" | base64 -d > tests/wdio.config.devicefarm.js\n' "$config_b64"
            printf '      - echo "wdio config written (not cat-ing to avoid false positive marker extraction)"\n'

          # Android-specific: increase logcat buffer and pre-create external storage dir
          if [ "${{ matrix.platform }}" == "Android" ]; then
            printf '      - echo "Increasing logcat buffer to 16MB for reliable log capture..."\n'
            printf '      - adb shell logcat -G 16M 2>/dev/null || true\n'
            printf '      - echo "Pre-creating external storage directory for perf report..."\n'
            printf '      - adb shell mkdir -p /sdcard/Android/data/%s/files/ 2>/dev/null || true\n' '${{ env.APP_BUNDLE_ID }}'
          fi

          # iOS-specific WebDriverAgent configuration (only for iOS platform)
          if [ "${{ matrix.platform }}" == "iOS" ]; then
            printf '      - echo "🔧 Configuring WebDriverAgent for iOS..."\n'
            printf '      - export DEVICEFARM_APPIUM_WDA_DERIVED_DATA_PATH=$DEVICEFARM_APPIUM_WDA_DERIVED_DATA_PATH_V9\n'
            printf '      - echo "WDA Path: $DEVICEFARM_APPIUM_WDA_DERIVED_DATA_PATH"\n'
          fi

            printf '      - echo "🚀 Starting Appium server..."\n'
            printf '      - export APPIUM_BASE_PATH=/wd/hub\n'
            printf '      - |\n'
            printf '        appium --base-path=$APPIUM_BASE_PATH --log-timestamp \\\n'
            printf '          --log-no-colors --relaxed-security --default-capabilities \\\n'
            printf '          "{\\"appium:deviceName\\": \\"$DEVICEFARM_DEVICE_NAME\\", \\\n'
            printf '          \\"platformName\\": \\"$DEVICEFARM_DEVICE_PLATFORM_NAME\\", \\\n'
            printf '          \\"appium:app\\": \\"$DEVICEFARM_APP_PATH\\", \\\n'
            printf '          \\"appium:udid\\":\\"$DEVICEFARM_DEVICE_UDID\\", \\\n'
            printf '          \\"appium:platformVersion\\": \\"$DEVICEFARM_DEVICE_OS_VERSION\\", \\\n'
            printf '          \\"appium:chromedriverExecutableDir\\": \\"$DEVICEFARM_CHROMEDRIVER_EXECUTABLE_DIR\\", \\\n'
            printf '          \\"appium:wdaLocalPort\\": 8100, \\\n'
            printf '          \\"appium:derivedDataPath\\": \\"$DEVICEFARM_APPIUM_WDA_DERIVED_DATA_PATH\\", \\\n'
            printf '          \\"appium:usePrebuiltWDA\\": true, \\\n'
            printf '          \\"appium:automationName\\": \\"%s\\"}" \\\n' "$AUTOMATION"
            printf '          >> $DEVICEFARM_LOG_DIR/appium.log 2>&1 &\n'
            printf '      - echo "⏳ Waiting for Appium to be ready (max 30 seconds)..."\n'
            printf '      - |\n'
            printf '        appium_initialization_time=0\n'
            printf '        until curl --silent --fail "http://0.0.0.0:4723${APPIUM_BASE_PATH}/status"; do\n'
            printf '          if [[ $appium_initialization_time -gt 30 ]]; then\n'
            printf '            echo "❌ Appium did not start within 30 seconds. Exiting..."\n'
            printf '            cat $DEVICEFARM_LOG_DIR/appium.log\n'
            printf '            exit 1\n'
            printf '          fi\n'
            printf '          appium_initialization_time=$((appium_initialization_time + 1))\n'
            printf '          echo "Waiting for Appium to start on port 4723 (${appium_initialization_time}s/30s)..."\n'
            printf '          sleep 1\n'
            printf '        done\n'
            printf '      - echo "✅ Appium server is ready!"\n'
            printf '      - curl -s http://0.0.0.0:4723${APPIUM_BASE_PATH}/status || echo "Status check failed"\n'
            printf '      - echo "ℹ️  Button click handled via WebDriverIO before hook (single session)"\n'
            printf '\n'
            printf '  test:\n'
            printf '    commands:\n'
            printf '      - echo "🧪 Running WebDriverIO tests..."\n'
            printf '      - cd $DEVICEFARM_TEST_PACKAGE_PATH\n'
            printf '      - echo "Verifying Appium is still running..."\n'
            printf '      - ps aux | grep appium | grep -v grep || echo "⚠️  Appium process not found"\n'
            printf '      - curl -s http://127.0.0.1:4723/wd/hub/status || echo "⚠️  Appium status check failed"\n'

            printf '      - echo "Starting wdio test execution..."\n'
            printf '      - node node_modules/@wdio/cli/bin/wdio.js run tests/wdio.config.devicefarm.js\n'
            printf '\n'
            printf '  post_test:\n'
            printf '    commands:\n'
            printf '      - echo "Test completed"\n'

          # Output perf report from WDIO-written file (clean, no console.log interleaving)
            printf '      - |\n'
            printf '        echo "========== Extracting perf report from WDIO file =========="\n'
            printf '        WDIO_PERF=""\n'
            printf '        for CANDIDATE in "$DEVICEFARM_LOG_DIR/perf-report-extract.json" "$DEVICEFARM_TEST_PACKAGE_PATH/perf-report-extract.json"; do\n'
            printf '          if [ -s "$CANDIDATE" ]; then\n'
            printf '            WDIO_PERF="$CANDIDATE"\n'
            printf '            break\n'
            printf '          fi\n'
            printf '        done\n'
            printf '        if [ -n "$WDIO_PERF" ]; then\n'
            printf '          echo "Found WDIO perf report at $WDIO_PERF: $(wc -c < "$WDIO_PERF") bytes"\n'
            printf '          echo "[PERF_REPORT_START]"\n'
            printf '          cat "$WDIO_PERF"\n'
            printf '          echo "[PERF_REPORT_END]"\n'
            printf '        else\n'
            printf '          echo "No WDIO perf-report-extract.json found in LOG_DIR or TEST_PACKAGE_PATH"\n'
            printf '        fi\n'

          # Android-specific: extract perf report from device using logcat + adb
          if [ "${{ matrix.platform }}" == "Android" ]; then
            printf '      - adb logcat -d -b all > $DEVICEFARM_LOG_DIR/logcat_full.txt 2>/dev/null || true\n'
            printf '      - |\n'
            printf '        echo "=== Android perf report extraction ==="\n'
            printf '        X="" L=$DEVICEFARM_LOG_DIR B=%s\n' '${{ env.APP_BUNDLE_ID }}'
            printf '        RP=$(grep -oP "\\[PERF_REPORT_PATH\\]\\K.*" $L/logcat_full.txt 2>/dev/null|tail -1|tr -d "\\r")\n'
            printf '        [ -n "$RP" ] && adb shell "cat $RP" >$L/perf-report.json 2>/dev/null && [ -s $L/perf-report.json ] && X=1\n'
            printf '        [ -z "$X" ] && for P in /sdcard/Android/data/$B/files/perf-report.json /storage/emulated/0/Android/data/$B/files/perf-report.json /tmp/perf-report.json /data/local/tmp/perf-report.json; do adb shell "cat $P">$L/perf-report.json 2>/dev/null;[ -s $L/perf-report.json ]&&X=1&&break;done\n'
            printf '        [ -z "$X" ] && for S in files/perf-report.json cache/perf-report.json ./perf-report.json; do adb shell "run-as $B cat $S">$L/perf-report.json 2>/dev/null;[ -s $L/perf-report.json ]&&X=1&&break;done\n'
            printf '        [ -z "$X" ] && FP=$(adb shell "find /data /sdcard/Android/data -name perf-report.json -type f 2>/dev/null"|head -1|tr -d "\\r") && [ -n "$FP" ] && adb shell "cat $FP">$L/perf-report.json 2>/dev/null && [ -s $L/perf-report.json ] && X=1\n'
            printf '        if [ -n "$X" ]; then\n'
            printf '          echo "[PERF_REPORT_START]"\n'
            printf '          cat $L/perf-report.json\n'
            printf '          echo "[PERF_REPORT_END]"\n'
            printf '        elif grep -q "PERF_REPORT_START\\|PERF_CHUNK" $L/logcat_full.txt 2>/dev/null; then\n'
            printf '          echo "Extracting perf report from logcat console output..."\n'
            printf '          sed -n "/PERF_REPORT_START/,/PERF_REPORT_END/p" $L/logcat_full.txt\n'
            printf '          grep "PERF_CHUNK" $L/logcat_full.txt 2>/dev/null||true\n'
            printf '        else\n'
            printf '          echo "FAILED: no perf data found in files or logcat"\n'
            printf '          echo "=== logcat perf-related lines ==="\n'
            printf '          grep -i "perf\\|PERF_REPORT" $L/logcat_full.txt 2>/dev/null|tail -30||true\n'
            printf '          echo "=== logcat_full.txt size ==="\n'
            printf '          wc -c $L/logcat_full.txt 2>/dev/null||echo "logcat_full.txt missing"\n'
            printf '        fi\n'
            printf '      - ls -lh $DEVICEFARM_LOG_DIR/ || true\n'
          fi

          # iOS-specific: Output captured device logs
          if [ "${{ matrix.platform }}" == "iOS" ]; then
            printf '      - echo "📋 Available log files:"\n'
            printf '      - ls -lh $DEVICEFARM_LOG_DIR/ || echo "Log directory not accessible"\n'
          fi
            printf '\n'
            printf 'artifacts:\n'
            printf '  - $DEVICEFARM_LOG_DIR\n'
          } > "$output_file"
          }

          generate_testspec "$WDIO_CONFIG_PERF_B64" "testspec-perf.yml"
          generate_testspec "$WDIO_CONFIG_REGULAR_B64" "testspec-regular.yml"

          echo "Generated perf test spec:"
          echo "===================="
          head -5 testspec-perf.yml
          echo "..."
          echo "===================="
          echo "Generated regular test spec:"
          echo "===================="
          head -5 testspec-regular.yml
          echo "..."
          echo "===================="

          # Upload helper (status messages go to stderr, only the ARN goes to stdout)
          upload_spec() {
            local spec_file="$1"
            local label="$2"
            echo "📤 Uploading $label test spec ($spec_file)..." >&2
            SPEC_RESPONSE=$(aws devicefarm create-upload \
              --project-arn "${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT }}" \
              --name "$spec_file" \
              --type "APPIUM_NODE_TEST_SPEC" \
              --output json)

            SPEC_UPLOAD_URL=$(echo $SPEC_RESPONSE | jq -r '.upload.url')
            SPEC_UPLOAD_ARN=$(echo $SPEC_RESPONSE | jq -r '.upload.arn')

            curl -sT "$spec_file" "$SPEC_UPLOAD_URL"

            echo "⏳ Waiting for $label spec to be processed..." >&2
            MAX_ATTEMPTS=20
            ATTEMPT=1
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              STATUS=$(aws devicefarm get-upload --arn "$SPEC_UPLOAD_ARN" --query "upload.status" --output text)
              if [ "$STATUS" = "SUCCEEDED" ]; then
                echo "✅ $label spec upload successful" >&2
                break
              fi
              if [ "$STATUS" = "FAILED" ]; then
                echo "❌ $label spec upload failed" >&2
                aws devicefarm get-upload --arn "$SPEC_UPLOAD_ARN" >&2
                exit 1
              fi
              sleep 5
              ATTEMPT=$((ATTEMPT + 1))
            done
            echo "$SPEC_UPLOAD_ARN"
          }

          PERF_SPEC_ARN=$(upload_spec "testspec-perf.yml" "Perf")
          echo "test_spec_arn_perf=$PERF_SPEC_ARN" >> $GITHUB_OUTPUT

          REGULAR_SPEC_ARN=$(upload_spec "testspec-regular.yml" "Regular")
          echo "test_spec_arn_regular=$REGULAR_SPEC_ARN" >> $GITHUB_OUTPUT

      - name: Schedule Device Farm Test Runs (Perf + Regular)
        id: schedule_run
        run: |
          if [ "${{ matrix.platform }}" == "Android" ]; then
            POOL_ARN="${{ secrets.ANDROID_DEVICE_POOL_ARN_OCR_FASTTEXT }}"
          else
            POOL_ARN="${{ secrets.IOS_DEVICE_POOL_ARN_OCR_FASTTEXT }}"
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUN_NAME="Manual-${{ github.run_number }}-${{ matrix.platform }}"
          else
            RUN_NAME="PR-${{ github.event.pull_request.number || github.run_number }}-${{ matrix.platform }}"
          fi

          PROJECT_ARN="${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT }}"
          APP_ARN="${{ steps.upload_app.outputs.app_upload_arn }}"
          TEST_PKG_ARN="${{ steps.upload_test_package.outputs.test_package_upload_arn }}"
          PERF_SPEC_ARN="${{ steps.upload_test_spec.outputs.test_spec_arn_perf }}"
          REGULAR_SPEC_ARN="${{ steps.upload_test_spec.outputs.test_spec_arn_regular }}"

          echo "🚀 Scheduling 2 Device Farm runs (Perf + Regular)..."
          echo "Platform: ${{ matrix.platform }}"
          echo "Device Pool: $POOL_ARN"

          PERF_RUN_ARN=$(aws devicefarm schedule-run \
            --project-arn "$PROJECT_ARN" \
            --device-pool-arn "$POOL_ARN" \
            --app-arn "$APP_ARN" \
            --name "${RUN_NAME}-Perf" \
            --test "type=APPIUM_NODE,testPackageArn=$TEST_PKG_ARN,testSpecArn=$PERF_SPEC_ARN" \
            --query 'run.arn' --output text)
          echo "✅ Perf run scheduled: $PERF_RUN_ARN"
          echo "run_arn_perf=$PERF_RUN_ARN" >> $GITHUB_OUTPUT

          REGULAR_RUN_ARN=$(aws devicefarm schedule-run \
            --project-arn "$PROJECT_ARN" \
            --device-pool-arn "$POOL_ARN" \
            --app-arn "$APP_ARN" \
            --name "${RUN_NAME}-Regular" \
            --test "type=APPIUM_NODE,testPackageArn=$TEST_PKG_ARN,testSpecArn=$REGULAR_SPEC_ARN" \
            --query 'run.arn' --output text)
          echo "✅ Regular run scheduled: $REGULAR_RUN_ARN"
          echo "run_arn_regular=$REGULAR_RUN_ARN" >> $GITHUB_OUTPUT

          echo "run_arn=$PERF_RUN_ARN" >> $GITHUB_OUTPUT

      - name: Monitor Test Runs (Perf + Regular)
        id: monitor_run
        run: |
          PERF_ARN="${{ steps.schedule_run.outputs.run_arn_perf }}"
          REGULAR_ARN="${{ steps.schedule_run.outputs.run_arn_regular }}"
          echo "📊 Monitoring 2 test runs:"
          echo "  Perf:    $PERF_ARN"
          echo "  Regular: $REGULAR_ARN"
          echo ""

          MAX_WAIT_TIME=7200
          ELAPSED=0
          PERF_DONE=false
          REGULAR_DONE=false

          while true; do
            if [ "$PERF_DONE" = false ]; then
              PERF_STATUS=$(aws devicefarm get-run --arn "$PERF_ARN" --query 'run.status' --output text)
              if [[ "$PERF_STATUS" == "COMPLETED" ]]; then
                PERF_DONE=true
                echo "✅ Perf run completed! (${ELAPSED}s)"
              fi
            fi

            if [ "$REGULAR_DONE" = false ]; then
              REG_STATUS=$(aws devicefarm get-run --arn "$REGULAR_ARN" --query 'run.status' --output text)
              if [[ "$REG_STATUS" == "COMPLETED" ]]; then
                REGULAR_DONE=true
                echo "✅ Regular run completed! (${ELAPSED}s)"
              fi
            fi

            if [ "$PERF_DONE" = true ] && [ "$REGULAR_DONE" = true ]; then
              echo ""
              echo "✅ Both runs completed!"
              break
            fi

            echo "⏳ Perf: ${PERF_STATUS:-done} | Regular: ${REG_STATUS:-done} | Elapsed: ${ELAPSED}s"

            if [ $ELAPSED -ge $MAX_WAIT_TIME ]; then
              echo ""
              echo "❌ Timeout: Runs exceeded $MAX_WAIT_TIME seconds"
              exit 1
            fi

            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          # Report on perf run (primary)
          RUN_ARN="$PERF_ARN"
          RUN_DETAILS=$(aws devicefarm get-run --arn "$RUN_ARN" --output json)
          RESULT=$(echo $RUN_DETAILS | jq -r '.run.result')
          COUNTERS=$(echo $RUN_DETAILS | jq -r '.run.counters')

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 FINAL TEST RESULTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Result: $RESULT"
          echo ""

          # Get jobs (devices) and extract actual test names
          echo "📱 Fetching detailed test results..."
          JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --output json)

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 YOUR TESTS (excluding Setup/Teardown)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          DEVICE_COUNT=0
          USER_TEST_COUNT=0
          USER_PASSED=0
          USER_FAILED=0
          FAILED_TEST_DETAILS=()

          # Extract project ID and run ID from RUN_ARN for console links
          # RUN_ARN format: arn:aws:devicefarm:us-west-2:ACCOUNT:run:PROJECT_ID/RUN_ID
          PROJECT_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:\([^/]*\)\/.*/\1/p')
          RUN_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:[^/]*\/\(.*\)/\1/p')

          # Process each device/job
          for JOB_ARN in $(echo "$JOBS" | jq -r '.jobs[].arn'); do
            DEVICE_COUNT=$((DEVICE_COUNT + 1))
            JOB_DETAILS=$(aws devicefarm get-job --arn "$JOB_ARN" --output json)
            DEVICE_NAME=$(echo "$JOB_DETAILS" | jq -r '.job.device.name // "Unknown Device"')
            JOB_RESULT=$(echo "$JOB_DETAILS" | jq -r '.job.result // "UNKNOWN"')
            JOB_ID=$(echo "$JOB_ARN" | sed -n 's/.*:job:[^/]*\/[^/]*\/\(.*\)/\1/p')

            # Build console link (no region param needed when region is in subdomain)
            CONSOLE_LINK="https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}/jobs/${JOB_ID}"

            if [ "$JOB_RESULT" = "PASSED" ]; then
              echo "   ✅ $DEVICE_NAME: PASSED"
              USER_PASSED=$((USER_PASSED + 1))
            else
              echo "   ❌ $DEVICE_NAME: $JOB_RESULT"
              USER_FAILED=$((USER_FAILED + 1))
              FAILED_TEST_DETAILS+=("❌ $DEVICE_NAME: $JOB_RESULT")
              FAILED_TEST_DETAILS+=("   📎 View logs: $CONSOLE_LINK")
            fi

            USER_TEST_COUNT=$((USER_TEST_COUNT + 1))
            echo ""
          done

          # Show AWS Device Farm console link for the entire run
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 AWS DEVICE FARM LINKS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📊 Full Run Details:"
          echo "   https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}"
          echo ""
          echo "💡 Tip: Click the link above, then select a device to view:"
          echo "   • Video recording of the test"
          echo "   • Screenshots"
          echo "   • Device logs"
          echo "   • Test spec output (shows individual test results)"
          echo ""

          # Summary
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Devices tested: $DEVICE_COUNT"
          echo "  ✅ Passed: $USER_PASSED"
          echo "  ❌ Failed: $USER_FAILED"
          echo ""
          echo "📋 What these tests verify:"
          echo "   The E2E tests run on Device Farm check that your app:"
          echo "   1. Shows 'INITIALIZED' after startup"
          echo "   2. Runs all test functions from test/mobile/*.cjs"
          echo "   3. Reports PASS/FAIL for each test function"
          echo ""
          echo "💡 If a test times out but the video shows PASS:"
          echo "   → The app test passed, but E2E gave up waiting too early"
          echo "   → Check timeout settings in qvac-test-addon-mobile"
          echo ""
          echo "Device Farm Counters (includes Setup/Teardown):"
          echo "$COUNTERS" | jq '.'
          echo ""

          if [ ${#FAILED_TEST_DETAILS[@]} -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ FAILED TESTS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for failed_info in "${FAILED_TEST_DETAILS[@]}"; do
              echo "$failed_info"
            done
            echo ""
          fi

          # Save for PR comment
          echo "test_result=$RESULT" >> $GITHUB_OUTPUT
          echo "test_counters<<EOF" >> $GITHUB_OUTPUT
          echo "$COUNTERS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract test counts
          TOTAL=$(echo $COUNTERS | jq -r '.total // 0')
          PASSED=$(echo $COUNTERS | jq -r '.passed // 0')
          FAILED=$(echo $COUNTERS | jq -r '.failed // 0')
          SKIPPED=$(echo $COUNTERS | jq -r '.skipped // 0')

          echo "test_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "test_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "test_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "test_skipped=$SKIPPED" >> $GITHUB_OUTPUT

          # Also save user test counts
          echo "user_test_count=$USER_TEST_COUNT" >> $GITHUB_OUTPUT
          echo "user_test_passed=$USER_PASSED" >> $GITHUB_OUTPUT
          echo "user_test_failed=$USER_FAILED" >> $GITHUB_OUTPUT

          # Also check regular run result
          REGULAR_RESULT=$(aws devicefarm get-run --arn "$REGULAR_ARN" --query 'run.result' --output text)
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 REGULAR RUN RESULT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Regular run result: $REGULAR_RESULT"
          echo ""

          if [[ "$RESULT" != "PASSED" ]] || [[ "$REGULAR_RESULT" != "PASSED" ]] || [ $USER_FAILED -gt 0 ]; then
            echo ""
            echo "❌ Device Farm tests failed"
            if [[ "$RESULT" != "PASSED" ]]; then
              echo "   Perf run result: $RESULT"
            fi
            if [[ "$REGULAR_RESULT" != "PASSED" ]]; then
              echo "   Regular run result: $REGULAR_RESULT"
            fi
            echo "   Perf devices: $USER_PASSED passed, $USER_FAILED failed (out of $USER_TEST_COUNT total)"
            echo "   Perf counters: $TOTAL total | $PASSED passed | $FAILED failed | $SKIPPED skipped"
            exit 1
          fi

          echo ""
          echo "✅ All Device Farm tests passed (Perf + Regular)!"
          echo "   Perf devices: $USER_PASSED passed (out of $USER_TEST_COUNT total)"
          echo "   Perf counters: $TOTAL total | $PASSED passed | $FAILED failed | $SKIPPED skipped"

      - name: Download Device Farm artifacts (perf run logs)
        if: always() && steps.schedule_run.outputs.run_arn_perf
        id: download_df_logs
        run: |
          RUN_ARN="${{ steps.schedule_run.outputs.run_arn_perf }}"
          echo "Downloading Device Farm artifacts for perf run: $RUN_ARN"

          JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --output json)
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/df-artifacts/${{ matrix.platform }}"
          mkdir -p "$ARTIFACT_DIR"

          for JOB_ARN in $(echo "$JOBS" | jq -r '.jobs[].arn'); do
            DEVICE_NAME=$(aws devicefarm get-job --arn "$JOB_ARN" --query 'job.device.name' --output text | tr ' ' '_')
            DEVICE_DIR="${ARTIFACT_DIR}/${DEVICE_NAME}"
            mkdir -p "$DEVICE_DIR"

            SUITES=$(aws devicefarm list-suites --arn "$JOB_ARN" --output json)
            for SUITE_ARN in $(echo "$SUITES" | jq -r '.suites[].arn'); do
              # FILE artifacts: test spec output, customer artifacts (files from $DEVICEFARM_LOG_DIR)
              ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type FILE --output json)
              echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.type == "TESTSPEC_OUTPUT" or .type == "CUSTOMER_ARTIFACT_LOG" or .type == "CUSTOMER_ARTIFACT") | [.type, .name, .url] | @tsv' | while IFS=$'\t' read -r TYPE NAME URL; do
                if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                  if [ "$TYPE" = "CUSTOMER_ARTIFACT" ]; then
                    SAFE_NAME=$(echo "$NAME" | tr ' /' '_')
                    FILENAME="customer_${SAFE_NAME}"
                  else
                    FILENAME="${TYPE}.txt"
                  fi
                  echo "  Downloading ${DEVICE_NAME}/${FILENAME}..."
                  curl -sL "$URL" -o "${DEVICE_DIR}/${FILENAME}" || true
                fi
              done

              # LOG artifacts: device logcat/syslog (contains app console.log output with perf markers)
              LOG_ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type LOG --output json)
              echo "$LOG_ARTIFACTS" | jq -r '.artifacts[] | select(.type == "DEVICE_LOG" or .type == "LOGCAT") | "\(.type) \(.url)"' | while read -r TYPE URL; do
                if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                  FILENAME="${TYPE}.txt"
                  echo "  Downloading ${DEVICE_NAME}/${FILENAME} (device log)..."
                  curl -sL "$URL" -o "${DEVICE_DIR}/${FILENAME}" || true
                fi
              done
            done
          done

          echo "artifact_dir=$ARTIFACT_DIR" >> $GITHUB_OUTPUT
          echo "Downloaded artifacts:"
          find "$ARTIFACT_DIR" -type f -ls 2>/dev/null || echo "  (none)"

      - name: Diagnose Device Farm output
        if: always() && steps.download_df_logs.outputs.artifact_dir
        run: |
          ARTIFACT_DIR="${{ steps.download_df_logs.outputs.artifact_dir }}"

          echo "=== All downloaded artifact files ==="
          find "$ARTIFACT_DIR" -type f -ls 2>/dev/null || echo "  (none)"
          echo ""

          echo "=== Searching ALL files for perf markers ==="
          for f in $(find "$ARTIFACT_DIR" -type f -name "*.txt"); do
            HAS_MARKERS=$(grep -c "PERF_REPORT_START" "$f" 2>/dev/null || true)
            HAS_PATH=$(grep -c "PERF_REPORT_PATH" "$f" 2>/dev/null || true)
            HAS_CHUNKS=$(grep -c "PERF_CHUNK" "$f" 2>/dev/null || true)
            HAS_MARKERS=${HAS_MARKERS:-0}
            HAS_PATH=${HAS_PATH:-0}
            HAS_CHUNKS=${HAS_CHUNKS:-0}
            if [ "$HAS_MARKERS" != "0" ] || [ "$HAS_PATH" != "0" ] || [ "$HAS_CHUNKS" != "0" ]; then
              echo "  $f: PERF_REPORT_START=$HAS_MARKERS, PERF_REPORT_PATH=$HAS_PATH, PERF_CHUNK=$HAS_CHUNKS"
            fi
          done
          echo ""

          echo "=== TESTSPEC_OUTPUT.txt diagnosis ==="
          for f in $(find "$ARTIFACT_DIR" -name "TESTSPEC_OUTPUT.txt" -type f); do
            echo ""
            echo "--- $f ($(wc -c < "$f") bytes) ---"
            echo "Lines with PERF_REPORT:"
            grep -n "PERF_REPORT" "$f" | head -20 || echo "  (none)"
            echo "Lines with perf-extract:"
            grep -n "perf-extract" "$f" | head -20 || echo "  (none)"
            echo "Lines with perf-report:"
            grep -n "perf-report" "$f" | head -20 || echo "  (none)"
            echo "Lines with 'post_test' or 'Test completed':"
            grep -n "post_test\|Test completed\|Extracting perf\|FAILED.*perf\|logcat" "$f" | head -20 || echo "  (none)"
            echo "Last 80 lines:"
            tail -80 "$f"
            echo "---"
          done

          echo ""
          echo "=== Device log files (LOGCAT/DEVICE_LOG) ==="
          for f in $(find "$ARTIFACT_DIR" -name "LOGCAT.txt" -o -name "DEVICE_LOG.txt" -type f); do
            if [ -f "$f" ]; then
              echo "--- $f ($(wc -c < "$f") bytes) ---"
              echo "Lines with PERF_REPORT:"
              grep -n "PERF_REPORT" "$f" | head -20 || echo "  (none)"
            fi
          done

          echo ""
          echo "=== Customer artifact files ==="
          for f in $(find "$ARTIFACT_DIR" -name "customer_*" -type f); do
            echo "--- $f ($(wc -c < "$f") bytes) ---"
            head -5 "$f" 2>/dev/null || true
          done

      - name: Extract performance report from logs
        if: always() && steps.download_df_logs.outputs.artifact_dir
        run: |
          ARTIFACT_DIR="${{ steps.download_df_logs.outputs.artifact_dir }}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/perf-results/${{ matrix.platform }}"
          mkdir -p "$OUTPUT_DIR"

          GROUPS_JSON="${GITHUB_WORKSPACE}/addon/${{ inputs.workdir || env.PKG_DIR }}/test/mobile/test-groups.json"
          PERF_FILTER=$(jq -r '.perf_report_filter' "$GROUPS_JSON")

          node "${GITHUB_WORKSPACE}/addon/scripts/perf-report/extract-from-log.js" \
            "$ARTIFACT_DIR" \
            "$OUTPUT_DIR/performance-report.json" \
            --run-number "${{ github.run_number }}" \
            --filter "$PERF_FILTER"

          if find "$OUTPUT_DIR" -name "performance-report.json" -type f | head -1 | grep -q .; then
            echo "Generating HTML report..."
            node "${GITHUB_WORKSPACE}/addon/scripts/perf-report/aggregate.js" \
              --dir "$OUTPUT_DIR" \
              --output-html "$OUTPUT_DIR/performance-report.html" \
              --output-json "$OUTPUT_DIR/performance-summary.json" \
              --output "$OUTPUT_DIR/performance-report.md"
          fi

      - name: Upload raw Device Farm logs
        if: always() && steps.download_df_logs.outputs.artifact_dir
        uses: actions/upload-artifact@v4
        with:
          name: df-raw-logs-${{ matrix.platform }}-${{ github.run_number }}
          path: ${{ steps.download_df_logs.outputs.artifact_dir }}
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload mobile performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-ocr-${{ matrix.platform }}-${{ github.run_number }}
          path: |
            perf-results/${{ matrix.platform }}/**/performance-report.json
            perf-results/${{ matrix.platform }}/performance-report.html
            perf-results/${{ matrix.platform }}/performance-report.md
            perf-results/${{ matrix.platform }}/performance-summary.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Refresh AWS credentials for log download
        if: always() && (steps.schedule_run.outputs.run_arn_perf || steps.schedule_run.outputs.run_arn_regular)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2
          role-session-name: device-farm-logs

      - name: Download Device Farm Logs (all runs)
        if: always() && (steps.schedule_run.outputs.run_arn_perf || steps.schedule_run.outputs.run_arn_regular)
        run: |
          RUN_ARN_PERF="${{ steps.schedule_run.outputs.run_arn_perf }}"
          RUN_ARN_REGULAR="${{ steps.schedule_run.outputs.run_arn_regular }}"
          LOG_DIR="devicefarm-logs/${{ matrix.platform }}"
          PLATFORM="${{ matrix.platform }}"
          mkdir -p "$LOG_DIR"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📥 DOWNLOADING DEVICE FARM LOGS (ALL RUNS)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Logs are downloaded so anyone with repo access can view them"
          echo "without needing AWS Device Farm credentials."
          if [ "$PLATFORM" = "Android" ]; then
            echo "ℹ️  Skipping video artifacts on Android to reduce artifact size."
          fi
          echo ""

          RUN_ARNS=()
          if [ -n "$RUN_ARN_PERF" ]; then
            RUN_ARNS+=("$RUN_ARN_PERF")
          fi
          if [ -n "$RUN_ARN_REGULAR" ]; then
            RUN_ARNS+=("$RUN_ARN_REGULAR")
          fi

          for RUN_ARN in "${RUN_ARNS[@]}"; do
            RUN_DETAILS=$(aws devicefarm get-run --arn "$RUN_ARN" --output json 2>/dev/null || echo '{}')
            RUN_LABEL=$(echo "$RUN_DETAILS" | jq -r '.run.name // "unknown"')
            echo ""
            echo "========================================"
            echo "📦 Run: $RUN_LABEL"
            echo "========================================"

            SAFE_RUN=$(echo "$RUN_LABEL" | tr ' /' '__' | tr -cd '[:alnum:]_-')
            JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --output json 2>/dev/null || echo '{"jobs":[]}')

            for JOB_ARN in $(echo "$JOBS" | jq -r '.jobs[].arn'); do
              DEVICE_NAME=$(echo "$JOBS" | jq -r --arg arn "$JOB_ARN" '.jobs[] | select(.arn == $arn) | .device.name // "unknown"')
              JOB_RESULT=$(echo "$JOBS" | jq -r --arg arn "$JOB_ARN" '.jobs[] | select(.arn == $arn) | .result // "UNKNOWN"')
              SAFE_NAME=$(echo "$DEVICE_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')

              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📱 $DEVICE_NAME ($JOB_RESULT)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              SUITES=$(aws devicefarm list-suites --arn "$JOB_ARN" --output json 2>/dev/null || echo '{"suites":[]}')

              for SUITE_ARN in $(echo "$SUITES" | jq -r '.suites[].arn'); do
                SUITE_NAME=$(echo "$SUITES" | jq -r --arg arn "$SUITE_ARN" '.suites[] | select(.arn == $arn) | .name // "unknown"')
                SAFE_SUITE=$(echo "$SUITE_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')

                ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type FILE --output json 2>/dev/null || echo '{"artifacts":[]}')

                echo "$ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                  ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                  ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                  ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                  [ -z "$ART_URL" ] && continue

                  if [ "$PLATFORM" = "Android" ]; then
                    if echo "$ART_NAME" | grep -qiE "^video$" || echo "$ART_EXT" | grep -qiE "^mp4$"; then
                      echo "  Skipped (video): $SUITE_NAME / $ART_NAME"
                      continue
                    fi
                  fi

                  SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                  DEST="$LOG_DIR/${SAFE_RUN}_${SAFE_NAME}_${SAFE_SUITE}_${SAFE_ART}.${ART_EXT}"

                  if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                    echo "  Downloaded: $SUITE_NAME / $ART_NAME"

                    if echo "$ART_NAME" | grep -qiE "test.spec|testspec"; then
                      echo ""
                      echo "::group::📋 [$DEVICE_NAME] $SUITE_NAME — $ART_NAME"
                      cat "$DEST" 2>/dev/null || true
                      echo "::endgroup::"
                    fi
                  fi
                done

                LOG_ARTIFACTS=$(aws devicefarm list-artifacts --arn "$SUITE_ARN" --type LOG --output json 2>/dev/null || echo '{"artifacts":[]}')

                echo "$LOG_ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                  ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                  ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                  ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                  [ -z "$ART_URL" ] && continue

                  SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                  DEST="$LOG_DIR/${SAFE_RUN}_${SAFE_NAME}_${SAFE_SUITE}_${SAFE_ART}.${ART_EXT}"

                  if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                    echo "  Downloaded: $SUITE_NAME / $ART_NAME (LOG)"
                  fi
                done
              done

              JOB_ARTIFACTS=$(aws devicefarm list-artifacts --arn "$JOB_ARN" --type FILE --output json 2>/dev/null || echo '{"artifacts":[]}')
              echo "$JOB_ARTIFACTS" | jq -c '.artifacts[]' 2>/dev/null | while read -r ARTIFACT; do
                ART_NAME=$(echo "$ARTIFACT" | jq -r '.name // "unknown"')
                ART_URL=$(echo "$ARTIFACT" | jq -r '.url // empty')
                ART_EXT=$(echo "$ARTIFACT" | jq -r '.extension // "txt"')
                [ -z "$ART_URL" ] && continue

                if [ "$PLATFORM" = "Android" ]; then
                  if echo "$ART_NAME" | grep -qiE "^video$" || echo "$ART_EXT" | grep -qiE "^mp4$"; then
                    echo "  Skipped (video): job-level / $ART_NAME"
                    continue
                  fi
                fi

                SAFE_ART=$(echo "$ART_NAME" | tr ' /' '__' | tr -cd '[:alnum:]_-')
                DEST="$LOG_DIR/${SAFE_RUN}_${SAFE_NAME}_job_${SAFE_ART}.${ART_EXT}"

                if curl -fsSL --max-time 300 -o "$DEST" "$ART_URL" 2>/dev/null; then
                  echo "  Downloaded (job-level): $ART_NAME"
                fi
              done
            done
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 All downloaded logs:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find "$LOG_DIR" -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no logs downloaded)"

      - name: Extract Console Logs
        if: always() && (steps.schedule_run.outputs.run_arn_perf || steps.schedule_run.outputs.run_arn_regular)
        run: |
          LOG_DIR="devicefarm-logs/${{ matrix.platform }}"
          CONSOLE_DIR="console-logs/${{ matrix.platform }}"
          mkdir -p "$CONSOLE_DIR"
          for f in "$LOG_DIR"/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            if echo "$fname" | grep -qiE "Logcat\."; then
              cp "$f" "$CONSOLE_DIR/"
              echo "  Console log: $fname"
            fi
            if echo "$fname" | grep -qiE "Customer_Artifacts\.zip$"; then
              prefix=$(echo "$fname" | sed 's/_Customer_Artifacts\.zip$//')
              tmpdir=$(mktemp -d)
              if unzip -qo "$f" -d "$tmpdir" 2>/dev/null; then
                bare_log=$(find "$tmpdir" -name "bare_console.log" -type f 2>/dev/null | head -1)
                if [ -n "$bare_log" ]; then
                  cp "$bare_log" "$CONSOLE_DIR/${prefix}_bare_console.log"
                  echo "  Extracted: ${prefix}_bare_console.log"
                fi
                appium_log=$(find "$tmpdir" -name "appium.log" -type f 2>/dev/null | head -1)
                if [ -n "$appium_log" ]; then
                  cp "$appium_log" "$CONSOLE_DIR/${prefix}_appium.log"
                  echo "  Extracted: ${prefix}_appium.log"
                fi
              else
                echo "  WARNING: Failed to unzip $fname"
              fi
              rm -rf "$tmpdir"
            fi
          done
          echo ""
          echo "📋 Console logs extracted:"
          find "$CONSOLE_DIR" -type f -exec ls -lh {} \; 2>/dev/null || echo "  (no console logs found)"

      - name: Upload Console Logs
        if: always() && (steps.schedule_run.outputs.run_arn_perf || steps.schedule_run.outputs.run_arn_regular)
        uses: actions/upload-artifact@v4
        with:
          name: console-logs-ocr-onnx-${{ matrix.platform }}
          path: console-logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Full Device Farm Logs
        if: always() && (steps.schedule_run.outputs.run_arn_perf || steps.schedule_run.outputs.run_arn_regular)
        uses: actions/upload-artifact@v4
        with:
          name: devicefarm-logs-ocr-onnx-${{ matrix.platform }}
          path: devicefarm-logs/
          retention-days: 30
          if-no-files-found: ignore

  combine-reports:
    name: Combined Performance Report
    needs: [build-and-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: |
            scripts/perf-report
            packages/ocr-onnx/test/images

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all perf report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-ocr-*-${{ github.run_number }}
          path: combined-reports
        continue-on-error: true

      - name: Fix desktop device names
        shell: bash
        run: |
          for dir in combined-reports/perf-report-ocr-*/; do
            [ -d "$dir" ] || continue
            base=$(basename "$dir")
            platform=$(echo "$base" | sed "s/^perf-report-ocr-//" | sed "s/-${{ github.run_number }}$//")

            # Skip mobile — they already have real device names
            case "$platform" in Android|iOS) continue ;; esac

            for json in $(find "$dir" -name "performance-report.json" 2>/dev/null); do
              if command -v jq >/dev/null 2>&1; then
                jq --arg name "$platform" '.device.name = $name' "$json" > "${json}.tmp" && mv "${json}.tmp" "$json"
                echo "Patched device name in $json → $platform"
              fi
            done
          done

      - name: Generate combined report
        run: |
          if ! find combined-reports -name "performance-report.json" -type f 2>/dev/null | grep -q .; then
            echo "No performance reports found."
            exit 0
          fi

          echo "=== Reports found ==="
          find combined-reports -name "performance-report.json" -type f

          mkdir -p combined-output

          node scripts/perf-report/aggregate.js \
            --dir combined-reports \
            --output-html combined-output/performance-report-combined.html \
            --output-json combined-output/performance-summary-combined.json \
            --output combined-output/performance-report-combined.md

      - name: Generate per-device HTML reports
        if: always()
        shell: bash
        run: |
          mkdir -p per-device-reports
          for json in $(find combined-reports -name "performance-report.json" -type f 2>/dev/null); do
            device_name=$(node -e "const d=JSON.parse(require('fs').readFileSync('$json','utf8'));console.log((d.device&&d.device.name)||'Unknown')" 2>/dev/null)
            [ -z "$device_name" ] || [ "$device_name" = "Unknown" ] && continue

            safe_name=$(echo "$device_name" | tr ' ' '-')
            tmp_dir=$(mktemp -d)
            mkdir -p "$tmp_dir/device"
            cp "$json" "$tmp_dir/device/performance-report.json"

            echo "Generating HTML for $device_name..."
            node scripts/perf-report/aggregate.js \
              --dir "$tmp_dir" \
              --output-html "per-device-reports/HTML-Report-${safe_name}.html" \
              2>/dev/null || true

            rm -rf "$tmp_dir"
          done
          echo "=== Per-device reports generated ==="
          ls -la per-device-reports/ 2>/dev/null || echo "No per-device reports"

      - name: Upload combined HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Report-All-Platforms-${{ github.run_number }}
          path: combined-output/performance-report-combined.html
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload per-device HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Reports-Per-Device-${{ github.run_number }}
          path: per-device-reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Write combined summary
        if: always()
        shell: bash
        run: |
          set +e
          MD_FILE="combined-output/performance-report-combined.md"
          echo "## OCR Performance Report (All Platforms)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$MD_FILE" ]; then
            cat "$MD_FILE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No combined performance report available." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloadable HTML Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "combined-output/performance-report-combined.html" ]; then
            echo "> **Full Combined Report (all platforms)**: download artifact \`HTML-Report-All-Platforms-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          HAS_DEVICES=0
          for html in per-device-reports/HTML-Report-*.html; do
            [ -f "$html" ] || continue
            if [ "$HAS_DEVICES" -eq 0 ]; then
              echo "> **Individual Device Reports**: download artifact \`HTML-Reports-Per-Device-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
              echo ">" >> $GITHUB_STEP_SUMMARY
              echo "> Includes:" >> $GITHUB_STEP_SUMMARY
              HAS_DEVICES=1
            fi
            device=$(basename "$html" .html | sed 's/^HTML-Report-//' | tr '-' ' ')
            echo "> - ${device}" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
